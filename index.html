<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gridiron — College Football Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d12; --bg2:#11161d; --card:#161c25; --card2:#1d2531;
    --line:#262f3d; --text:#eef2f7; --muted:#8b97a8; --muted2:#5d6776;
    /* team theme (overwritten at runtime) */
    --primary:#00274c; --accent:#ffcb05; --on-primary:#ffffff; --on-accent:#00274c;
    --primary-soft:rgba(0,39,76,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{padding-bottom:env(safe-area-inset-bottom)}
  button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
  a{color:inherit}
  .display{font-family:Oswald,Inter,sans-serif;letter-spacing:.01em}
  .mono-num{font-variant-numeric:tabular-nums}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  /* ---- Hero / team identity ---- */
  .hero{position:relative;overflow:hidden;background:var(--primary);color:var(--on-primary)}
  .hero-stripe{height:4px;background:var(--accent)}
  .hero-inner{position:relative;max-width:1100px;margin:0 auto;padding:18px 16px 16px;display:flex;gap:16px;align-items:center;z-index:2}
  .hero-logo{width:74px;height:74px;object-fit:contain;flex:0 0 auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.45))}
  .hero-watermark{position:absolute;right:-30px;top:50%;transform:translateY(-50%);width:230px;opacity:.08;pointer-events:none;z-index:1}
  .hero h1{font-family:Oswald;font-weight:700;font-size:30px;line-height:1;margin:0;text-transform:uppercase}
  .hero .sub{font-size:13px;opacity:.85;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .pill.accent{background:var(--accent);color:var(--on-accent)}
  .hero-actions{margin-left:auto;display:flex;gap:8px;z-index:3}
  .icon-btn{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 11px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;color:var(--on-primary)}
  .icon-btn:hover{background:rgba(255,255,255,.22)}

  /* ---- Next game card in hero ---- */
  .nextgame{max-width:1100px;margin:0 auto;padding:0 16px}
  .nextgame-card{margin-top:-10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;position:relative;z-index:4;box-shadow:0 12px 30px rgba(0,0,0,.3)}
  .ng-label{font-family:Oswald;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .ng-team{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px}
  .ng-team img{width:26px;height:26px;object-fit:contain}
  .ng-mid{color:var(--muted);font-family:Oswald;font-size:13px}
  .ng-meta{margin-left:auto;text-align:right;font-size:12px;color:var(--muted)}

  /* ---- Tabs ---- */
  .tabs-wrap{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg),var(--bg) 70%,transparent);backdrop-filter:blur(6px)}
  .tabs{max-width:1100px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;padding:10px 12px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;font-family:Oswald;text-transform:uppercase;letter-spacing:.04em;font-size:13px;font-weight:600;color:var(--muted);padding:8px 13px;border-radius:9px;border:1px solid transparent}
  .tab.active{color:var(--text);background:var(--card);border-color:var(--line)}
  .tab:hover{color:var(--text)}

  .wrap{max-width:1100px;margin:0 auto;padding:6px 16px 60px}
  .section-title{font-family:Oswald;text-transform:uppercase;letter-spacing:.06em;font-size:13px;color:var(--muted);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:13px}
  .row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .grid{display:grid;gap:10px}
  @media(min-width:720px){.grid.cols2{grid-template-columns:1fr 1fr}}

  .team-mini{display:flex;align-items:center;gap:9px;min-width:0}
  .team-mini img{width:24px;height:24px;object-fit:contain;flex:0 0 auto}
  .team-mini .nm{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rk{font-family:Oswald;font-size:12px;color:var(--accent);font-weight:700;min-width:18px;text-align:center}

  .score{font-family:Oswald;font-weight:700;font-size:18px;min-width:30px;text-align:center}
  .win{color:var(--text)} .lose{color:var(--muted2)}
  .badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:6px}
  .badge.live{background:#e03131;color:#fff}
  .badge.final{background:var(--card2);color:var(--muted)}
  .badge.soon{background:var(--accent);color:var(--on-accent)}
  .badge.win{background:rgba(64,192,87,.16);color:#69db7c}
  .badge.loss{background:rgba(224,49,49,.16);color:#ff8787}

  .empty{padding:34px 16px;text-align:center;color:var(--muted);font-size:14px}
  .err{padding:16px;border:1px solid #5a2b2b;background:#2a1414;color:#ffb4b4;border-radius:12px;font-size:13px;display:flex;gap:10px;align-items:flex-start}
  .err button{color:#ffd0d0;text-decoration:underline;font-weight:600}
  .spin{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;margin:30px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .skel{height:46px;background:linear-gradient(90deg,var(--card),var(--card2),var(--card));background-size:200% 100%;animation:sh 1.3s infinite;border-radius:10px;margin-bottom:8px}
  @keyframes sh{to{background-position:-200% 0}}

  /* ---- Modal / switcher ---- */
  .scrim{position:fixed;inset:0;background:rgba(4,6,10,.66);backdrop-filter:blur(3px);z-index:60;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:720px){.scrim{align-items:center}}
  .sheet{background:var(--bg2);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
  @media(min-width:720px){.sheet{border-radius:18px}}
  .sheet-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .sheet-head h3{font-family:Oswald;text-transform:uppercase;letter-spacing:.05em;font-size:16px;margin:0}
  .search{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;color:var(--text);font-size:14px;outline:none}
  .search:focus{border-color:var(--accent)}
  .sheet-body{overflow:auto;padding:8px}
  .conf-h{font-family:Oswald;text-transform:uppercase;letter-spacing:.07em;font-size:11px;color:var(--muted);padding:12px 10px 6px;position:sticky;top:0;background:var(--bg2)}
  .team-opt{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;cursor:pointer;width:100%;text-align:left}
  .team-opt:hover{background:var(--card)}
  .team-opt.sel{background:var(--primary-soft);outline:1px solid var(--accent)}
  .team-opt img{width:26px;height:26px;object-fit:contain}
  .close-x{background:var(--card);border-radius:9px;padding:7px 11px;font-weight:700}

  .input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--text);font-size:14px;outline:none}
  .input:focus{border-color:var(--accent)}
  .btn{background:var(--accent);color:var(--on-accent);font-weight:700;border-radius:11px;padding:11px 16px;font-size:14px;display:inline-flex;align-items:center;gap:8px;justify-content:center}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:var(--card);color:var(--text);border:1px solid var(--line)}
  .label{font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:600}

  /* roster */
  .pos-h{font-family:Oswald;text-transform:uppercase;letter-spacing:.06em;font-size:12px;color:var(--accent);margin:16px 0 8px}
  .player{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
  .player:last-child{border-bottom:none}
  .jersey{font-family:Oswald;font-weight:700;font-size:16px;color:var(--muted);text-align:center}

  /* AI */
  .ai-out{white-space:pre-wrap;line-height:1.6;font-size:14.5px;padding:16px;border-radius:12px;background:var(--card);border:1px solid var(--line)}
  .chip{font-size:12.5px;font-weight:600;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 13px}
  .chip:hover{border-color:var(--accent)}
  .footer{max-width:1100px;margin:24px auto 0;padding:16px;color:var(--muted2);font-size:11.5px;text-align:center;line-height:1.6}

  /* compare */
  .cmp-head{display:flex;align-items:center;padding:16px 14px;margin-bottom:12px}
  .cmp-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
  .cmp-team img{width:52px;height:52px;object-fit:contain}
  .cmp-nm{font-family:Oswald;font-weight:700;font-size:16px;text-transform:uppercase;text-align:center}
  .cmp-vs{font-family:Oswald;font-weight:700;color:var(--muted);padding:0 10px}
  .cmp-select{background:var(--card2);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:Oswald;font-weight:600;font-size:14px;padding:5px 8px;max-width:140px;text-align:center;text-transform:uppercase}
  .cmp-row{display:grid;grid-template-columns:54px 1fr 54px;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line)}
  .cmp-row:last-child{border-bottom:none}
  .cmp-val{font-family:Oswald;font-weight:700;font-size:15px}
  .cmp-bars{min-width:0}
  .cmp-label{font-family:Oswald;text-transform:uppercase;letter-spacing:.06em;font-size:10px;color:var(--muted);text-align:center;margin-bottom:4px}
  .cmp-track{display:flex;height:8px;border-radius:5px;overflow:hidden;background:var(--bg)}
  .cmp-fill{height:100%}
  .cmp-fill.left{margin-left:auto;background:var(--accent);border-radius:5px 0 0 5px}
  .cmp-fill.right{background:var(--muted);border-radius:0 5px 5px 0}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/plain" id="jsx-source">
import React from "react";
import { createRoot } from "react-dom/client";
const ReactDOM = { createRoot };

const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ============================================================
   CONFIG — all ESPN endpoints live here so they're easy to tweak.
   ESPN's site API is unofficial but CORS-open and stable.
   ============================================================ */
const ESPN = "https://site.api.espn.com/apis/site/v2/sports/football/college-football";
const ESPN_WEB = "https://site.web.api.espn.com/apis/v2/sports/football/college-football";
const URLS = {
  teams:      () => `${ESPN}/teams?limit=900`,
  team:       (id) => `${ESPN}/teams/${id}`,
  schedule:   (id, yr) => `${ESPN}/teams/${id}/schedule?season=${yr}`,
  roster:     (id) => `${ESPN}/teams/${id}/roster`,
  rankings:   () => `${ESPN}/rankings`,
  news:       (id) => `${ESPN}/news?limit=40${id ? `&team=${id}` : ""}`,
  scoreboard: (yr, wk, grp) => `${ESPN}/scoreboard?year=${yr}&seasontype=2&week=${wk}${grp ? `&groups=${grp}` : "&groups=80"}&limit=200`,
  postseason: (yr) => `${ESPN}/scoreboard?year=${yr}&seasontype=3&limit=200`,
  standings:  (yr) => `${ESPN_WEB}/standings?region=us&lang=en&contentorigin=espn&season=${yr}&type=0&level=3`,
};
const DEFAULT_TEAM = "130";      // Michigan
const DEFAULT_YEAR = 2026;
const FBS_GROUP = "80";

/* ---- tiny fetch layer: timeout, one retry, session cache ---- */
// ESPN does not return CORS headers to third-party origins, so a direct browser
// fetch is blocked. We try direct first (in case your network allows it), then fall
// back through relay proxies. Set your own proxy in Settings for guaranteed reliability.
const _mem = new Map();
const RELAYS = [
  (u) => u,                                                             // direct
  (u) => "https://corsproxy.io/?url=" + encodeURIComponent(u),          // public relay
  (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u), // public relay
];
let _skipDirect = false; // once direct fails this session, stop retrying it
function _targets(url) {
  const out = [];
  let pb = ""; try { pb = localStorage.getItem("cfb_proxy") || ""; } catch (e) {}
  if (pb) out.push(pb + encodeURIComponent(url));
  RELAYS.forEach((b, i) => { if (i === 0 && _skipDirect) return; out.push(b(url)); });
  return out;
}
async function getJSON(url, { ttl = 120000 } = {}) {
  const hit = _mem.get(url);
  if (hit && Date.now() - hit.t < ttl) return hit.v;
  let lastErr;
  for (const target of _targets(url)) {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 15000);
    try {
      const r = await fetch(target, { signal: ctrl.signal, cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const v = await r.json();
      _mem.set(url, { t: Date.now(), v });
      return v;
    } catch (e) {
      lastErr = e;
      if (target === url && e && e.name === "TypeError") _skipDirect = true; // direct blocked
    } finally { clearTimeout(to); }
  }
  throw lastErr || new Error("Request failed");
}

/* ---- theming from team colors ---- */
function hex(c, fallback) { if (!c) return fallback; return c.startsWith("#") ? c : "#" + c; }
function lum(h) { const n = h.replace("#",""); const r=parseInt(n.slice(0,2),16),g=parseInt(n.slice(2,4),16),b=parseInt(n.slice(4,6),16); return (0.299*r+0.587*g+0.114*b)/255; }
function applyTheme(team) {
  let primary = hex(team?.color, "#00274c");
  let accent  = hex(team?.alternateColor, "#ffcb05");
  // ensure primary is the darker of the two for a stable dark header
  if (lum(primary) > lum(accent)) { const t = primary; primary = accent; accent = t; }
  // if accent is too dark to read on primary, lighten toward white
  const onPrimary = lum(primary) > 0.55 ? "#0a0d12" : "#ffffff";
  const onAccent  = lum(accent)  > 0.55 ? "#0a0d12" : "#ffffff";
  const root = document.documentElement.style;
  root.setProperty("--primary", primary);
  root.setProperty("--accent", accent);
  root.setProperty("--on-primary", onPrimary);
  root.setProperty("--on-accent", onAccent);
  root.setProperty("--primary-soft", primary + "30");
}
const logoOf = (t) => t?.logos?.[0]?.href || t?.logo || (t?.id ? `https://a.espncdn.com/i/teamlogos/ncaa/500/${t.id}.png` : "");

/* ============================================================ */
function App() {
  const [teams, setTeams] = useState({});       // id -> team
  const [confMap, setConfMap] = useState(null);  // [{name, teamIds:[]}]
  const [bootErr, setBootErr] = useState(null);
  const [teamId, setTeamId] = useState(() => localStorage.getItem("cfb_team") || DEFAULT_TEAM);
  const [detail, setDetail] = useState(null);
  const [tab, setTab] = useState("schedule");
  const [switcher, setSwitcher] = useState(false);
  const [settings, setSettings] = useState(false);
  const [year, setYear] = useState(() => +(localStorage.getItem("cfb_year") || DEFAULT_YEAR));

  const team = teams[teamId];

  // boot: load all FBS teams (gives colors + logos), then conferences
  const boot = useCallback(async () => {
    setBootErr(null);
    try {
      const d = await getJSON(URLS.teams(), { ttl: 6e5 });
      const list = d.sports[0].leagues[0].teams.map(x => x.team);
      const map = {}; list.forEach(t => map[t.id] = t);
      setTeams(map);
      // conferences (best-effort; flat fallback if it fails)
      try {
        const s = await getJSON(URLS.standings(year), { ttl: 6e5 });
        const kids = s.children || s.standings?.children || [];
        const groups = kids.map(c => ({
          name: c.name || c.abbreviation || "Conference",
          teamIds: (c.standings?.entries || []).map(e => String(e.team?.id)).filter(id => map[id]),
        })).filter(g => g.teamIds.length);
        setConfMap(groups.length ? groups : null);
      } catch { setConfMap(null); }
    } catch (e) { setBootErr((e && e.name ? e.name + ": " : "") + (e && e.message || "Couldn't reach ESPN")); }
  }, [year]);
  useEffect(() => { boot(); }, [boot]);

  // apply theme + load hero detail whenever team changes
  useEffect(() => {
    if (team) applyTheme(team);
    localStorage.setItem("cfb_team", teamId);
    let alive = true;
    setDetail(null);
    getJSON(URLS.team(teamId)).then(d => { if (alive) setDetail(d.team); }).catch(() => {});
    return () => { alive = false; };
  }, [teamId, team]);

  const isLocalFile = typeof location !== "undefined" && !/^https?:$/.test(location.protocol);
  if (bootErr) return (
    <div className="wrap" style={{paddingTop:40}}>
      {isLocalFile ? (
        <div className="err"><span>📁</span><div><b>This is opened as a local file.</b> Browsers block data requests from files opened straight from Downloads ({location.protocol}//…), so ESPN can't load here — this isn't a bug in the app.<br/><br/>Put <b>index.html</b> in your GitHub Pages repo and open the <b>https://…github.io/…</b> address instead. It'll load fine from there.</div></div>
      ) : (
        <div className="err"><span>⚠️</span><div>Couldn't load the league from ESPN. {bootErr}.{" "}
          <button onClick={boot}>Try again</button>. The ESPN API is open to browsers, so if this keeps failing on this device while ESPN works elsewhere, an ad/privacy blocker, VPN, or DNS filter is likely blocking site.api.espn.com.</div></div>
      )}
    </div>
  );
  if (!team) return <div className="spin" />;

  const TABS = [
    ["schedule","Schedule"],["scores","Scores"],["rankings","Rankings"],
    ["standings","Standings"],["roster","Roster"],["news","News"],
    ["pickem","Pick'em"],["compare","Compare"],
    ["postseason","Postseason"],["ai","Analyst"],
  ];

  return (
    <>
      <Hero team={team} detail={detail} teams={teams}
            onSwitch={() => setSwitcher(true)} onSettings={() => setSettings(true)} />
      <div className="tabs-wrap"><div className="tabs">
        {TABS.map(([k,l]) => (
          <button key={k} className={"tab"+(tab===k?" active":"")} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div></div>
      <div className="wrap">
        {tab==="schedule"   && <Schedule teamId={teamId} year={year} teams={teams} />}
        {tab==="scores"     && <Scores teamId={teamId} year={year} teams={teams} />}
        {tab==="rankings"   && <Rankings teamId={teamId} />}
        {tab==="standings"  && <Standings year={year} team={team} teams={teams} />}
        {tab==="roster"     && <Roster teamId={teamId} team={team} />}
        {tab==="news"       && <News teamId={teamId} />}
        {tab==="pickem"     && <Pickem teamId={teamId} year={year} teams={teams} />}
        {tab==="compare"    && <Compare team={team} teams={teams} detail={detail} />}
        {tab==="postseason" && <Postseason year={year} />}
        {tab==="ai"         && <Analyst team={team} detail={detail} year={year} openSettings={()=>setSettings(true)} />}
      </div>
      <div className="footer">
        Live data from ESPN's public college-football API (unofficial). 2026 schedules, rosters and rankings fill in as the season approaches.<br/>
        Built for Troy · Go Blue 〽️
      </div>

      {switcher && <Switcher teams={teams} confMap={confMap} current={teamId}
        onPick={(id)=>{ setTeamId(id); setSwitcher(false); window.scrollTo(0,0); }}
        onClose={()=>setSwitcher(false)} />}
      {settings && <Settings year={year} setYear={(y)=>{ setYear(y); localStorage.setItem("cfb_year",y); }}
        onClose={()=>setSettings(false)} />}
    </>
  );
}

/* ---------- HERO ---------- */
function Hero({ team, detail, teams, onSwitch, onSettings }) {
  const rec = detail?.record?.items?.[0]?.summary;
  const standing = detail?.standingSummary;
  const conf = detail?.groups?.parent?.name || detail?.groups?.name;
  const rank = detail?.rank;
  const ne = detail?.nextEvent?.[0];
  let next = null;
  if (ne?.competitions?.[0]) {
    const comp = ne.competitions[0];
    const me = comp.competitors.find(c => String(c.team?.id) === String(team.id));
    const opp = comp.competitors.find(c => String(c.team?.id) !== String(team.id));
    next = { date: ne.date, home: me?.homeAway === "home", opp: opp?.team,
             venue: comp.venue?.fullName, status: comp.status?.type };
  }
  return (
    <div className="hero">
      <div className="hero-stripe" />
      <img className="hero-watermark" src={logoOf(team)} alt="" />
      <div className="hero-inner">
        <img className="hero-logo" src={logoOf(team)} alt="" />
        <div style={{minWidth:0}}>
          <h1>{team.displayName}</h1>
          <div className="sub">
            {rank && <span className="pill accent">#{rank}</span>}
            {rec && <span className="pill mono-num">{rec}</span>}
            {conf && <span className="pill">{conf}</span>}
            {standing && <span style={{opacity:.8}}>{standing}</span>}
          </div>
        </div>
        <div className="hero-actions">
          <button className="icon-btn" onClick={onSwitch}>⇆ Team</button>
          <button className="icon-btn" onClick={onSettings} aria-label="Settings">⚙</button>
        </div>
      </div>
      {next && (
        <div className="nextgame"><div className="nextgame-card">
          <span className="ng-label">{next.home ? "Next · Home" : "Next · Away"}</span>
          <span className="ng-mid">{next.home ? "vs" : "@"}</span>
          <span className="ng-team">
            <img src={logoOf(next.opp)} alt="" />{next.opp?.displayName || next.opp?.name || "TBD"}
          </span>
          <span className="ng-meta">
            {fmtDate(next.date)}<br/>{next.venue || ""}
          </span>
        </div></div>
      )}
    </div>
  );
}

/* ---------- SCHEDULE ---------- */
function Schedule({ teamId, year, teams }) {
  const { data, err, loading, reload } = useData(() => getJSON(URLS.schedule(teamId, year)), [teamId, year]);
  if (loading) return <Loading rows={8} />;
  if (err) return <ErrBox msg={err} retry={reload} />;
  const events = data?.events || [];
  if (!events.length) return <Empty>No {year} games posted yet. Schedules usually drop in spring/summer.</Empty>;
  return (
    <>
      <div className="section-title">{year} Schedule</div>
      <div className="card">
        {events.map(ev => {
          const comp = ev.competitions?.[0]; if (!comp) return null;
          const me = comp.competitors.find(c => String(c.team?.id)===String(teamId));
          const opp = comp.competitors.find(c => String(c.team?.id)!==String(teamId));
          const st = comp.status?.type; const done = st?.completed;
          const won = me?.winner; const homeAway = me?.homeAway;
          return (
            <div className="row" key={ev.id}>
              <div style={{width:42}} className="ng-label mono-num">{fmtShort(ev.date)}</div>
              <div className="team-mini" style={{flex:1}}>
                <span className="ng-mid" style={{width:18}}>{homeAway==="home"?"vs":"@"}</span>
                <img src={logoOf(opp?.team || teams[opp?.team?.id])} alt="" />
                <span className="nm">{opp?.team?.displayName || opp?.team?.name || "TBD"}</span>
              </div>
              {done ? (
                <>
                  <span className={"badge "+(won?"win":"loss")}>{won?"W":"L"}</span>
                  <span className="score mono-num">{me?.score}-{opp?.score}</span>
                </>
              ) : (
                <span className="ng-meta">{st?.shortDetail || "TBD"}</span>
              )}
            </div>
          );
        })}
      </div>
    </>
  );
}

/* ---------- SCORES (current week scoreboard) ---------- */
function Scores({ teamId, year, teams }) {
  const [week, setWeek] = useState(1);
  const { data, err, loading, reload } = useData(() => getJSON(URLS.scoreboard(year, week)), [year, week]);
  const events = data?.events || [];
  // float the user's team to the top
  const sorted = useMemo(() => events.slice().sort((a,b)=>{
    const mine = e => e.competitions?.[0]?.competitors?.some(c=>String(c.team?.id)===String(teamId));
    return (mine(b)?1:0)-(mine(a)?1:0);
  }), [events, teamId]);
  return (
    <>
      <div className="section-title">Scoreboard
        <select className="input" style={{width:120,padding:"6px 8px",fontSize:13}}
          value={week} onChange={e=>setWeek(+e.target.value)}>
          {Array.from({length:15},(_,i)=>i+1).map(w=><option key={w} value={w}>Week {w}</option>)}
        </select>
      </div>
      {loading ? <Loading rows={6}/> : err ? <ErrBox msg={err} retry={reload}/> :
        !sorted.length ? <Empty>No games found for week {week} of {year}.</Empty> :
        <div className="grid cols2">{sorted.map(ev => <GameCard key={ev.id} ev={ev} teamId={teamId}/>)}</div>}
    </>
  );
}
function GameCard({ ev, teamId }) {
  const comp = ev.competitions?.[0]; if (!comp) return null;
  const st = comp.status?.type; const state = st?.state; // pre|in|post
  const cs = comp.competitors;
  const mine = cs.some(c=>String(c.team?.id)===String(teamId));
  return (
    <div className="card" style={mine?{outline:"1px solid var(--accent)"}:null}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px 2px"}}>
        <span className="ng-label">{ev.shortName ? "" : ""}{comp.broadcasts?.[0]?.names?.[0]||""}</span>
        {state==="in" ? <span className="badge live">● {st.shortDetail}</span>
          : state==="post" ? <span className="badge final">Final</span>
          : <span className="badge soon">{st?.shortDetail||fmtShort(ev.date)}</span>}
      </div>
      {cs.map(c => {
        const win = state==="post" && c.winner;
        return (
          <div className="row" key={c.id} style={{borderBottom:"none",padding:"7px 12px"}}>
            <span className="rk">{c.curatedRank?.current && c.curatedRank.current<=25 ? c.curatedRank.current : ""}</span>
            <div className="team-mini" style={{flex:1}}>
              <img src={logoOf(c.team)} alt=""/>
              <span className={"nm "+(state==="post"?(win?"win":"lose"):"")}>{c.team?.displayName||c.team?.name}</span>
            </div>
            {state!=="pre" && <span className={"score mono-num "+(state==="post"?(win?"win":"lose"):"")}>{c.score}</span>}
          </div>
        );
      })}
    </div>
  );
}

/* ---------- RANKINGS ---------- */
function Rankings({ teamId }) {
  const { data, err, loading, reload } = useData(() => getJSON(URLS.rankings()), []);
  const [poll, setPoll] = useState(0);
  if (loading) return <Loading rows={10}/>;
  if (err) return <ErrBox msg={err} retry={reload}/>;
  const polls = (data?.rankings || []).filter(r => r.ranks?.length);
  if (!polls.length) return <Empty>Polls aren't out yet. They post in preseason and update weekly.</Empty>;
  const p = polls[Math.min(poll, polls.length-1)];
  return (
    <>
      <div className="section-title" style={{gap:8,flexWrap:"wrap"}}>
        {polls.map((r,i)=>(
          <button key={i} className={"chip"+(i===poll?"":"")} style={i===poll?{borderColor:"var(--accent)",color:"var(--text)"}:null}
            onClick={()=>setPoll(i)}>{r.shortName||r.name}</button>
        ))}
      </div>
      <div className="card">
        {p.ranks.map(rk => {
          const t = rk.team; const mine = String(t?.id)===String(teamId);
          const trend = rk.trend && rk.trend!=="-" ? rk.trend : null;
          return (
            <div className="row" key={rk.current} style={mine?{background:"var(--primary-soft)"}:null}>
              <span className="rk" style={{fontSize:15}}>{rk.current}</span>
              <div className="team-mini" style={{flex:1}}>
                <img src={t?.logo||logoOf(t)} alt=""/>
                <span className="nm">{t?.location||t?.nickname||t?.name}</span>
              </div>
              <span className="ng-meta mono-num">{rk.recordSummary||""}</span>
              {trend && <span className="badge" style={{background:"var(--card2)",color:trend.startsWith("-")?"#ff8787":"#69db7c"}}>{trend}</span>}
            </div>
          );
        })}
      </div>
    </>
  );
}

/* ---------- STANDINGS ---------- */
function Standings({ year, team, teams }) {
  const { data, err, loading, reload } = useData(() => getJSON(URLS.standings(year)), [year]);
  const myConf = useMemo(() => null, []);
  if (loading) return <Loading rows={10}/>;
  if (err) return <ErrBox msg={err} retry={reload}/>;
  const kids = data?.children || data?.standings?.children || [];
  if (!kids.length) return <Empty>Standings populate once the season kicks off.</Empty>;
  // show the team's conference first
  const ordered = kids.slice().sort((a,b)=>{
    const has = c => (c.standings?.entries||[]).some(e=>String(e.team?.id)===String(team.id));
    return (has(b)?1:0)-(has(a)?1:0);
  });
  return (
    <>
      {ordered.map(conf => {
        const entries = conf.standings?.entries || [];
        return (
          <div key={conf.id || conf.name}>
            <div className="section-title">{conf.name}</div>
            <div className="card">
              {entries.map(e => {
                const overall = stat(e,"overall") || stat(e,"total") || "";
                const cf = stat(e,"vsConf") || stat(e,"conf") || "";
                const mine = String(e.team?.id)===String(team.id);
                return (
                  <div className="row" key={e.team?.id} style={mine?{background:"var(--primary-soft)"}:null}>
                    <div className="team-mini" style={{flex:1}}>
                      <img src={logoOf(e.team)||logoOf(teams[e.team?.id])} alt=""/>
                      <span className="nm">{e.team?.displayName||e.team?.location}</span>
                    </div>
                    <span className="ng-meta mono-num" style={{minWidth:54}}>{cf}</span>
                    <span className="score mono-num" style={{minWidth:54,fontSize:14}}>{overall}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </>
  );
}
function stat(entry, key) {
  const s = (entry.stats||[]).find(x => x.name===key || x.type===key || x.shortDisplayName?.toLowerCase()===key.toLowerCase());
  return s?.displayValue;
}

/* ---------- PICK'EM ---------- */
function loadPicks(){ try{ return JSON.parse(localStorage.getItem("cfb_picks")||"{}"); }catch{ return {}; } }
function savePicks(p){ try{ localStorage.setItem("cfb_picks", JSON.stringify(p)); }catch{} }

function Pickem({ teamId, year, teams }) {
  const [week, setWeek] = useState(1);
  const [showAll, setShowAll] = useState(false);
  const [picks, setPicks] = useState(loadPicks);
  const { data, err, loading, reload } = useData(() => getJSON(URLS.scoreboard(year, week)), [year, week]);
  const events = data?.events || [];

  // curated slate: your team + games involving ranked teams, sorted by relevance
  const slate = useMemo(() => {
    const rankOf = e => Math.min(...e.competitions[0].competitors.map(c => c.curatedRank?.current || 99));
    const mine = e => e.competitions?.[0]?.competitors?.some(c => String(c.team?.id)===String(teamId));
    let list = events.filter(e => e.competitions?.[0]);
    if (!showAll) list = list.filter(e => mine(e) || rankOf(e) <= 25);
    return list.sort((a,b)=> (mine(b)?1:0)-(mine(a)?1:0) || rankOf(a)-rankOf(b)).slice(0, showAll?300:30);
  }, [events, teamId, showAll]);

  // auto-grade finals that have a pick but no recorded result yet
  useEffect(() => {
    let changed = false; const next = { ...picks };
    events.forEach(ev => {
      const comp = ev.competitions?.[0]; if (!comp?.status?.type?.completed) return;
      const k = `${year}-${week}-${ev.id}`; const p = next[k];
      if (p && p.correct == null) {
        const win = comp.competitors.find(c => c.winner);
        if (win) { next[k] = { team: p.team, correct: String(win.team?.id)===String(p.team) }; changed = true; }
      }
    });
    if (changed) { setPicks(next); savePicks(next); }
  // eslint-disable-next-line
  }, [events, week, year]);

  function pick(ev, tid) {
    const comp = ev.competitions?.[0];
    if (comp?.status?.type?.completed) return; // locked
    const k = `${year}-${week}-${ev.id}`;
    const next = { ...picks, [k]: { team: tid, correct: null } };
    setPicks(next); savePicks(next);
  }

  const graded = Object.values(picks).filter(p => p.correct != null);
  const right = graded.filter(p => p.correct).length;

  return (
    <>
      <div className="section-title">Pick'em
        <select className="input" style={{width:118,padding:"6px 8px",fontSize:13}}
          value={week} onChange={e=>setWeek(+e.target.value)}>
          {Array.from({length:15},(_,i)=>i+1).map(w=><option key={w} value={w}>Week {w}</option>)}
        </select>
      </div>
      <div className="card" style={{display:"flex",alignItems:"center",padding:"12px 14px",marginBottom:12}}>
        <div>
          <div className="ng-label">Season record</div>
          <div className="display mono-num" style={{fontSize:24,fontWeight:700}}>
            {right}<span style={{color:"var(--muted)",fontSize:16}}>–{graded.length-right}</span>
          </div>
        </div>
        <div style={{marginLeft:"auto",textAlign:"right"}}>
          <div className="ng-label">Accuracy</div>
          <div className="display mono-num" style={{fontSize:24,fontWeight:700,color:"var(--accent)"}}>
            {graded.length ? Math.round(100*right/graded.length) : 0}%
          </div>
        </div>
      </div>

      {loading ? <Loading rows={6}/> : err ? <ErrBox msg={err} retry={reload}/> :
        !slate.length ? <Empty>No games for week {week} of {year} yet.{" "}
          <button onClick={()=>setShowAll(true)} style={{color:"var(--accent)",fontWeight:600}}>Show all</button></Empty> :
        <>
          <div className="grid cols2">
            {slate.map(ev => <PickGame key={ev.id} ev={ev} teamId={teamId}
              pickKey={`${year}-${week}-${ev.id}`} picks={picks} onPick={pick} />)}
          </div>
          <button className="btn ghost" style={{marginTop:14,width:"100%"}}
            onClick={()=>setShowAll(s=>!s)}>{showAll?"Show ranked & my-team only":"Show every FBS game"}</button>
        </>}
    </>
  );
}
function PickGame({ ev, teamId, pickKey, picks, onPick }) {
  const comp = ev.competitions[0];
  const st = comp.status?.type; const done = st?.completed;
  const p = picks[pickKey];
  const cs = comp.competitors;
  const mineGame = cs.some(c=>String(c.team?.id)===String(teamId));
  return (
    <div className="card" style={mineGame?{outline:"1px solid var(--accent)"}:null}>
      <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px 2px"}}>
        <span className="ng-label">{fmtShort(ev.date)}</span>
        {done && p && <span className={"badge "+(p.correct?"win":"loss")}>{p.correct?"✓ Correct":"✗ Miss"}</span>}
        {done && !p && <span className="badge final">Final</span>}
        {!done && <span className="ng-label">{st?.shortDetail||"Tap to pick"}</span>}
      </div>
      {cs.map(c => {
        const picked = p?.team===String(c.team?.id) || p?.team===c.team?.id;
        const win = done && c.winner;
        return (
          <button key={c.id} onClick={()=>onPick(ev, String(c.team?.id))}
            className="row" disabled={done}
            style={{width:"100%",borderBottom:"none",padding:"9px 12px",textAlign:"left",
              background:picked?"var(--primary-soft)":"transparent",
              outline:picked?"1px solid var(--accent)":"none",borderRadius:9,margin:"2px 6px",cursor:done?"default":"pointer"}}>
            <span className="rk">{c.curatedRank?.current&&c.curatedRank.current<=25?c.curatedRank.current:""}</span>
            <div className="team-mini" style={{flex:1}}>
              <img src={logoOf(c.team)} alt=""/>
              <span className={"nm "+(done?(win?"win":"lose"):"")}>{c.team?.displayName||c.team?.name}</span>
            </div>
            {done && <span className={"score mono-num "+(win?"win":"lose")}>{c.score}</span>}
            {!done && picked && <span className="badge soon">Pick</span>}
          </button>
        );
      })}
    </div>
  );
}

/* ---------- COMPARE (radar + stat bars) ---------- */
const CMP_AXES = [
  { key:"winPercent", label:"Win %", names:["winPercent","winpercent"], better:"high", fmt:v=>(v*100).toFixed(0)+"%" },
  { key:"avgPF", label:"Pts For/G", names:["avgPointsFor","pointsForPerGame"], better:"high", fmt:v=>v.toFixed(1) },
  { key:"avgPA", label:"Scoring D", names:["avgPointsAgainst","pointsAgainstPerGame"], better:"low", fmt:v=>v.toFixed(1) },
  { key:"diff", label:"Pt Diff", names:["pointDifferential","differential"], better:"high", fmt:v=>(v>0?"+":"")+v },
  { key:"wins", label:"Wins", names:["wins"], better:"high", fmt:v=>String(v) },
];
function teamStat(detail, names){
  const stats = detail?.record?.items?.[0]?.stats || [];
  for (const n of names){ const s = stats.find(x=>x.name===n); if (s && s.value!=null) return s.value; }
  return null;
}
function Compare({ team, teams, detail }) {
  const opts = useMemo(()=>Object.values(teams).sort((a,b)=>a.displayName.localeCompare(b.displayName)),[teams]);
  const nextOppId = detail?.nextEvent?.[0]?.competitions?.[0]?.competitors
    ?.find(c=>String(c.team?.id)!==String(team.id))?.team?.id;
  const [bId, setBId] = useState(()=> (nextOppId && teams[nextOppId]) ? String(nextOppId) : (opts.find(t=>t.id!==team.id)?.id));
  const [dA, setDA] = useState(null); const [dB, setDB] = useState(null);
  const [loading, setLoading] = useState(true);
  const teamB = teams[bId];

  useEffect(()=>{ let on=true; setLoading(true);
    Promise.all([ getJSON(URLS.team(team.id)).catch(()=>null), getJSON(URLS.team(bId)).catch(()=>null) ])
      .then(([a,b])=>{ if(on){ setDA(a?.team||detail); setDB(b?.team); setLoading(false); } });
    return ()=>{on=false;};
  },[team.id,bId]);

  const axes = useMemo(()=>{
    if(!dA||!dB) return [];
    return CMP_AXES.map(ax=>{
      let a = teamStat(dA, ax.names), b = teamStat(dB, ax.names);
      if(a==null||b==null) return null;
      // normalize 0.12..1 across the pair; invert when lower is better
      let na=a, nb=b;
      if(ax.better==="low"){ na=-a; nb=-b; }
      const lo=Math.min(na,nb), hi=Math.max(na,nb), span=(hi-lo)||1;
      return { ...ax, a, b, na:0.18+0.82*(na-lo)/span, nb:0.18+0.82*(nb-lo)/span };
    }).filter(Boolean);
  },[dA,dB]);

  return (
    <>
      <div className="section-title">Head to head</div>
      <div className="cmp-head card">
        <div className="cmp-team">
          <img src={logoOf(team)} alt=""/>
          <div className="cmp-nm">{team.shortDisplayName||team.nickname||team.name}</div>
          <div className="ng-meta mono-num">{dA?.record?.items?.[0]?.summary||""}</div>
        </div>
        <div className="cmp-vs">VS</div>
        <div className="cmp-team">
          <img src={teamB?logoOf(teamB):""} alt=""/>
          <select className="cmp-select" value={bId} onChange={e=>setBId(e.target.value)}>
            {opts.filter(t=>t.id!==team.id).map(t=><option key={t.id} value={t.id}>{t.displayName}</option>)}
          </select>
          <div className="ng-meta mono-num">{dB?.record?.items?.[0]?.summary||""}</div>
        </div>
      </div>

      {loading ? <Loading rows={5}/> :
        !axes.length ? <Empty>Stats aren't available for both teams yet — they fill in once games are played. Switch the season to a completed year in ⚙ to see a full comparison.</Empty> :
        <>
          {axes.length>=3 && <Radar axes={axes} />}
          <div className="card" style={{marginTop:12}}>
            {axes.map(ax=>(
              <div className="cmp-row" key={ax.key}>
                <span className="cmp-val mono-num" style={{textAlign:"right",color:cmpWin(ax,"a")?"var(--accent)":"var(--muted)"}}>{ax.fmt(ax.a)}</span>
                <div className="cmp-bars">
                  <div className="cmp-label">{ax.label}</div>
                  <div className="cmp-track"><div className="cmp-fill left" style={{width:(ax.na*50)+"%"}}/><div className="cmp-fill right" style={{width:(ax.nb*50)+"%"}}/></div>
                </div>
                <span className="cmp-val mono-num" style={{color:cmpWin(ax,"b")?"var(--accent)":"var(--muted)"}}>{ax.fmt(ax.b)}</span>
              </div>
            ))}
          </div>
        </>}
    </>
  );
}
function cmpWin(ax, side){ const a=ax.better==="low"?-ax.a:ax.a, b=ax.better==="low"?-ax.b:ax.b; return side==="a"?a>=b:b>a; }

function Radar({ axes }) {
  const size=240, cx=size/2, cy=size/2, r=92, N=axes.length;
  const pt=(val,i)=>{ const ang=-Math.PI/2 + i*2*Math.PI/N; return [cx+Math.cos(ang)*r*val, cy+Math.sin(ang)*r*val]; };
  const poly=key=>axes.map((ax,i)=>pt(ax[key],i).join(",")).join(" ");
  const rings=[0.25,0.5,0.75,1];
  return (
    <div className="card" style={{padding:"14px 0 6px",display:"flex",flexDirection:"column",alignItems:"center"}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {rings.map((rr,ri)=>(
          <polygon key={ri} points={axes.map((_,i)=>pt(rr,i).join(",")).join(" ")}
            fill="none" stroke="var(--line)" strokeWidth="1"/>
        ))}
        {axes.map((_,i)=>{ const [x,y]=pt(1,i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--line)" strokeWidth="1"/>; })}
        <polygon points={poly("nb")} fill="rgba(140,150,165,.18)" stroke="var(--muted)" strokeWidth="2"/>
        <polygon points={poly("na")} fill="var(--primary-soft)" stroke="var(--accent)" strokeWidth="2.5"/>
        {axes.map((ax,i)=>{ const [x,y]=pt(1.16,i); return (
          <text key={i} x={x} y={y} fontSize="9.5" fontFamily="Oswald" fill="var(--muted)"
            textAnchor="middle" dominantBaseline="middle" style={{textTransform:"uppercase",letterSpacing:".5px"}}>{ax.label}</text>
        );})}
      </svg>
      <div style={{display:"flex",gap:18,fontSize:12,fontWeight:600,paddingBottom:6}}>
        <span style={{color:"var(--accent)"}}>● Your team</span>
        <span style={{color:"var(--muted)"}}>● Opponent</span>
      </div>
    </div>
  );
}

/* ---------- AI ANALYST ---------- */
function Analyst({ team, detail, year, openSettings }) {
  const [out, setOut] = useState("");
  const [busy, setBusy] = useState(false);
  const [q, setQ] = useState("");
  const hasKey = !!localStorage.getItem("cfb_anthropic_key");

  async function run(prompt, useSearch) {
    const key = localStorage.getItem("cfb_anthropic_key");
    if (!key) { openSettings(); return; }
    setBusy(true); setOut("");
    const sys = `You are a sharp, concise college football analyst for a fan of ${team.displayName}. `
      + `It is the ${year} season. Use real, current specifics where you can; never invent scores or stats you're unsure of. `
      + `Keep it tight and readable — short paragraphs, no fluff.`;
    const body = { model:"claude-sonnet-4-6", max_tokens:1300, system:sys, messages:[{role:"user",content:prompt}] };
    if (useSearch) body.tools = [{ type:"web_search_20250305", name:"web_search" }];
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "content-type":"application/json", "x-api-key":key,
          "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (d.error) { setOut("⚠️ " + d.error.message); }
      else setOut((d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim() || "No response.");
    } catch (e) { setOut("⚠️ "+(e.message||"Request failed.")); }
    finally { setBusy(false); }
  }

  const presets = [
    ["Season outlook", `Give me a ${year} season outlook for ${team.displayName}: expectations, key games, and what success looks like.`, true],
    ["Next game preview", `Preview ${team.displayName}'s next ${year} game — matchup, what to watch, and a prediction.`, true],
    ["Recruiting & roster", `What should ${team.displayName} fans know about the current roster and recent recruiting heading into ${year}?`, true],
    ["Playoff path", `Lay out a realistic College Football Playoff path for ${team.displayName} in ${year}.`, true],
  ];

  return (
    <>
      <div className="section-title">Analyst</div>
      {!hasKey && (
        <div className="err" style={{borderColor:"#5a4a2b",background:"#241f14",color:"#ffe2a8",marginBottom:14}}>
          <span>🔑</span><div>Add your Anthropic API key in <button onClick={openSettings} style={{color:"#ffd98a",textDecoration:"underline",fontWeight:600}}>settings</button> to use the analyst. It's stored only on this device.</div>
        </div>
      )}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        {presets.map(([label,p,s])=>(
          <button key={label} className="chip" disabled={busy} onClick={()=>run(p,s)}>{label}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input className="input" placeholder={`Ask anything about ${team.shortDisplayName||team.nickname||"the team"}…`}
          value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&q.trim())run(q,true);}}/>
        <button className="btn" disabled={busy||!q.trim()} onClick={()=>run(q,true)}>Ask</button>
      </div>
      {busy && <div className="spin"/>}
      {out && !busy && <div className="ai-out">{out}</div>}
      {!out && !busy && <div className="empty">Pick a prompt above or ask your own. Answers can pull live info from the web.</div>}
    </>
  );
}

/* ---------- TEAM SWITCHER ---------- */
function Switcher({ teams, confMap, current, onPick, onClose }) {
  const [qy, setQy] = useState("");
  const ref = useRef();
  useEffect(()=>{ ref.current?.focus(); },[]);
  const all = Object.values(teams).sort((a,b)=>a.displayName.localeCompare(b.displayName));
  const q = qy.trim().toLowerCase();
  const filt = (t) => !q || t.displayName.toLowerCase().includes(q) || (t.abbreviation||"").toLowerCase().includes(q);

  let body;
  if (q) {
    const res = all.filter(filt).slice(0,40);
    body = res.length ? res.map(t=><Opt key={t.id} t={t} sel={t.id===current} onPick={onPick}/>)
                      : <div className="empty">No team matches “{qy}”.</div>;
  } else if (confMap) {
    body = confMap.map(c => (
      <div key={c.name}>
        <div className="conf-h">{c.name}</div>
        {c.teamIds.map(id=>teams[id]).filter(Boolean)
          .sort((a,b)=>a.displayName.localeCompare(b.displayName))
          .map(t=><Opt key={t.id} t={t} sel={t.id===current} onPick={onPick}/>)}
      </div>
    ));
  } else {
    body = <>
      <div className="conf-h">All FBS teams</div>
      {all.map(t=><Opt key={t.id} t={t} sel={t.id===current} onPick={onPick}/>)}
    </>;
  }
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-head">
          <h3>Choose team</h3>
          <input ref={ref} className="search" placeholder="Search teams…" value={qy} onChange={e=>setQy(e.target.value)}/>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body">{body}</div>
      </div>
    </div>
  );
}
function Opt({ t, sel, onPick }) {
  return (
    <button className={"team-opt"+(sel?" sel":"")} onClick={()=>onPick(t.id)}>
      <img src={logoOf(t)} alt=""/>
      <span style={{fontWeight:600,fontSize:14}}>{t.displayName}</span>
    </button>
  );
}

/* ---------- SETTINGS ---------- */
function Settings({ year, setYear, onClose }) {
  const [key, setKey] = useState(localStorage.getItem("cfb_anthropic_key")||"");
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxWidth:460}}>
        <div className="sheet-head"><h3>Settings</h3><button className="close-x" style={{marginLeft:"auto"}} onClick={onClose}>✕</button></div>
        <div className="sheet-body" style={{padding:16}}>
          <div className="label">Season</div>
          <div style={{display:"flex",gap:8}}>
            {[2026,2025].map(y=>(
              <button key={y} className={"chip"} style={y===year?{borderColor:"var(--accent)",color:"var(--text)"}:null}
                onClick={()=>setYear(y)}>{y}</button>
            ))}
          </div>
          <div className="label">Data proxy URL (optional — fixes "failed to fetch")</div>
          <input className="input" placeholder="https://your-worker.workers.dev/?url=" defaultValue={(()=>{try{return localStorage.getItem("cfb_proxy")||"";}catch(e){return "";}})()}
            onChange={e=>{ try{ const v=e.target.value.trim(); v?localStorage.setItem("cfb_proxy",v):localStorage.removeItem("cfb_proxy"); }catch(_){} }}/>
          <div className="ng-label" style={{textTransform:"none",letterSpacing:0,margin:"6px 0 12px",lineHeight:1.5}}>
            ESPN blocks direct browser calls. Leave blank to use public relays, or paste your own proxy (must end with the encoded target, e.g. <code>?url=</code>). Reload after changing.
          </div>
          <div className="label">Anthropic API key (for the Analyst tab)</div>
          <input className="input" type="password" placeholder="sk-ant-…" value={key} onChange={e=>setKey(e.target.value)}/>
          <div className="ng-label" style={{textTransform:"none",letterSpacing:0,margin:"8px 0 16px",lineHeight:1.5}}>
            Stored only in this browser (localStorage). Used to call the Anthropic API directly from the page.
          </div>
          <button className="btn" style={{width:"100%"}} onClick={()=>{
            localStorage.setItem("cfb_anthropic_key",key.trim()); onClose();
          }}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- shared bits ---------- */
function useData(fn, deps) {
  const [data,setData]=useState(null);const [err,setErr]=useState(null);const [loading,setLoading]=useState(true);
  const [n,setN]=useState(0);
  useEffect(()=>{ let on=true; setLoading(true); setErr(null);
    fn().then(d=>{if(on){setData(d);setLoading(false);}}).catch(e=>{if(on){setErr(e.message||"Failed");setLoading(false);}});
    return ()=>{on=false;};
  // eslint-disable-next-line
  },[...deps,n]);
  return { data, err, loading, reload:()=>setN(x=>x+1) };
}
const Loading = ({rows=6}) => <div style={{marginTop:14}}>{Array.from({length:rows}).map((_,i)=><div className="skel" key={i}/>)}</div>;
const Empty = ({children}) => <div className="empty">{children}</div>;
const ErrBox = ({msg,retry}) => <div className="err" style={{marginTop:14}}><span>⚠️</span><div>{msg}. <button onClick={retry}>Retry</button></div></div>;

function fmtDate(d){ if(!d)return""; try{return new Date(d).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});}catch{return"";} }
function fmtShort(d){ if(!d)return""; try{return new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"});}catch{return"";} }
function shorten(s){ return s && s.length>46 ? s.slice(0,44)+"…" : (s||""); }

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

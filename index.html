<style>
  :root{
    --bg:#0a0d12; --bg2:#11161d; --card:#161c25; --card2:#1d2531;
    --line:#262f3d; --text:#eef2f7; --muted:#8b97a8; --muted2:#5d6776;
    /* team theme (overwritten at runtime) */
    --primary:#00274c; --accent:#ffcb05; --on-primary:#ffffff; --on-accent:#00274c;
    --primary-soft:rgba(0,39,76,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{padding-bottom:env(safe-area-inset-bottom)}
  button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
  a{color:inherit}
  .display{font-family:Oswald,Inter,sans-serif;letter-spacing:.01em}
  .mono-num{font-variant-numeric:tabular-nums}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  /* ---- Hero / team identity ---- */
  .hero{position:relative;overflow:hidden;background:var(--primary);color:var(--on-primary)}
  .hero-stripe{height:4px;background:var(--accent)}
  .hero-inner{position:relative;max-width:1100px;margin:0 auto;padding:18px 16px 16px;display:flex;gap:16px;align-items:center;z-index:2}
  .hero-logo{width:74px;height:74px;object-fit:contain;flex:0 0 auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.45))}
  .hero-watermark{position:absolute;right:-30px;top:50%;transform:translateY(-50%);width:230px;opacity:.08;pointer-events:none;z-index:1}
  .hero h1{font-family:Oswald;font-weight:700;font-size:30px;line-height:1;margin:0;text-transform:uppercase}
  .hero .sub{font-size:13px;opacity:.85;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .pill.accent{background:var(--accent);color:var(--on-accent)}
  .hero-actions{margin-left:auto;display:flex;gap:8px;z-index:3}
  .icon-btn{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 11px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;color:var(--on-primary)}
  .icon-btn:hover{background:rgba(255,255,255,.22)}

  /* ---- Next game card in hero ---- */
  .nextgame{max-width:1100px;margin:0 auto;padding:0 16px}
  .nextgame-card{margin-top:-10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;position:relative;z-index:4;box-shadow:0 12px 30px rgba(0,0,0,.3)}
  .ng-label{font-family:Oswald;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .ng-team{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px}
  .ng-team img{width:26px;height:26px;object-fit:contain}
  .ng-mid{color:var(--muted);font-family:Oswald;font-size:13px}
  .ng-meta{margin-left:auto;text-align:right;font-size:12px;color:var(--muted)}

  /* ---- Tabs ---- */
  .tabs-wrap{background:var(--bg);border-bottom:1px solid var(--line)}
  .tabs{max-width:1100px;margin:0 auto;display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;justify-content:center}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;font-family:Oswald;text-transform:uppercase;letter-spacing:.03em;font-size:12px;font-weight:600;color:var(--muted);padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:var(--card)}
  .tab.active{color:var(--text);background:var(--primary-soft);border-color:var(--accent)}
  .tab:hover{color:var(--text)}

  .wrap{max-width:1100px;margin:0 auto;padding:6px 16px 60px}
  .section-title{font-family:Oswald;text-transform:uppercase;letter-spacing:.06em;font-size:13px;color:var(--muted);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:13px}
  .row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .grid{display:grid;gap:10px}
  @media(min-width:720px){.grid.cols2{grid-template-columns:1fr 1fr}}

  /* ===== stadium gameday v2 — eye-popping visual system ===== */
  :root{ --grid-line: rgba(255,255,255,.028); }
  #root{ position:relative; z-index:1; }
  body{ background:var(--bg); }
  body::before{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(130% 90% at 50% -20%, color-mix(in srgb, var(--primary) 42%, transparent), transparent 62%),
      repeating-linear-gradient(90deg, transparent 0 46px, var(--grid-line) 46px 47px),
      radial-gradient(140% 120% at 50% 42%, transparent 55%, rgba(0,0,0,.55) 100%); }
  body::after{ content:""; position:fixed; inset:-25%; z-index:0; pointer-events:none; opacity:.55; mix-blend-mode:screen;
    background:
      radial-gradient(38% 28% at 18% 4%, color-mix(in srgb, var(--accent) 26%, transparent), transparent 70%),
      radial-gradient(42% 30% at 82% 8%, color-mix(in srgb, var(--primary) 42%, transparent), transparent 72%);
    animation: aura 20s ease-in-out infinite alternate; }
  @keyframes aura{ from{ transform:translate3d(0,0,0) } to{ transform:translate3d(0,-4%,0) scale(1.06) } }

  .atmos{ position:absolute; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }
  .hero, .gd-hero{ position:relative; overflow:hidden; }
  .hero > *:not(.atmos):not(.field):not(.hero-lights):not(.hero-watermark), .gd-hero > *:not(.atmos):not(.field):not(.hero-lights):not(.hero-watermark){ position:relative; z-index:1; }
  .confetti-cv{ position:fixed; inset:0; width:100vw; height:100vh; z-index:9999; pointer-events:none; }
  @keyframes shakeK{ 0%,100%{transform:translate(0,0)} 20%{transform:translate(-6px,3px) rotate(-.4deg)} 40%{transform:translate(6px,-3px) rotate(.4deg)} 60%{transform:translate(-4px,2px)} 80%{transform:translate(4px,-2px)} }
  .shake{ animation: shakeK .46s cubic-bezier(.36,.07,.19,.97); }

  .hero h1{ font-family:"Anton","Oswald",sans-serif; font-weight:400; letter-spacing:.6px; font-size:clamp(28px,7vw,46px); line-height:.98; text-transform:uppercase; text-shadow:0 2px 30px color-mix(in srgb,var(--accent) 30%, transparent); }
  .gd-title{ font-family:"Anton","Oswald",sans-serif !important; letter-spacing:.5px; }
  .cd-clock, .gd-clock{ font-family:"Anton","Oswald",monospace !important; letter-spacing:1px; }

  .hero-logo{ filter: drop-shadow(0 6px 22px color-mix(in srgb,var(--accent) 45%, transparent)); animation: floaty 5.5s ease-in-out infinite; }
  @keyframes floaty{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .hero::after{ content:""; position:absolute; top:0; left:-60%; width:55%; height:100%; z-index:2; pointer-events:none;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.10), transparent); transform:skewX(-18deg);
    animation: sweep 7s ease-in-out 1.2s infinite; }
  @keyframes sweep{ 0%{left:-60%} 55%,100%{left:130%} }

  .card{ border-radius:16px; border:1px solid color-mix(in srgb, var(--accent) 10%, var(--line)); box-shadow:0 12px 30px -20px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.03); transition:transform .18s ease, box-shadow .28s ease, border-color .28s ease; animation: rise .45s ease both; }
  .card:hover{ transform:translateY(-3px); box-shadow:0 20px 44px -22px color-mix(in srgb,var(--accent) 55%, rgba(0,0,0,.9)); border-color:color-mix(in srgb,var(--accent) 34%, var(--line)); }
  @keyframes rise{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

  .section-title{ position:relative; padding-left:14px; }
  .section-title::before{ content:""; position:absolute; left:0; top:50%; width:5px; height:1.05em; transform:translateY(-50%); border-radius:2px; background:linear-gradient(var(--accent), color-mix(in srgb,var(--accent) 40%, transparent)); box-shadow:0 0 12px color-mix(in srgb,var(--accent) 60%, transparent); }

  .cfb-countdown{ position:relative; overflow:hidden; }
  .cd-clock{ text-shadow:0 0 18px color-mix(in srgb,var(--accent) 55%, transparent); animation: pulseGlow 2.4s ease-in-out infinite; }
  @keyframes pulseGlow{ 0%,100%{ text-shadow:0 0 14px color-mix(in srgb,var(--accent) 40%,transparent) } 50%{ text-shadow:0 0 26px color-mix(in srgb,var(--accent) 82%,transparent) } }
  .gd-clock{ text-shadow:0 0 22px color-mix(in srgb,var(--accent) 60%, transparent); }

  .pred-bar{ position:relative; overflow:hidden; animation: wipe 1s cubic-bezier(.2,.8,.2,1) both; }

  .pred-bar::after{ content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.28) 50%,transparent 70%); transform:translateX(-120%); animation: shineB 2.8s ease-in-out 1s infinite; }
  @keyframes shineB{ 0%{transform:translateX(-120%)} 55%,100%{transform:translateX(220%)} }

  .tab{ transition:background .2s, border-color .2s, color .2s, box-shadow .2s; }
  .tab.active{ box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 40%, transparent), 0 6px 18px -8px color-mix(in srgb,var(--accent) 70%, transparent); }

  .btn, .icon-btn, .chip{ transition:transform .12s ease, background .2s, border-color .2s, box-shadow .2s; }
  .btn:active, .icon-btn:active, .chip:active{ transform:scale(.95); }
  .gd-fight{ box-shadow:0 8px 24px -10px color-mix(in srgb,var(--accent) 80%, transparent); }

  .livedot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:#ff3b3b; animation: live 1.4s ease-out infinite; margin-right:5px; }

    background:linear-gradient(105deg, transparent 42%, rgba(255,244,200,.13) 50%, transparent 58%);
    transform:translateX(-130%); animation:satSweep 6.5s ease-in-out infinite; }
  @keyframes satSweep{ 0%{ transform:translateX(-130%) } 55%,100%{ transform:translateX(130%) } }
  .satmode .cd-clock, .satmode .gd-clock{ display:inline-block; background:#0a0f0a; color:#ffd23d; padding:5px 12px 6px; border-radius:9px;
    box-shadow:inset 0 0 0 1px #202a1a, inset 0 2px 10px rgba(0,0,0,.85), 0 0 20px rgba(255,210,61,.16);
    text-shadow:0 0 10px rgba(255,210,61,.75); position:relative; }
  .satmode .cd-clock::after, .satmode .gd-clock::after{ content:""; position:absolute; inset:0; border-radius:9px; pointer-events:none;
    background:repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,.20) 2px 3px); }
  .satmode .lb-side b{ color:#ffd23d; text-shadow:0 0 10px rgba(255,210,61,.7); }
  .satmode .dock{ border-color:color-mix(in srgb,var(--accent) 42%, var(--line));
    box-shadow:0 12px 34px rgba(0,0,0,.55), 0 0 26px color-mix(in srgb,var(--accent) 16%, transparent), inset 0 1px 0 rgba(255,255,255,.06); }
  .sat-sweep{ position:fixed; inset:0; z-index:95; pointer-events:none;
    background:linear-gradient(105deg, transparent 40%, rgba(255,244,200,.22) 50%, transparent 60%);
    transform:translateX(-140%); animation:satSweepOnce .9s ease-out forwards; }
  @keyframes satSweepOnce{ to{ transform:translateX(140%) } }
  @media (prefers-reduced-motion:reduce){
    .sat-badge{ animation:none; }
    .satmode .hero::after{ animation:none; opacity:0; }
    .sat-sweep{ animation:none; opacity:0; }
  }

  .hype-art-note{ display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--muted); margin:7px 2px 0; line-height:1.4; }
  .hype-art-note.ok{ color:var(--accent); }
  .hype-art-note.warn{ color:#ffce7a; }

  /* change-log: form v2, scouting, featured roster */
  .form-cell{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  .form-opp{ font-size:9px; color:var(--muted); letter-spacing:.02em; max-width:36px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .form-note{ font-weight:400; font-size:10.5px; color:var(--muted); letter-spacing:.06em; margin-left:8px; text-transform:none; }
  .form-row{ align-items:flex-start; }
  .form-ab{ padding-top:6px; }
  .scout-note{ font-size:12.5px; color:var(--muted); margin-top:3px; line-height:1.45; }
  .scout-edge{ display:flex; gap:7px; align-items:flex-start; font-size:13px; padding:4px 0; line-height:1.45; }
  .scout-edge .ic{ margin-top:2.5px; color:var(--accent); flex:none; }
  .scout-edge.xf{ color:var(--accent); }
  .more-item.mi-feat{ grid-column:1 / -1; flex-direction:row; justify-content:center; gap:10px;
    background:color-mix(in srgb,var(--accent) 9%, var(--card));
    box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 38%, transparent); }
  .mi-sub{ display:block; font-size:9.5px; color:var(--muted); letter-spacing:.05em; font-weight:500; margin-top:1px; }

  /* UX polish drop: compact header, labeled prob, sheets, toasts */
  .hero-mini{ position:sticky; top:0; z-index:55; display:flex; align-items:center; gap:9px;
    padding:calc(env(safe-area-inset-top, 0px) + 10px) 14px 10px; min-height:56px;
    background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line); }
  .hm-logo{ width:30px; height:30px; object-fit:contain; }
  .hm-name{ font-family:"Anton",Oswald,sans-serif; font-size:17px; letter-spacing:.06em; }
  .hm-rec{ font-family:Oswald; font-weight:600; font-size:12px; color:var(--muted); background:var(--card2); border-radius:999px; padding:2px 9px; }
  .hm-spacer{ flex:1; }
  .hero-mini .icon-btn{ padding:7px 11px; }
  .prob-row{ display:flex; align-items:center; gap:8px; }
  .prob-row .pred-bar{ flex:1; }
  .prob-logo{ width:24px; height:24px; object-fit:contain; flex:none; }
  .app-toast{ position:fixed; left:50%; transform:translateX(-50%); bottom:calc(env(safe-area-inset-bottom, 0px) + 96px);
    z-index:86; background:var(--card); border:1px solid color-mix(in srgb,var(--accent) 45%, var(--line));
    color:var(--text); font-size:13.5px; font-weight:600; padding:10px 16px; border-radius:999px;
    box-shadow:0 10px 30px rgba(0,0,0,.5); animation:rise .3s both; max-width:88vw; text-align:center; }
  .sheet .sheet-grab, .more-sheet .sheet-grab{ width:44px; height:4px; border-radius:99px; background:var(--line); margin:4px auto 10px; flex:none; }
  .sheet{ touch-action:pan-y; }
  @media (prefers-reduced-motion:reduce){ .app-toast{ animation:none; } }

  /* fast-follow: week rail, tappable countdown, living empties */
  .wk-rail{ display:flex; gap:8px; overflow-x:auto; padding:2px 2px 12px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .wk-rail::-webkit-scrollbar{ display:none; }
  .wk-rail .chip{ flex:none; }
  .cfb-countdown.cd-tap{ cursor:pointer; position:relative; transition:transform .12s ease; }
  .cfb-countdown.cd-tap:active{ transform:scale(.985); }
  .cd-chev{ position:absolute; right:12px; top:50%; transform:translateY(-55%); font-size:26px; color:var(--muted); }
  .empty{ display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; padding:34px 22px; color:var(--muted); line-height:1.55; }
  .empty-ic{ opacity:.55; color:var(--accent); }

  .crash{ min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; padding:32px; }
  .crash-msg{ color:var(--muted); font-size:12.5px; max-width:320px; word-break:break-word; }

  /* ===== Premium Drop 1: design tokens ===== */
  .display-num{ font-family:"Anton",Oswald,sans-serif; font-weight:400; letter-spacing:.035em; }
  .card-h{ display:flex; align-items:center; gap:7px; margin:-2px 0 8px; font-family:Oswald; font-weight:600;
    font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:color-mix(in srgb, var(--accent) 75%, var(--muted)); }
  /* ===== Today canvas ===== */
  .td-hero{ position:relative; width:100%; display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;
    padding:22px 16px 20px; margin-bottom:16px; border-radius:20px; border:1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
    background:
      radial-gradient(120% 90% at 50% -20%, color-mix(in srgb, var(--primary) 55%, transparent), transparent 60%),
      linear-gradient(160deg, color-mix(in srgb, var(--accent) 10%, var(--card)), var(--card) 55%);
    box-shadow:0 14px 40px rgba(0,0,0,.45), inset 0 1px 0 color-mix(in srgb, var(--accent) 22%, transparent);
    color:var(--text); cursor:pointer; overflow:hidden; }
  .td-hero::after{ content:""; position:absolute; inset:auto -20% -55% -20%; height:70%;
    background:radial-gradient(60% 100% at 50% 100%, color-mix(in srgb, var(--accent) 16%, transparent), transparent 70%); pointer-events:none; }
  .td-hero:active{ transform:scale(.988); }
  .td-vs{ display:flex; align-items:center; gap:16px; }
  .td-vs img{ width:56px; height:56px; object-fit:contain; filter:drop-shadow(0 6px 14px rgba(0,0,0,.5)); }
  .td-vsword{ font-size:30px; color:var(--accent); text-shadow:0 0 22px color-mix(in srgb, var(--accent) 45%, transparent); }
  .td-opp{ font-family:Oswald; font-weight:600; font-size:15px; letter-spacing:.04em; }
  .td-cd{ font-size:30px; color:var(--accent); line-height:1; }
  .td-kick{ letter-spacing:.14em; }
  .td-meta{ color:var(--muted); font-size:12.5px; }
  .td-live-chip{ position:absolute; top:12px; right:12px; background:#e33; color:#fff; font-family:Oswald; font-weight:700;
    font-size:11px; letter-spacing:.12em; padding:3px 9px; border-radius:99px; animation:pulse 1.6s infinite; }
  .td-scout{ display:block; width:100%; text-align:left; cursor:pointer; margin-bottom:16px; }
  .td-scout-body{ font-size:13.5px; line-height:1.5; }
  .td-more{ margin-top:6px; color:var(--accent); font-family:Oswald; font-weight:600; font-size:12px; letter-spacing:.06em; }
  .td-story{ display:block; overflow:hidden; }
  .td-story-img{ width:calc(100% + 28px); margin:-12px -14px 10px; max-height:170px; object-fit:cover; display:block; }
  .td-story-t{ font-family:Oswald; font-weight:600; font-size:15.5px; line-height:1.35; margin-bottom:6px; }
  /* ===== data-viz ===== */
  .st-bar{ flex:1; max-width:86px; height:5px; border-radius:99px; background:var(--card2); overflow:hidden; }
  .st-bar i{ display:block; height:100%; border-radius:99px; background:linear-gradient(90deg, color-mix(in srgb, var(--accent) 65%, transparent), var(--accent)); }
  .st-rec{ font-size:15px; text-align:right; }
  .trend-chip{ font-family:Oswald; font-weight:700; font-size:10.5px; letter-spacing:.04em; padding:2px 7px; border-radius:99px; }
  .trend-chip.up{ color:#69db7c; background:rgba(105,219,124,.12); }
  .trend-chip.dn{ color:#ff8787; background:rgba(255,135,135,.12); }
  .diff-chip{ font-family:Oswald; font-weight:700; font-size:10.5px; padding:2px 6px; border-radius:8px; margin-left:6px; }
  .diff-chip.up{ color:#69db7c; background:rgba(105,219,124,.1); }
  .diff-chip.dn{ color:#ff8787; background:rgba(255,135,135,.1); }
  .wp-wrap{ margin:14px 0 4px; }
  .wp-chart{ width:100%; height:92px; display:block; border-radius:12px; background:color-mix(in srgb, var(--accent) 5%, var(--card2)); }
  .wp-mid{ stroke:color-mix(in srgb, var(--text) 18%, transparent); stroke-width:1; stroke-dasharray:3 4; }
  .wp-line{ fill:none; stroke:var(--accent); stroke-width:2.2; stroke-linejoin:round; }
  .wp-area{ fill:color-mix(in srgb, var(--accent) 16%, transparent); }
  .wp-dot{ fill:var(--accent); }
  .wp-lbls{ display:flex; justify-content:space-between; align-items:baseline; margin-top:6px; }
  @media (prefers-reduced-motion:reduce){ .td-live-chip{ animation:none; } }

  /* ===== Premium Drop 2: live canvas ===== */
  .lc-scrim{ z-index:72; align-items:flex-end; }
  .lc{ width:100%; max-width:560px; margin:0 auto; max-height:92dvh; overflow-y:auto; border-radius:22px 22px 0 0;
    padding:8px 16px calc(env(safe-area-inset-bottom, 0px) + 18px);
    background:
      radial-gradient(120% 70% at 50% -10%, color-mix(in srgb, var(--primary) 60%, transparent), transparent 60%),
      linear-gradient(170deg, color-mix(in srgb, var(--accent) 8%, var(--bg)), var(--bg) 45%);
    border:1px solid color-mix(in srgb, var(--accent) 30%, var(--line)); border-bottom:none;
    box-shadow:0 -18px 60px rgba(0,0,0,.6); animation:sheetUp .3s cubic-bezier(.2,.9,.3,1); touch-action:pan-y; }
  .lc-status{ display:flex; align-items:center; gap:10px; padding:4px 2px 12px; color:var(--muted); font-family:Oswald; font-weight:600; letter-spacing:.06em; }
  .lc-status .close-x{ margin-left:auto; }
  .lc-live{ background:#e33; color:#fff; font-size:10.5px; letter-spacing:.14em; padding:3px 9px; border-radius:99px; animation:pulse 1.6s infinite; }
  .lc-bug{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:6px 2px 14px; }
  .lc-side{ display:flex; flex-direction:column; align-items:center; gap:6px; width:84px; position:relative; }
  .lc-side img{ width:54px; height:54px; object-fit:contain; filter:drop-shadow(0 6px 14px rgba(0,0,0,.5)); }
  .lc-ab{ font-family:Oswald; font-weight:700; font-size:13px; letter-spacing:.08em; }
  .lc-poss{ width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); animation:pulse 1.4s infinite; }
  .lc-scores{ display:flex; align-items:baseline; gap:10px; font-size:46px; line-height:1; color:var(--text); text-shadow:0 4px 24px rgba(0,0,0,.55); }
  .lc-dash{ color:var(--muted); font-size:30px; }
  .lc-dd{ text-align:center; font-family:Oswald; font-weight:600; letter-spacing:.06em; font-size:13.5px; color:var(--accent);
    background:color-mix(in srgb, var(--accent) 10%, var(--card)); border:1px solid color-mix(in srgb, var(--accent) 30%, var(--line));
    border-radius:999px; padding:6px 14px; margin:0 auto 6px; width:max-content; max-width:100%; }
  .lc-play{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 14px; margin-top:10px; }
  .lc-play-t{ font-size:13.5px; line-height:1.5; }
  .lc-full{ width:100%; margin-top:14px; }
  /* ===== team takeover ===== */
  .tk{ position:fixed; inset:0; z-index:220; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    animation:tkIn .16s ease both, tkOut .3s ease .95s both; pointer-events:none; }
  .tk-wash{ position:absolute; inset:-20%; animation:tkWash .9s cubic-bezier(.2,.8,.2,1) both; }
  .tk-logo{ width:120px; height:120px; object-fit:contain; position:relative; filter:drop-shadow(0 14px 40px rgba(0,0,0,.6));
    animation:tkPop .62s cubic-bezier(.2,1.4,.3,1) .08s both; }
  .tk-name{ position:relative; font-size:30px; letter-spacing:.08em; color:#fff; text-shadow:0 2px 18px rgba(0,0,0,.6);
    animation:tkRise .5s cubic-bezier(.2,.9,.3,1) .24s both; }
  @keyframes tkIn{ from{opacity:0} to{opacity:1} }
  @keyframes tkOut{ from{opacity:1} to{opacity:0} }
  @keyframes tkWash{ from{transform:scale(.25); opacity:.4} to{transform:scale(1); opacity:1} }
  @keyframes tkPop{ 0%{transform:scale(.4); opacity:0} 70%{transform:scale(1.07); opacity:1} 100%{transform:scale(1)} }
  @keyframes tkRise{ from{transform:translateY(16px); opacity:0} to{transform:translateY(0); opacity:1} }
  /* ===== view transitions ===== */
  ::view-transition-old(root), ::view-transition-new(root){ animation-duration:.16s; }
  @media (prefers-reduced-motion:reduce){
    .tk, .tk-wash, .tk-logo, .tk-name{ animation:none; }
    .lc{ animation:none; }
    .lc-live, .lc-poss{ animation:none; }
  }

After wins, players raise their helmets to the student section while The Victors plays one more time.`,rivalries:`The Game vs Ohio State is the rivalry in American sports \u2014 played since 1897, it decides seasons, championships, and bragging rights for a lifetime. Michigan State is the in-state blood feud for the Paul Bunyan Trophy.

The Little Brown Jug vs Minnesota is college football's oldest trophy game, born in 1903 when Fielding Yost left a water jug behind in Minneapolis. Notre Dame is the great on-again, off-again heavyweight series.`,legends:`Fielding Yost's point-a-minute teams and Bo Schembechler's ten-year war with Woody Hayes define the sideline lore. Tom Harmon (1940), Desmond Howard (1991, the Heisman pose in the Big House), and Charles Woodson (1997, the only primarily-defensive winner) brought home Heismans.

Tom Brady went from Michigan QB room to the greatest career in NFL history. The Wolverines are college football's winningest program, with national titles from Yost's era through 1997 and the 2023 championship.`,fightsong:`The Victors \u2014 written by student Louis Elbel in 1898 after a last-minute win over Chicago, and famously praised by John Philip Sousa. The band plays it after every score, and 100,000 people punch the air on the "Hail!"s. Learn the arm motions; they're mandatory equipment.`},"Ohio State":{traditions:`Script Ohio, performed by The Best Damn Band In The Land, ends with a sousaphone player strutting out to dot the i \u2014 the most famous maneuver in marching band history. Players and fans sing Carmen Ohio arm-in-arm after every game.

Buckeye leaf helmet stickers reward big plays, and Ohio Stadium's south stands roar "O-H" / "I-O" around the horseshoe.`,rivalries:`Michigan. That's the sentence. The Game each late November has decided Big Ten and national titles for a century, and Woody Hayes famously wouldn't even say the school's name \u2014 just "that team up north."

Penn State has become the conference's heavyweight undercard, and Illibuck (a wooden turtle) goes to the Illinois winner.`,legends:`Woody Hayes built the monster; Archie Griffin remains the only two-time Heisman winner (1974-75). Eddie George, Troy Smith, Orlando Pace, and Chic Harley \u2014 the man who packed the stands that built the Horseshoe \u2014 fill the pantheon.

National titles span from the 1940s through 2002's David-vs-Goliath win over Miami and the 2014 playoff run with a third-string QB.`,fightsong:"Buckeye Battle Cry and Across the Field share duty, but Carmen Ohio \u2014 the alma mater sung postgame with the band \u2014 is the emotional anthem. Hang around after the final whistle; nobody leaves early."},"Michigan State":{traditions:"Sparty \u2014 the most jacked mascot in sports \u2014 leads the Spartans out to a thunderous drumline at Spartan Stadium. The Spartan statue on campus gets guarded before the Michigan game, and Zeke the Wonder Dog catches frisbees at halftime.",rivalries:"Michigan is the annual war for the Paul Bunyan Trophy and in-state supremacy. Notre Dame was the historic heavyweight series (the Megaphone Trophy), and Penn State closes many seasons battling for the Land Grant Trophy.",legends:'Biggie Munn and Duffy Daugherty built national champions in the 1950s and 60s, with the 1966 "Game of the Century" tie against Notre Dame. Bubba Smith, George Webster, Lorenzo White, and Kirk Cousins carried the torch across eras, along with the 2013 Rose Bowl team.',fightsong:`Victory for MSU \u2014 "Fight! Fight! Rah! Team, Fight!" The band's rendition after touchdowns comes with the fight-song chant every Spartan learns as a freshman.`},"Penn State":{traditions:`The White Out at Beaver Stadium is the best atmosphere in college football \u2014 107,000 in white, at night, shaking the press box. The Blue Band's drum major does a front flip at midfield pregame, and "WE ARE" / "PENN STATE" echoes across the valley.`,rivalries:"Ohio State is the modern measuring stick, with White Out classics deciding Big Ten races. Michigan State plays for the Land Grant Trophy, and old eastern wars with Pitt still simmer whenever the series renews.",legends:"Linebacker U produced Jack Ham, LaVar Arrington, and Paul Posluszny. Franco Harris, Lenny Moore, John Cappelletti (1973 Heisman), and Saquon Barkley headline the offensive lore, with national titles in 1982 and 1986.",fightsong:"Fight On, State \u2014 with the full stadium punctuating the chorus. Pair it with the Zombie Nation bounce and the alma mater sway; Happy Valley keeps its songbook busy."},Wisconsin:{traditions:"Jump Around between the third and fourth quarters literally registers on seismographs \u2014 Camp Randall's student section turned a 1998 tradition into the loudest 90 seconds in the sport. The Fifth Quarter postgame band show means nobody leaves, win or lose. Bucky Badger does push-ups for every point.",rivalries:"Minnesota for Paul Bunyan's Axe \u2014 the most-played rivalry in FBS, with the winner sprinting to chop the goalposts. Iowa's border battle for the Heartland Trophy is trench warfare, and Nebraska joined the feud list with the Freedom Trophy.",legends:"Barry Alvarez turned a doormat into a Rose Bowl power. Ron Dayne rumbled to the 1999 Heisman as the NCAA's career rushing king, followed by Jonathan Taylor and Melvin Gordon; J.J. Watt went from walk-on to legend.",fightsong:"On, Wisconsin! \u2014 one of the most copied fight songs in America, played while 80,000 sway. Stick around for Varsity's arm-wave at the end of the Fifth Quarter."},Iowa:{traditions:"The Iowa Wave \u2014 at the end of the first quarter, the whole stadium turns to wave at kids watching from the children's hospital overlooking Kinnick. It's the best tradition in sports, full stop. The Tigerhawk logo, black-and-gold uniforms styled after the Steelers, and the swarm entrance complete the identity.",rivalries:"Iowa State in the Cy-Hawk game splits the state every September. Minnesota plays for Floyd of Rosedale (a bronze pig with real 1935 backstory), Wisconsin for the Heartland Trophy, and Nebraska closes the year with the Heroes Game.",legends:"Nile Kinnick won the 1939 Heisman and gave a speech so good the stadium bears his name. Hayden Fry rebuilt everything (and painted the visitors' locker room pink); the program's linemen-and-punters pipeline is legendary in its own deadpan way.",fightsong:'The Iowa Fight Song ("the word is fight, fight, fight for Iowa") \u2014 plus the back-and-forth "I-O-W-A" spellout around the stadium.'},Nebraska:{traditions:"The Sea of Red sold out Memorial Stadium for a record streak spanning generations \u2014 on gameday it's the state's third-largest city. Thousands of red balloons once rose after the first score, the Tunnel Walk sets the entrance, and the Blackshirts name still means the first-team defense.",rivalries:"Oklahoma was the classic Thanksgiving heavyweight bout of the 70s-90s. In the Big Ten, Iowa's Heroes Game and Wisconsin's Freedom Trophy carry the load, with Colorado's old hate available on demand.",legends:"Bob Devaney and Tom Osborne won five national titles between them, with 1971 and 1995 among the greatest teams ever. Johnny Rodgers (1972) and Mike Rozier (1983) won Heismans; Ndamukong Suh authored the most dominant defensive season in memory. The walk-on program is the sport's best origin-story factory.",fightsong:'Hail Varsity is the official anthem, with "There Is No Place Like Nebraska" the singalong. Both hit different when 85,000 have shown up for a spring game.'},Minnesota:{traditions:`Ski-U-Mah \u2014 the century-old rallying cry \u2014 headlines a program that literally invented cheerleading. Goldy Gopher's head-spin, the oar-pounding "Row" era energy, and Huntington Bank Stadium's brick horseshoe give Dinkytown its Saturday soul.`,rivalries:"Michigan for the Little Brown Jug (the sport's oldest trophy, 1903), Wisconsin for Paul Bunyan's Axe (the most-played FBS rivalry), and Iowa for Floyd of Rosedale \u2014 no program plays for better hardware.",legends:"Bronko Nagurski and Bruce Smith (1941 Heisman) anchor a golden age of five national titles in the 1930s-40s under Bernie Bierman. Bobby Bell and Carl Eller became NFL icons from the Gopher line.",fightsong:'The Minnesota Rouser \u2014 "Minnesota, hats off to thee!" \u2014 with the crowd spelling out M-I-N-N-E-S-O-T-A at full speed.'},Purdue:{traditions:`The World's Largest Drum leads the All-American Marching Band, and the Boilermaker Special \u2014 an actual locomotive on wheels \u2014 circles Ross-Ade after scores. Purdue Pete's hammer and the "Boiler Up!" call finish the picture.`,rivalries:"Indiana for the Old Oaken Bucket, with a chain of I's and P's for every win since 1925. Illinois plays for the Purdue Cannon, and Notre Dame's Shillelagh series was the old September measuring stick.",legends:"The Cradle of Quarterbacks: Bob Griese, Len Dawson, Drew Brees, and more NFL passers than any campus deserves. Rod Woodson and Leroy Keyes rank among the greatest athletes the Big Ten has produced.",fightsong:"Hail Purdue \u2014 sung with locked arms, then punctuated by the drum you can feel from the concourse."},Illinois:{traditions:"Memorial Stadium's columns honor WWI dead, Grange Rock marks where the Galloping Ghost ran wild, and the Block-I student section runs one of the oldest card-stunt traditions in the country.",rivalries:"Ohio State for Illibuck (a wooden turtle, don't ask), Purdue for the Cannon, and Northwestern for the Land of Lincoln Trophy in the state's own hate week.",legends:"Red Grange scored four touchdowns in twelve minutes against Michigan in 1924 and basically invented college football celebrity. Dick Butkus remains the standard every linebacker is measured against; Lovie-era and Rose Bowl squads keep the modern flame.",fightsong:"Oskee-Wow-Wow \u2014 a chant-turned-song older than most stadiums it's played in."},Indiana:{traditions:`The candy-striped pants energy of basketball season bleeds into Memorial Stadium, where the student section's "IU" chant and the Marching Hundred keep Saturdays loud. The Rock \u2014 a limestone trophy case of a stadium \u2014 hosts one of the sport's best sunset backdrops.`,rivalries:"Purdue for the Old Oaken Bucket is the season, every season \u2014 100 years of in-state stakes. Recent playoff-chasing squads added Ohio State and Michigan to the circled dates.",legends:"Anthony Thompson's 1989 season came a whisker from the Heisman. George Taliaferro broke barriers as the first Black player drafted by the NFL, and the 1967 Rose Bowl team remains beloved.",fightsong:"Indiana, Our Indiana \u2014 the sway-and-sing staple that pairs with the fight-fight-fight chorus."},Northwestern:{traditions:`Wildcat games at the lakefront bring purple to Chicago's north shore, with the "Go U Northwestern" claps echoing off Lake Michigan. Students guard the Rock painting tradition on campus all week.`,rivalries:"Illinois for the Land of Lincoln Trophy in the state grudge match; the 1995 Rose Bowl run made believers of everyone else on the schedule.",legends:"The 1995 team under Gary Barnett shocked the sport with a Rose Bowl berth. Pat Fitzgerald starred as a two-time national defender of the year at linebacker before his coaching era; Otto Graham started here before NFL immortality.",fightsong:"Go U Northwestern \u2014 with the signature clap-clap punctuation the whole stadium supplies."},Oregon:{traditions:`The Duck does push-ups for every Oregon point \u2014 and late in blowouts that's a workout. Autzen Stadium's 54,000 sound like 100,000 ("It never rains at Autzen Stadium" is the beloved lie), the O hand-sign is everywhere, and the uniform combinations rewrote football fashion.`,rivalries:"Oregon State in the in-state war formerly known as the Civil War. Washington is pure border hatred renewed in the Big Ten, and the Huskies-Ducks games of recent years decided championships.",legends:"Marcus Mariota's 2014 Heisman capped the Chip Kelly-era blur offense that changed the sport's tempo. Joey Harrington, LaMichael James, and Kenjon Barner starred, with Rich Brooks-to-present building from nothing into a superpower.",fightsong:"Mighty Oregon \u2014 delivered by the band while the Duck conducts, occasionally from atop a motorcycle."},Washington:{traditions:"Sailgating \u2014 fans dock boats on Lake Washington and walk into Husky Stadium \u2014 is the best commute in sports. The stadium's cantilevered roofs trap noise into the loudest environment ever measured in college football; Purple Reign flags fly on ferries.",rivalries:"The Apple Cup vs Washington State splits the state every November. Oregon is the blood feud that moved with both schools to the Big Ten, deciding conference and playoff stakes.",legends:"Don James \u2014 The Dawgfather \u2014 built the 1991 co-national champs with Steve Emtman wrecking lines. Warren Moon, Sonny Sixkiller, Marques Tuiasosopo, and the 2023 title-game run under Michael Penix Jr. bookend the passing lore.",fightsong:"Bow Down to Washington \u2014 a 1915 classic the band unleashes as the team pours out of the tunnel."},USC:{traditions:`Traveler the white horse gallops after every score while the Trojan Marching Band \u2014 "The Spirit of Troy" \u2014 plays Conquest. The Song Girls, the \u270C\uFE0F Fight On salute, and Tommy Trojan's sword make the Coliseum pageantry unmatched.`,rivalries:"Notre Dame for the Jeweled Shillelagh is the greatest intersectional series ever played. UCLA for the Victory Bell is the crosstown battle where the whole city picks a side of town.",legends:"Student Body Right ran behind decades of All-American tailbacks: Mike Garrett, Marcus Allen, Charles White. John McKay and Pete Carroll built dynasties; Matt Leinart and Carson Palmer added Heismans; Ronnie Lott set the defensive standard.",fightsong:"Fight On \u2014 with the two-finger salute raised. The band plays Conquest as the sword-plant finisher; both are non-negotiable knowledge."},UCLA:{traditions:"The 8-Clap unites the Rose Bowl's powder-blue crowd \u2014 learn it or stand out. Playing home games in the Rose Bowl itself, under San Gabriel sunsets, remains the sport's most beautiful setting.",rivalries:"USC for the Victory Bell, with the winner painting it their color \u2014 the crosstown series divides offices, families, and freeways every November.",legends:"Gary Beban won the 1967 Heisman in an epic duel with O.J.'s USC. Troy Aikman, Jonathan Ogden, Kenny Easley, and Maurice Jones-Drew star on the football side of a campus that hangs championship banners for breakfast.",fightsong:"Sons of Westwood (the Mighty Bruins share duty) \u2014 cue the 8-Clap and the U-C-L-A spellout."},Alabama:{traditions:`Rammer Jammer \u2014 "Hey Auburn! We just beat the hell outta you!" \u2014 closes wins, and only wins. Captains' handprints set in concrete at Denny Chimes, the Walk of Champions entrance, Big Al the elephant, and 100,000 at Bryant-Denny treat every Saturday like a coronation.`,rivalries:"The Iron Bowl vs Auburn is the most intense rivalry in the country \u2014 a state with no pro team pours everything into it. The Third Saturday in October vs Tennessee ends with victory cigars, and the LSU game decided a decade of national titles.",legends:"Bear Bryant's houndstooth hat won six national titles; the modern dynasty stacked six more. Joe Namath, Derrick Henry (2015 Heisman), Mark Ingram (the program's first, 2009), DeVonta Smith, and enough first-rounders to fill an NFL franchise.",fightsong:'Yea Alabama \u2014 answered by the Million Dollar Band and the "Roll Tide Roll" that needs no music at all.'},Georgia:{traditions:'Uga, the white English bulldog, has his own air-conditioned doghouse and varsity letter. Ringing the Chapel Bell after wins, the Dawg Walk through ten thousand fans, and playing Between the Hedges at Sanford Stadium define Athens Saturdays. "Glory Glory" rings out to the tune of Battle Hymn.',rivalries:"Florida in Jacksonville \u2014 the World's Largest Outdoor Cocktail Party \u2014 is an annual neutral-site holiday. Auburn is the Deep South's Oldest Rivalry (since 1892), and Georgia Tech gets Clean Old-Fashioned Hate every Thanksgiving weekend.",legends:"Herschel Walker ran through the SEC for the 1980 title and 1982 Heisman as the greatest college back ever. Vince Dooley and Kirby Smart's 2021-22 back-to-back champions bracket the lore, with Frank Sinkwich and Charley Trippi's 1940s stardom underneath.",fightsong:"Glory, Glory \u2014 sung since the 1890s \u2014 alongside Hail to Georgia. The Redcoat Band's Krypton fanfare entrance gives chills on repeat viewings."},LSU:{traditions:`Death Valley at night is the sport's most feared venue \u2014 "Saturday night in Death Valley" is a threat, not a slogan. Mike the Tiger's habitat sits beside the stadium, the Golden Band from Tigerland's pregame salute makes grown fans cry, and Callin' Baton Rouge turns 102,000 into a Garth Brooks choir.`,rivalries:"Alabama is the annual heavyweight bout that has decided national titles. Ole Miss brings the Magnolia Bowl, Texas A&M inherited a border war, and Florida alternates home-and-home haymakers.",legends:"Billy Cannon's 89-yard Halloween punt return won the 1959 Heisman. Joe Burrow's 2019 season \u2014 maybe the best ever played \u2014 delivered the third title (2003, 2007, 2019); Odell, Ja'Marr Chase, and Patrick Peterson headline the NFL pipeline.",fightsong:"Fight for LSU, with Hold That Tiger as the growling singalong. Pregame's four-note salute from the Golden Band is the true anthem."},Tennessee:{traditions:"The Vol Navy sailgates the Tennessee River right up to Neyland Stadium's 101,000 checkerboard-clad fans. Running through the T, the orange-and-white checkerboard end zones, and Smokey the bluetick hound's howl set the scene on the third Saturday of every October.",rivalries:"Alabama on the Third Saturday in October \u2014 win it and the team smokes victory cigars. Florida owned Septembers for a generation, Georgia contests the East, and Vanderbilt gets the in-state chores.",legends:"General Robert Neyland won national titles and wrote football's maxims; the stadium bears his name. Peyton Manning chose Knoxville and became its favorite son, Reggie White terrorized from the edge, and the 1998 team won the first BCS championship.",fightsong:"Down the Field is the official fight song, but Rocky Top \u2014 played roughly 400 times a game \u2014 is the one opponents hear in their sleep."},Auburn:{traditions:`After wins, Toomer's Corner disappears under toilet paper as the whole town rolls the oaks. A live eagle circles Jordan-Hare pregame to a "Warrrrr Eagle" that builds until landing at midfield \u2014 the best pregame moment in sports. The Tiger Walk started the player-walk tradition everyone else copied.`,rivalries:"The Iron Bowl vs Alabama defines the state; Kick Six (2013) is the most replayed play in college football history. Georgia is the Deep South's Oldest Rivalry, and LSU brings an annual border brawl.",legends:"Bo Jackson (1985 Heisman) is the greatest athlete the sport has seen; Pat Sullivan (1971) and Cam Newton's 2010 title run added Heismans. Shug Jordan's 1957 champions and the undefeated 2004 team round out the case files.",fightsong:"War Eagle \u2014 both the fight song and the greeting Auburn people exchange worldwide. If someone says it to you, say it back."},Florida:{traditions:`The Gator Chomp's two-armed bite taunts from every corner of The Swamp \u2014 "only Gators get out alive." Mr. Two Bits' cheer lives on through celebrity successors, and the whole stadium sways arm-in-arm singing We Are the Boys between the third and fourth quarters.`,rivalries:"Georgia in Jacksonville is the annual Cocktail Party grudge. Florida State brings the in-state Thanksgiving war, Tennessee defined 90s Septembers, and Miami lurks whenever scheduled.",legends:"Steve Spurrier won the 1966 Heisman then returned as the Head Ball Coach to win the 1996 title with the Fun 'n' Gun. Tim Tebow (2007 Heisman, two titles) gave The Promise; Danny Wuerffel, Emmitt Smith, and Wilber Marshall complete the wing.",fightsong:"Orange and Blue \u2014 with the chomp keeping time. The band's Jaws theme into a stadium-wide chomp is peak Swamp."},Texas:{traditions:"Hook 'em Horns \u2014 the hand sign flashed from Austin to everywhere \u2014 meets Bevo, a 1,700-pound longhorn steer watching from the end zone. Smokey the Cannon fires after scores, the tower glows burnt orange after wins, and The Eyes of Texas closes every game, hands raised.",rivalries:"The Red River Rivalry vs Oklahoma at the State Fair of Texas splits the Cotton Bowl half-crimson, half-burnt-orange with corny dogs for all. Texas A&M's renewed Thanksgiving feud restores the state's oldest argument.",legends:"Darrell K Royal's wishbone won national titles (1963, 1969); Vince Young's 2005 Rose Bowl drive against USC is the greatest title-game performance ever. Earl Campbell (1977) and Ricky Williams (1998) bulldozed to Heismans; Colt McCoy and the 2023-24 playoff teams carry it forward.",fightsong:`Texas Fight \u2014 punctuated by "Texas! Fight!" shouts and the Showband of the Southwest's Longhorn formation. The Eyes of Texas is the solemn bookend.`},Oklahoma:{traditions:`The Sooner Schooner \u2014 a Conestoga wagon pulled by ponies named Boomer and Sooner \u2014 charges the field after every score. The RUF/NEKS fire shotguns (blanks) and paddle the sideline; the crowd's "Boomer!" "Sooner!" call-and-response never stops.`,rivalries:"Red River vs Texas at the Cotton Bowl is a coin-flip of pure hate every October. Bedlam vs Oklahoma State owned the state for a century, and the old Nebraska Thanksgiving games were the sport's main event for decades.",legends:"Bud Wilkinson's 47-game win streak will never be touched. Barry Switzer's wishbone won titles; Billy Sims (1978), Sam Bradford, Baker Mayfield, and Kyler Murray stacked Heismans \u2014 plus Jason White and Steve Owens. Seven national championships and counting.",fightsong:"Boomer Sooner \u2014 played, by conservative estimate, ten thousand times per game. You will leave humming it whether you want to or not."},"Texas A&M":{traditions:"The 12th Man stands the entire game \u2014 every Aggie a substitute ready since 1922. Midnight Yell packs Kyle Field the night before games for practice-hate at full volume, Reveille (the First Lady of Aggieland) outranks everyone, and when Kyle Field sways, it literally moves.",rivalries:"Texas \u2014 the renewed Thanksgiving blood feud the state spent a decade missing. LSU's border war brings seven-overtime chaos energy, and Arkansas plays the Southwest Classic at JerryWorld.",legends:"John David Crow won Bear Bryant's only Heisman here (1957) out of the Junction Boys era. Johnny Manziel's 2012 Heisman broke the internet before that was a thing; Von Miller, Dat Nguyen, and the Wrecking Crew defenses set the defensive standard.",fightsong:`The Aggie War Hymn \u2014 "Hullabaloo, Caneck! Caneck!" \u2014 ends with the whole stadium locking arms and sawing Varsity's horns off, swaying Kyle Field on its foundations.`},"Ole Miss":{traditions:"The Grove is tailgating's cathedral \u2014 ten acres of oaks, chandeliers in tents, and the Walk of Champions through it all. The Hotty Toddy chant is greeting, password, and battle cry; nobody leaves before the fourth-quarter singalongs at Vaught-Hemingway.",rivalries:"The Egg Bowl vs Mississippi State on Thanksgiving decides the state's mood for a year. LSU brings the Magnolia Bowl border war, and Alabama visits carry generational stakes.",legends:"Archie Manning is the eternal favorite son \u2014 the speed limit on campus is 18 mph for his number \u2014 and Eli added a Manning encore. Chucky Mullins' courage defines the program's soul; Johnny Vaught's 1950s-60s teams won SEC crowns in bunches.",fightsong:'Forward Rebels \u2014 but the real anthem is the full-stadium Hotty Toddy: "Are you ready? Hell yes! Damn right!"'},"Notre Dame":{traditions:"Players slap the PLAY LIKE A CHAMPION TODAY sign down the tunnel steps. Touchdown Jesus overlooks the stadium from the library mural, the Golden Dome glows over campus, and the leprechaun leads the most storied brand in the sport \u2014 trumpets under the dome, player walk, candlelight grotto and all.",rivalries:"USC for the Jeweled Shillelagh is the greatest intersectional rivalry ever. Navy's annual series honors a WWII debt of gratitude; Michigan and Michigan State (the Megaphone) fill the ancient-grudge shelf.",legends:"Knute Rockne invented the modern sport's mythology \u2014 the Four Horsemen, the Gipper speech, all of it. Seven Heisman winners from Angelo Bertelli to Tim Brown, eleven claimed national titles, Joe Montana's comebacks, and Rudy for the romantics.",fightsong:"The Victory March \u2014 the most famous fight song in America, cheer-cheer-ing for Old Notre Dame since 1908. The band's trumpet rendition under the Golden Dome pregame is a pilgrimage moment."},Clemson:{traditions:`Running Down the Hill \u2014 the team buses around the stadium, rubs Howard's Rock, and pours down the east bank to cannon fire \u2014 is "the most exciting 25 seconds in college football." Death Valley's $2 bills tradition follows Tiger fans to every road town.`,rivalries:"South Carolina in the Palmetto Bowl is the state's Thanksgiving-week civil war, played every year since 1909. Florida State became the ACC's title-deciding feud; Georgia looms across the border.",legends:"Frank Howard gave the program its rock and its name. Danny Ford won the 1981 title as a 33-year-old; Dabo Swinney's Deshaun Watson (2016) and Trevor Lawrence (2018) teams beat Alabama for two more. C.J. Spiller and Brian Dawkins headline the athlete wing.",fightsong:'Tiger Rag \u2014 "the song that shakes the Southland" \u2014 with the crowd spelling C-L-E-M-S-O-N as the band struts.'},"Florida State":{traditions:"Osceola charges Doak Campbell on Renegade and plants a flaming spear at midfield \u2014 the best entrance in the sport. The War Chant and tomahawk chop roll for entire drives; sod from big road wins gets buried in the Sod Cemetery.",rivalries:"Miami games decided national titles through Wide Rights I-IV heartbreak. Florida is the Thanksgiving in-state war, and Clemson contests the ACC throne.",legends:"Bobby Bowden's dynasty finished top-5 for 14 straight years with titles in 1993 and 1999; Jameis Winston added 2013. Charlie Ward and Chris Weinke won Heismans, Deion Sanders played corner like a headliner, and Warrick Dunn ran with grace.",fightsong:"The FSU Fight Song rides alongside the War Chant \u2014 which needs no words, just an arm and 79,000 voices."},Miami:{traditions:"The team enters through smoke \u2014 a tradition born in the 80s that still hits. The U hand-sign, the turnover chain era, and a swagger that changed how the sport carries itself: Miami isn't a campus tradition so much as an attitude with a schedule.",rivalries:"Florida State games in the 80s-00s were de facto national semifinals, decided by Wide Rights and Wide Lefts. Florida brings in-state hate whenever played; Notre Dame's Catholics-vs-Convicts lore still sells documentaries.",legends:"Five national titles from 1983-2001, with the 2001 team the deepest roster ever assembled. Vinny Testaverde won the Heisman; Michael Irvin, Ray Lewis, Ed Reed, Sean Taylor, and Warren Sapp made The U an NFL factory with its own wing in Canton.",fightsong:"The band's Hail to the Spirit plays, but the real soundtrack is the smoke-entrance roar and the C-A-N-E-S spellout."},Utah:{traditions:"The MUSS \u2014 Utah's student section \u2014 turns Rice-Eccles into a red wall at altitude, with the Ute drum circle and flag charge setting kickoff. Third-down jumps and mountain sunsets over the stadium rim make Salt Lake Saturdays underrated theater.",rivalries:"The Holy War vs BYU is one of the sport's fiercest rivalries, religion and geography stacked on football. Colorado's border feud carried into the Big 12 era.",legends:"Urban Meyer's 2004 team busted the BCS undefeated with Alex Smith at the controls, and the 2008 squad beat Alabama to finish perfect. Ron McBride built it; Kyle Whittingham's two Pac-12 titles and NFL defender pipeline sustained it.",fightsong:'Utah Man \u2014 "I am a Utah man, sir" \u2014 sung with the MUSS at full roar and revised verses everyone still argues about.'},Colorado:{traditions:"Ralphie's Run \u2014 a 1,200-pound live buffalo thundering across Folsom Field with handlers barely hanging on \u2014 is the single best entrance in sports. The flatirons backdrop and black-and-gold sunsets do the rest.",rivalries:"Nebraska's old Big Eight hate never fully cooled. Utah renewed a border feud, and the Rocky Mountain Showdown vs Colorado State owns Denver Septembers.",legends:"Bill McCartney's 1990 team won the national title (fifth down and all); Rashaan Salaam won the 1994 Heisman and Kordell Stewart threw The Catch that same season. Deion Sanders' arrival made Boulder the center of the football universe again.",fightsong:"Fight CU roars alongside the Buffs' Glory Colorado \u2014 timed to Ralphie's lap if the band knows what's good for it."},Army:{traditions:"The Corps of Cadets marches on before every home game at Michie Stadium above the Hudson \u2014 the best pregame pageantry in America. Mules lead the sideline, cadets do push-ups for every point, and the alma mater is sung to the Corps win or lose.",rivalries:"Army-Navy is America's Game \u2014 the last regular-season Saturday, presidents in attendance, and the whole sport standing at attention. The Commander-in-Chief's Trophy adds Air Force to the round-robin stakes.",legends:"The 1944-46 teams with Doc Blanchard (Mr. Inside, 1945 Heisman) and Glenn Davis (Mr. Outside, 1946 Heisman) were the greatest backfield ever. Red Blaik coached three national titles; the modern triple-option era brought back bowl streaks and Navy wins.",fightsong:"On Brave Old Army Team \u2014 with the Corps' cannon and cadence carrying it across the Hudson."},Navy:{traditions:"The Brigade of Midshipmen marches on in dress blues before kickoff. Bill the Goat patrols the sideline, and after every game the team sings Blue and Gold facing the Brigade \u2014 second verse tradition says the loser sings first, winner sings last.",rivalries:"Army-Navy in December is bigger than football \u2014 125 years of America's Game. The Commander-in-Chief's Trophy vs Army and Air Force is the season's holy grail; Notre Dame's annual series honors WWII-era loyalty.",legends:"Roger Staubach won the 1963 Heisman before Dallas immortality; Joe Bellino took it in 1960. The triple-option era under Paul Johnson and Ken Niumatalolo produced decade-long runs of bowl games and Army streaks.",fightsong:"Anchors Aweigh \u2014 written by a bandmaster for the 1906 Army game, now the soundtrack of an entire service. Beat Army is both lyric and lifestyle."}};function i0(e){if(!e)return null;let t=(e.location||"").trim();if(t&&Ps[t])return Ps[t];let a=e.displayName||"";for(let n in Ps)if(a===n||a.indexOf(n+" ")===0)return Ps[n];return null}function s0({team:e,year:t,openSettings:a}){let n=i0(e),[l,i]=C(()=>cn("cfb_lore_"+e.id)),[o,u]=C("traditions"),[r,c]=C(!1),[d,f]=C(!1),[m,h]=C(""),[S,p]=C(!1);K(()=>{u("traditions"),i(cn("cfb_lore_"+e.id)),h(""),f(!1)},[e.id]);let w=n||l,g=[["traditions","Traditions","stadium"],["rivalries","Rivalries","flame"],["legends","Legends","trophy"],["fightsong","Fight song","music"]];async function y(){c(!0),f(!1);let N='You are a college football historian. Reply with ONLY minified JSON, no backticks: {"traditions":string,"rivalries":string,"legends":string,"fightsong":string}. Each value is 2-3 vivid, strictly factual sentences about '+e.displayName+" football. Use \\n\\n between paragraphs if needed. Never invent facts; if a topic is thin for this program, say what is actually true. Do not quote song lyrics.",z=await fn(N,"Create the lore pack for "+e.displayName+".",!0,1e3,"lore","fast");if(z.needKey){f(!0),c(!1);return}try{let A=JSON.parse((z.text||"").replace(/```json|```/g,"").trim());A&&A.traditions&&(hi("cfb_lore_"+e.id,A),i(A),La("Lore saved \u2014 works offline now"))}catch{}c(!1)}async function v(){p(!0),f(!1);let N=await fn("You are a college football insider. Be brief and factual; if the seas import React from "react";
import { createRoot } from "react-dom/client";

/* ============================================================
   CONFIG — all ESPN endpoints live here so they're easy to tweak.
   ESPN's site API is unofficial but CORS-open and stable.
   ============================================================ */
const ESPN = "https://site.api.espn.com/apis/site/v2/sports/football/college-football";
const ESPN_WEB = "https://site.web.api.espn.com/apis/v2/sports/football/college-football";
const URLS = {
  teams:      () => `${ESPN}/teams?limit=900`,
  team:       (id) => `${ESPN}/teams/${id}`,
  schedule:   (id, yr) => `${ESPN}/teams/${id}/schedule?season=${yr}`,
  roster:     (id) => `${ESPN}/teams/${id}/roster`,
  rankings:   () => `${ESPN}/rankings`,

// Build the team registry from the STANDINGS feed, which is Division I (FBS) only —
// far smaller than /teams (which returns all ~770 D1/D2/D3 schools). Falls back to the
// previous season if the current one is empty (deep offseason), then to the full team
// list only as a last resort so we never end up with nothing.
async function getRegistry(year) {
  for (const yr of [year, year - 1]) {
    try {
      const s = await getJSON(URLS.standings(yr), { ttl: 6e5 });
      const kids = s.children || s.standings?.children || [];
      const teams = []; const seen = {};
      const conf = kids.map(c => {
        const ids = [];
        (c.standings?.entries || []).forEach(e => {
          const t = e.team; if (!t || !t.id || seen[t.id]) return;
          seen[t.id] = 1;
          const recStat = (e.stats || []).find(x => x.name === "overall");
          teams.push({ ...t, __rec: (recStat && recStat.displayValue) || null, displayName: t.displayName || [t.location, t.name].filter(Boolean).join(" ") || t.abbreviation || t.id });
          ids.push(String(t.id));
        });
        return { name: c.name || c.abbreviation || "Conference", teamIds: ids };
      }).filter(g => g.teamIds.length);
      if (teams.length) return { teams, conf: conf.length ? conf : null };
    } catch (e) {}
  }
  // last resort: full team list (no D1 filter possible without standings)
  try {
    const d = await getJSON(URLS.teams(), { ttl: 6e5 });
    const list = (d.sports[0].leagues[0].teams || []).map(x => x.team);
    if (list.length) return { teams: list, conf: null };
  } catch (e) {}
  return null;
}

/* ---- tiny fetch layer: timeout, one retry, session cache ---- */
// ESPN does not return CORS headers to third-party origins, so a direct browser
// fetch is blocked. We try direct first (in case your network allows it), then fall
// back through relay proxies. Set your own proxy in Settings for guaranteed reliability.
const _mem = new Map();
// tiny persistent cache (survives reloads) for heavy, slow-changing payloads
function lsRawGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsRawSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function lsGet(k){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):null; }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

// ESPN blocks direct browser calls (no CORS headers), so we go through public relays
// that add Access-Control-Allow-Origin. Public relays are individually flaky — they
// rate-limit, cap payload size, or go down — so we RACE several in parallel and take
// the first that returns valid JSON. corsproxy.io now caps free responses at 1MB
// (too small for the full team list), so codetabs (5MB) / killcors lead the pool.
const RELAYS = [
  (u) => "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(u),
  (u) => "https://proxy.killcors.com/?url=" + encodeURIComponent(u),
  (u) => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
];
function relayBase() { try { return (localStorage.getItem("cfb_relay") || "").trim().replace(/\/+$/, ""); } catch (e) { return ""; } }
function relayHeaders() { let t = ""; try { t = localStorage.getItem("cfb_relay_tok") || ""; } catch (e) {} return { "x-gdhq-token": t }; }
function noteCredits(r) { try { const rem = r.headers.get("x-credits-remaining"), cap = r.headers.get("x-credits-cap"); if (rem != null) lsRawSet("cfb_credits_left", rem); if (cap != null) lsRawSet("cfb_credits_cap", cap); } catch (e) {} }
function _fetchJSON(target, ms, headers) {
  const ctrl = new AbortController();
  const to = setTimeout(() => ctrl.abort(), ms);
  return fetch(target, { signal: ctrl.signal, cache: "no-store", headers: headers || undefined })
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .finally(() => clearTimeout(to));
}
// resolve with the first target that yields valid JSON; abort the rest on a win so we
// don't keep downloading the same (possibly multi-MB) payload from every relay at once
function _raceJSON(targets, ms) {
  if (!targets.length) return Promise.reject(new Error("no targets"));
  const ctrls = targets.map(() => new AbortController());
  return new Promise((resolve, reject) => {
    let left = targets.length, done = false, lastErr;
    const stopOthers = (keep) => ctrls.forEach((c, i) => { if (i !== keep) { try { c.abort(); } catch (e) {} } });
    targets.forEach((t, i) => {
      const to = setTimeout(() => { try { ctrls[i].abort(); } catch (e) {} }, ms);
      fetch(t, { signal: ctrls[i].signal, cache: "no-store" })
        .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(v => { clearTimeout(to); if (!done) { done = true; stopOthers(i); resolve(v); } })
        .catch(e => { clearTimeout(to); lastErr = e; if (--left === 0 && !done) reject(lastErr || new Error("all sources failed")); });
    });
  });
}
async function getJSON(url, { ttl = 120000 } = {}) {
  const hit = _mem.get(url);
  if (hit && Date.now() - hit.t < ttl) return hit.v;
  let pb = ""; try { pb = localStorage.getItem("cfb_proxy") || ""; } catch (e) {}
  let v = null;
  const rb = relayBase();
  if (rb) { v = await _fetchJSON(rb + "/espn?url=" + encodeURIComponent(url), 12000, relayHeaders()).catch(() => null); } // family relay first
  if (v == null && pb) { v = await _fetchJSON(pb + encodeURIComponent(url), 16000).catch(() => null); }
  if (v == null) {
    const pool = [url, ...RELAYS.map(b => b(url))]; // direct (in case the network allows it) + relays, all racing
    v = await _raceJSON(pool, 14000).catch(() => null);
  }
  if (v == null) throw new Error("All data sources are busy or blocked right now");
  _mem.set(url, { t: Date.now(), v });
  return v;
}

// Shared AI call (Anthropic direct-from-browser, like the rest of Troy's apps).
async function askAI(system, prompt, useSearch, maxTokens, feature, tier) {
  const rb = relayBase();
  if (rb) {
    try {
      const r = await fetch(rb + "/ai", {
        method: "POST",
        headers: { "content-type": "application/json", "x-gdhq-feature": feature || "other", ...relayHeaders() },
        body: JSON.stringify({ system, prompt, search: !!useSearch, maxTokens: maxTokens || 1200, tier: tier || "fast" }),
      });
      noteCredits(r);
      const d = await r.json().catch(() => ({}));
      if (d.error) return { text: "\u26a0\ufe0f " + (d.error.message || "Relay error " + r.status) };
      return { text: (d.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim() || "No response." };
    } catch (e) { return { text: "\u26a0\ufe0f Family relay unreachable \u2014 check the URL in Settings." }; }
  }
  let key = null; try { key = localStorage.getItem("cfb_anthropic_key"); } catch (e) {}

  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];

    if (d.error) return { text: "\u26a0\ufe0f " + d.error.message };

/* ---- theming from team colors ---- */
function hex(c, fallback) { if (!c) return fallback; return c.startsWith("#") ? c : "#" + c; }
function lum(h) { const n = h.replace("#",""); const r=parseInt(n.slice(0,2),16),g=parseInt(n.slice(2,4),16),b=parseInt(n.slice(4,6),16); return (0.299*r+0.587*g+0.114*b)/255; }
function applyTheme(team) {
  let primary = hex(team?.color, "#00274c");
  let accent  = hex(team?.alternateColor, "#ffcb05");
  // ensure primary is the darker of the two for a stable dark header
  if (lum(primary) > lum(accent)) { const t = primary; primary = accent; accent = t; }
  // if accent is too dark to read on primary, lighten toward white
  const onPrimary = lum(primary) > 0.55 ? "#0a0d12" : "#ffffff";
  const onAccent  = lum(accent)  > 0.55 ? "#0a0d12" : "#ffffff";
  const root = document.documentElement.style;
  root.setProperty("--primary", primary);
  root.setProperty("--accent", accent);
  root.setProperty("--on-primary", onPrimary);
  root.setProperty("--on-accent", onAccent);
  root.setProperty("--primary-soft", primary + "30");
  // native feel: tint the browser/status bar to the team (Android Chrome, installed PWAs)
  try {
    let meta = document.querySelector('meta[name="theme-color"]');
    if (!meta) { meta = document.createElement("meta"); meta.name = "theme-color"; document.head.appendChild(meta); }
    meta.content = primary;
  } catch (e) {}
}

function InstallBanner() {
  const standalone = typeof window !== "undefined" && ((window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator?.standalone === true);
  const ua = typeof navigator !== "undefined" ? (navigator.userAgent || "") : "";
  const isIOS = /iphone|ipad|ipod/i.test(ua) || (/Macintosh/.test(ua) && typeof navigator !== "undefined" && navigator.maxTouchPoints > 1);
  const iosSafari = isIOS && !/crios|fxios|edgios|opios/i.test(ua);
  const [deferred, setDeferred] = useState(null);
  const [show, setShow] = useState(false);
  const [iosHelp, setIosHelp] = useState(false);

  useEffect(() => {
    if (standalone) return;
    try { if (localStorage.getItem("cfb_install_dismissed")) return; } catch (e) {}
    const pick = () => { if (window.__cfbBIP) { setDeferred(window.__cfbBIP); setShow(true); } };
    pick();
    const onBip = () => pick();
    const onInstalled = () => { setShow(false); setDeferred(null); };
    window.addEventListener("cfb-bip", onBip);
    window.addEventListener("cfb-installed", onInstalled);
    if (iosSafari) setShow(true);
    return () => { window.removeEventListener("cfb-bip", onBip); window.removeEventListener("cfb-installed", onInstalled); };
  }, []);

  if (standalone || !show) return null;
  function dismiss() { setShow(false); setIosHelp(false); try { localStorage.setItem("cfb_install_dismissed", "1"); } catch (e) {} }
  async function go() {
    if (isIOS) { setIosHelp(h => !h); return; }
    const dp = deferred || window.__cfbBIP;
    if (!dp) { dismiss(); return; }
    dp.prompt();
    try { await dp.userChoice; } catch (e) {}
    setDeferred(null); window.__cfbBIP = null; setShow(false);
  }
  return (
    <div className="install-bar">
      <span className="install-ic"><Ic n="install" s={19}/></span>
      <div className="install-tx">
        <b>Add GameDay HQ to your home screen</b>
        {isIOS
          ? <span> — get full-screen, one-tap access like a real app.</span>
          : <span> — install College Football for full-screen, one-tap access.</span>}
        {iosHelp && <div className="install-ios">In Safari: tap the <b>Share</b> button (square with an ↑ arrow), scroll down to <b>Add to Home Screen</b>, then tap <b>Add</b>.</div>}
      </div>
      <button className="install-go" onClick={go}>{isIOS ? "How" : "Install"}</button>
      <button className="install-x" onClick={dismiss} aria-label="Dismiss">✕</button>
    </div>
  );
}

/* ---------- HERO ---------- */
function FieldBackdrop() {
  const uid = useMemo(() => "turf" + Math.random().toString(36).slice(2, 7), []);
  // perspective yard-line field — the single element that says "on the field," not "dashboard"
  const H = 150, W = 400, topW = 150, botW = 400, n = 7;
  const at = (d) => { const y = H * Math.pow(d, 1.75); const half = (topW/2) + (botW/2 - topW/2) * Math.pow(d, 1.75); return { y, x1: W/2 - half, x2: W/2 + half }; };
  const lines = Array.from({ length: n }, (_, i) => at((i + 1) / n));
  return (
    <div className="field" aria-hidden="true">
      <svg className="field-svg" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMax slice">
        <defs>
          <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" style={{ stopColor: "var(--primary)", stopOpacity: 0 }} />
            <stop offset="1" style={{ stopColor: "var(--primary)", stopOpacity: 0.6 }} />
          </linearGradient>
        </defs>
        <polygon points={`${W/2-topW/2},0 ${W/2+topW/2},0 ${botW},${H} 0,${H}`} fill={"url(#" + uid + ")"} />
        {lines.map((l, i) => (
          <line key={i} x1={l.x1} y1={l.y} x2={l.x2} y2={l.y} stroke="#fff" strokeOpacity={0.08 + 0.18 * (i / n)} strokeWidth={0.5 + 1.3 * (i / n)} />
        ))}
        <line x1={lines[n-1].x1} y1={lines[n-1].y} x2={lines[n-1].x2} y2={lines[n-1].y} style={{ stroke: "var(--accent)" }} strokeOpacity="0.55" strokeWidth="2.5" />
      </svg>
    </div>
  );
}

  if (ne?.competitions?.[0]) {
    const comp = ne.competitions[0];

        <div className="hero-actions">
          <button className="icon-btn" onClick={onSwitch}><Ic n="switch" s={14}/> Team</button>
          <button className="icon-btn" onClick={onSettings} aria-label="Settings"><Ic n="sliders" s={16}/></button>

      {next && (

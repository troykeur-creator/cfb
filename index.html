function PlayerModal({ p, team, year, onClose, openSettings }) {
  const [ov, setOv] = useState(null); const [ovLoad, setOvLoad] = useState(true);
  const [scout, setScout] = useState(""); const [busy, setBusy] = useState(false); const [needKey, setNeedKey] = useState(false);
  useEffect(() => { let on=true; setOvLoad(true); fetchAthlete(p.id).then(r => { if(on){ setOv(r); setOvLoad(false); } }); return () => { on=false; }; }, [p.id]);

  async function getScout() {
    setBusy(true); setNeedKey(false);
    const sys = "You are a college football scouting analyst. Be factual and specific; never invent stats. If you lack detail on this player, say so and give position/role context instead of guessing.";
    const res = await askAI(sys, "Scouting report on " + (p.fullName||p.displayName) + " — " + (p.position?.displayName||p.position?.abbreviation||"player") + ", #" + (p.jersey||"?") + " for " + team.displayName + ", class " + (classOf(p)||"?") + ". Cover: (1) role and usage, (2) strengths, (3) areas to develop, (4) " + year + " outlook / what to watch. Keep each to 1-2 tight sentences.", true, 800);
    if (res.needKey) { setNeedKey(true); setBusy(false); return; }
    setScout(res.text); setBusy(false);
  }

  const rows = [
    ["Position", p.position?.displayName || p.position?.abbreviation],
    ["Class", classOf(p)],
    ["Height", p.displayHeight],
    ["Weight", p.displayWeight],
    ["Age", p.age],
    ["Hometown", p.birthPlace?.city ? p.birthPlace.city+(p.birthPlace.state?", "+p.birthPlace.state:"") : (p.birthPlace?.state||null)],
  ].filter(r => r[1]!=null && r[1]!=="");

  // season stat line from overview (keyless) — tolerant of ESPN's shape variants
  const { hdr: statHdr, pairs: statPairs } = extractStats(ov?.statistics);

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxWidth:480}}>
        <div className="pm-head">
          {p.headshot?.href ? <img className="pm-head-img" src={p.headshot.href} alt=""/> : <div className="pm-head-num display">{p.jersey||"–"}</div>}
          <div style={{minWidth:0}}>
            <div className="pm-name display">{p.fullName||p.displayName}</div>
            <div className="ng-label">{[p.jersey?("#"+p.jersey):null, p.position?.abbreviation, classOf(p)].filter(Boolean).join(" · ")} · {team.shortDisplayName||team.name}</div>
          </div>
          <button className="close-x" style={{marginLeft:"auto"}} onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body" style={{padding:"6px 14px 16px"}}>
          <div className="pm-grid">
            {rows.map(([k,v])=>(<div className="pm-cell" key={k}><div className="ng-label">{k}</div><div className="pm-val">{v}</div></div>))}
          </div>

          {ovLoad && <div className="spin"/>}
          {!ovLoad && statPairs.length>0 && (
            <>
              <div className="pos-h" style={{marginTop:6}}>{statHdr}</div>
              <div className="pm-stats">
                {statPairs.map(([l,v])=>(<div className="pm-stat" key={l}><div className="pm-stat-v mono-num">{v}</div><div className="ng-label">{l}</div></div>))}
              </div>
            </>
          )}
          {!ovLoad && statPairs.length===0 && <div className="ng-label" style={{textTransform:"none",letterSpacing:0,margin:"8px 0",lineHeight:1.5}}>No season stats posted yet — common in the offseason or for new players.</div>}

          {(() => {
            const pnews = (Array.isArray(ov?.news) ? ov.news : (ov?.news?.articles || [])).slice(0, 3);
            if (!pnews.length) return null;
            return (
              <>
                <div className="pos-h" style={{marginTop:12}}>Recent news</div>
                {pnews.map((a, i) => (
                  <a key={i} className="pm-news" href={a.links?.web?.href || a.links?.[0]?.href} target="_blank" rel="noopener">
                    <div className="pm-news-h">{a.headline}</div>
                    {a.published && <div className="ng-label">{fmtDate(a.published)}</div>}
                  </a>
                ))}
              </>
            );
          })()}

          {!scout && !busy && <button className="btn ghost" style={{width:"100%",marginTop:10}} onClick={getScout}>🔍 Deeper analysis (AI scouting report)</button>}
          {busy && <div className="spin"/>}
          {needKey && <div className="ng-label" style={{textTransform:"none",letterSpacing:0,marginTop:8,lineHeight:1.5}}>The stats above need no key. For an AI take, add your Anthropic key in <button onClick={()=>{onClose();openSettings&&openSettings();}} style={{color:"var(--accent)",fontWeight:600}}>settings</button>.</div>}
          {scout && <div className="ai-out" style={{marginTop:10}}>{scout}</div>}
        </div>
      </div>
    </div>
  );
}

/* ---------- POSTSEASON (bowls + CFP) ---------- */
function Postseason({ year }) {
  const { data, err, loading, reload } = useData(() => getJSON(URLS.postseason(year)), [year]);
  if (loading) return <Loading rows={8}/>;

/* ---------- PICK'EM ---------- */
function loadPicks(){ try{ return JSON.parse(localStorage.getItem("cfb_picks")||"{}"); }catch{ return {}; } }
function savePicks(p){ try{ localStorage.setItem("cfb_picks", JSON.stringify(p)); }catch{} }

function Pickem({ teamId, year, teams }) {
  const [week, setWeek] = useState(1);
  const [showAll, setShowAll] = useState(false);
  const [picks, setPicks] = useState(loadPicks);
  const { data, err, loading, reload } = useData(() => getJSON(URLS.scoreboard(year, week)), [year, week]);
  const events = data?.events || [];

  // curated slate: your team + games involving ranked teams, sorted by relevance
  const slate = useMemo(() => {
    const rankOf = e => Math.min(...e.competitions[0].competitors.map(c => c.curatedRank?.current || 99));
    const mine = e => e.competitions?.[0]?.competitors?.some(c => String(c.team?.id)===String(teamId));
    let list = events.filter(e => e.competitions?.[0]);
    if (!showAll) list = list.filter(e => mine(e) || rankOf(e) <= 25);
    return list.sort((a,b)=> (mine(b)?1:0)-(mine(a)?1:0) || rankOf(a)-rankOf(b)).slice(0, showAll?300:30);
  }, [events, teamId, showAll]);

  // auto-grade finals that have a pick but no recorded result yet
  useEffect(() => {
    let changed = false; const next = { ...picks };
    events.forEach(ev => {
      const comp = ev.competitions?.[0]; if (!comp?.status?.type?.completed) return;
      const k = `${year}-${week}-${ev.id}`; const p = next[k];
      if (p && p.correct == null) {
        const win = comp.competitors.find(c => c.winner);
        if (win) { next[k] = { team: p.team, correct: String(win.team?.id)===String(p.team) }; changed = true; }
      }
    });
    if (changed) { setPicks(next); savePicks(next); }
  // eslint-disable-next-line
  }, [events, week, year]);

  function pick(ev, tid) {
    const comp = ev.competitions?.[0];
    if (comp?.status?.type?.completed) return; // locked
    const k = `${year}-${week}-${ev.id}`;
    const next = { ...picks, [k]: { team: tid, correct: null } };
    setPicks(next); savePicks(next); buzz(6);
  }

  const graded = Object.values(picks).filter(p => p.correct != null);
  const right = graded.filter(p => p.correct).length;

  return (
    <>
      <div className="section-title">Pick'em
        <select className="input" style={{width:118,padding:"6px 8px",fontSize:13}}
          value={week} onChange={e=>setWeek(+e.target.value)}>
          {Array.from({length:15},(_,i)=>i+1).map(w=><option key={w} value={w}>Week {w}</option>)}
        </select>
      </div>
      <div className="card" style={{display:"flex",alignItems:"center",padding:"12px 14px",marginBottom:12}}>
        <div>
          <div className="ng-label">Season record</div>
          <div className="display mono-num" style={{fontSize:24,fontWeight:700}}>
            {right}<span style={{color:"var(--muted)",fontSize:16}}>–{graded.length-right}</span>
          </div>
        </div>
        <div style={{marginLeft:"auto",textAlign:"right"}}>
          <div className="ng-label">Accuracy</div>
          <div className="display mono-num" style={{fontSize:24,fontWeight:700,color:"var(--accent)"}}>
            {graded.length ? Math.round(100*right/graded.length) : 0}%
          </div>
        </div>
      </div>

      {loading ? <Loading rows={6}/> : err ? <ErrBox msg={err} retry={reload}/> :
        !slate.length ? <Empty>No games for week {week} of {year} yet.{" "}
          <button onClick={()=>setShowAll(true)} style={{color:"var(--accent)",fontWeight:600}}>Show all</button></Empty> :
        <>
          <div className="grid cols2">
            {slate.map(ev => <PickGame key={ev.id} ev={ev} teamId={teamId}
              pickKey={`${year}-${week}-${ev.id}`} picks={picks} onPick={pick} />)}
          </div>
          <button className="btn ghost" style={{marginTop:14,width:"100%"}}
            onClick={()=>setShowAll(s=>!s)}>{showAll?"Show ranked & my-team only":"Show every FBS game"}</button>
        </>}
    </>
  );
}
function PickGame({ ev, teamId, pickKey, picks, onPick }) {
  const comp = ev.competitions[0];
  const st = comp.status?.type; const done = st?.completed;
  const p = picks[pickKey];
  const cs = comp.competitors;

        {done && !p && <span className="badge final">Final</span>}
        {!done && <span className="ng-label">{st?.shortDetail||"Tap to pick"}</span>}
      </div>
      {cs.map(c => {
        const picked = p?.team===String(c.team?.id) || p?.team===c.team?.id;
        const win = done && c.winner;
        return (
          <button key={c.id} onClick={()=>onPick(ev, String(c.team?.id))}

              background:picked?"var(--primary-soft)":"transparent",
              outline:picked?"1px solid var(--accent)":"none",borderRadius:9,margin:"2px 6px",cursor:done?"default":"pointer"}}>
            <span className="rk">{c.curatedRank?.current&&c.curatedRank.current<=25?c.curatedRank.current:""}</span>
            <div className="team-mini" style={{flex:1}}>

/* ---------- COMPARE (radar + stat bars) ---------- */
const CMP_AXES = [
  { key:"winPercent", label:"Win %", names:["winPercent","winpercent"], better:"high", fmt:v=>(v*100).toFixed(0)+"%" },
  { key:"avgPF", label:"Pts For/G", names:["avgPointsFor","pointsForPerGame"], better:"high", fmt:v=>v.toFixed(1) },
  { key:"avgPA", label:"Scoring D", names:["avgPointsAgainst","pointsAgainstPerGame"], better:"low", fmt:v=>v.toFixed(1) },
  { key:"diff", label:"Pt Diff", names:["pointDifferential","differential"], better:"high", fmt:v=>(v>0?"+":"")+v },
  { key:"wins", label:"Wins", names:["wins"], better:"high", fmt:v=>String(v) },
];
function teamStat(detail, names){
  const stats = detail?.record?.items?.[0]?.stats || [];
  for (const n of names){ const s = stats.find(x=>x.name===n); if (s && s.value!=null) return s.value; }
  return null;
}
function Compare({ team, teams, detail }) {
  const opts = useMemo(()=>Object.values(teams).sort((a,b)=>a.displayName.localeCompare(b.displayName)),[teams]);
  const nextOppId = detail?.nextEvent?.[0]?.competitions?.[0]?.competitors
    ?.find(c=>String(c.team?.id)!==String(team.id))?.team?.id;
  const [bId, setBId] = useState(()=> (nextOppId && teams[nextOppId]) ? String(nextOppId) : (opts.find(t=>t.id!==team.id)?.id));
  const [dA, setDA] = useState(null); const [dB, setDB] = useState(null);
  const [loading, setLoading] = useState(true);
  const teamB = teams[bId];

  useEffect(()=>{ let on=true; setLoading(true);
    Promise.all([ getJSON(URLS.team(team.id)).catch(()=>null), getJSON(URLS.team(bId)).catch(()=>null) ])
      .then(([a,b])=>{ if(on){ setDA(a?.team||detail); setDB(b?.team); setLoading(false); } });
    return ()=>{on=false;};
  },[team.id,bId]);

  const axes = useMemo(()=>{
    if(!dA||!dB) return [];
    return CMP_AXES.map(ax=>{
      let a = teamStat(dA, ax.names), b = teamStat(dB, ax.names);
      if(a==null||b==null) return null;
      // normalize 0.12..1 across the pair; invert when lower is better
      let na=a, nb=b;
      if(ax.better==="low"){ na=-a; nb=-b; }
      const lo=Math.min(na,nb), hi=Math.max(na,nb), span=(hi-lo)||1;
      return { ...ax, a, b, na:0.18+0.82*(na-lo)/span, nb:0.18+0.82*(nb-lo)/span };
    }).filter(Boolean);
  },[dA,dB]);

  return (
    <>
      <div className="section-title">Head to head</div>
      <div className="cmp-head card">
        <div className="cmp-team">
          <img src={logoOf(team)} alt=""/>
          <div className="cmp-nm">{team.shortDisplayName||team.nickname||team.name}</div>
          <div className="ng-meta mono-num">{dA?.record?.items?.[0]?.summary||""}</div>
        </div>
        <div className="cmp-vs">VS</div>
        <div className="cmp-team">
          <img src={teamB?logoOf(teamB):""} alt=""/>
          <select className="cmp-select" value={bId} onChange={e=>setBId(e.target.value)}>
            {opts.filter(t=>t.id!==team.id).map(t=><option key={t.id} value={t.id}>{t.displayName}</option>)}
          </select>
          <div className="ng-meta mono-num">{dB?.record?.items?.[0]?.summary||""}</div>
        </div>
      </div>

      {loading ? <Loading rows={5}/> :
        !axes.length ? <Empty>Stats aren't available for both teams yet — they fill in once games are played. Switch the season to a completed year in ⚙ to see a full comparison.</Empty> :
        <>
          {axes.length>=3 && <Radar axes={axes} />}
          <div className="card" style={{marginTop:12}}>
            {axes.map(ax=>(
              <div className="cmp-row" key={ax.key}>
                <span className="cmp-val mono-num" style={{textAlign:"right",color:cmpWin(ax,"a")?"var(--accent)":"var(--muted)"}}>{ax.fmt(ax.a)}</span>
                <div className="cmp-bars">
                  <div className="cmp-label">{ax.label}</div>
                  <div className="cmp-track"><div className="cmp-fill left" style={{width:(ax.na*50)+"%"}}/><div className="cmp-fill right" style={{width:(ax.nb*50)+"%"}}/></div>
                </div>
                <span className="cmp-val mono-num" style={{color:cmpWin(ax,"b")?"var(--accent)":"var(--muted)"}}>{ax.fmt(ax.b)}</span>
              </div>
            ))}
          </div>
        </>}
    </>
  );
}
function cmpWin(ax, side){ const a=ax.better==="low"?-ax.a:ax.a, b=ax.better==="low"?-ax.b:ax.b; return side==="a"?a>=b:b>a; }

function Radar({ axes }) {
  const size=240, cx=size/2, cy=size/2, r=92, N=axes.length;
  const pt=(val,i)=>{ const ang=-Math.PI/2 + i*2*Math.PI/N; return [cx+Math.cos(ang)*r*val, cy+Math.sin(ang)*r*val]; };
  const poly=key=>axes.map((ax,i)=>pt(ax[key],i).join(",")).join(" ");
  const rings=[0.25,0.5,0.75,1];
  return (
    <div className="card" style={{padding:"14px 0 6px",display:"flex",flexDirection:"column",alignItems:"center"}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {rings.map((rr,ri)=>(
          <polygon key={ri} points={axes.map((_,i)=>pt(rr,i).join(",")).join(" ")}
            fill="none" stroke="var(--line)" strokeWidth="1"/>
        ))}
        {axes.map((_,i)=>{ const [x,y]=pt(1,i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--line)" strokeWidth="1"/>; })}
        <polygon points={poly("nb")} fill="rgba(140,150,165,.18)" stroke="var(--muted)" strokeWidth="2"/>
        <polygon points={poly("na")} fill="var(--primary-soft)" stroke="var(--accent)" strokeWidth="2.5"/>
        {axes.map((ax,i)=>{ const [x,y]=pt(1.16,i); return (
          <text key={i} x={x} y={y} fontSize="9.5" fontFamily="Oswald" fill="var(--muted)"
            textAnchor="middle" dominantBaseline="middle" style={{textTransform:"uppercase",letterSpacing:".5px"}}>{ax.label}</text>
        );})}
      </svg>
      <div style={{display:"flex",gap:18,fontSize:12,fontWeight:600,paddingBottom:6}}>
        <span style={{color:"var(--accent)"}}>● Your team</span>
        <span style={{color:"var(--muted)"}}>● Opponent</span>
      </div>
    </div>
  );
}

// --- WMO weather code -> label/emoji (Open-Meteo) ---
function wmo(code){
  const m={0:["Clear","☀️"],1:["Mostly clear","🌤️"],2:["Partly cloudy","⛅"],3:["Overcast","☁️"],45:["Fog","🌫️"],48:["Fog","🌫️"],51:["Drizzle","🌦️"],53:["Drizzle","🌦️"],55:["Drizzle","🌧️"],61:["Rain","🌧️"],63:["Rain","🌧️"],65:["Heavy rain","🌧️"],71:["Snow","🌨️"],73:["Snow","🌨️"],75:["Heavy snow","❄️"],77:["Snow","🌨️"],80:["Showers","🌦️"],81:["Showers","🌧️"],82:["Downpour","⛈️"],85:["Snow showers","🌨️"],86:["Snow showers","❄️"],95:["T-storm","⛈️"],96:["T-storm","⛈️"],99:["T-storm","⛈️"]};
  const r=m[code]||["—","🏈"]; return { desc:r[0], emoji:r[1] };
}
// Open-Meteo is CORS-open & keyless: fetch directly (no relay). Cached in memory (30 min).
const _wxMem = {};
async function fetchWeather(city, region, dateStr){
  if(!city) return null;
  const ck = city+"|"+(region||"")+"|"+(dateStr||"");
  const h=_wxMem[ck]; if(h && Date.now()-h.t < 18e5) return h.v;
  try{
    const q=encodeURIComponent(city+(region?(" "+region):"")+" USA");
    const g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=1&country=US`).then(r=>r.json());
    const loc=(g.results||[])[0]; if(!loc) return null;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current=temperature_2m,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code,precipitation_probability,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=16`;
    const w=await fetch(url).then(r=>r.json());
    let temp,code,wind,precip,when="now";
    const target=dateStr?new Date(dateStr).getTime():null;
    if(target&&w.hourly&&w.hourly.time){
      let bi=-1,bd=Infinity;
      w.hourly.time.forEach((t,i)=>{const d=Math.abs(new Date(t).getTime()-target);if(d<bd){bd=d;bi=i;}});
      if(bi>=0&&bd<36e5*3){temp=w.hourly.temperature_2m[bi];code=w.hourly.weather_code[bi];wind=w.hourly.wind_speed_10m[bi];precip=(w.hourly.precipitation_probability||[])[bi];when="kickoff";}
    }
    if(temp==null&&w.current){temp=w.current.temperature_2m;code=w.current.weather_code;wind=w.current.wind_speed_10m;when="now";}
    if(temp==null) return null;
    const out=Object.assign({temp:Math.round(temp),wind:Math.round(wind),precip:precip==null?null:Math.round(precip),when,city:loc.name},wmo(code));
    _wxMem[ck]={t:Date.now(),v:out};
    return out;
  }catch(e){ return null; }
}
// Wikipedia action API supports origin=* (CORS-safe), no key. Cached persistently (stadium info is static).
const _stadMem = {};
async function fetchStadium(name){
  if(!name) return null;
  if(_stadMem[name]) return _stadMem[name];
  const lk = "cfb_stad_" + name;
  const cached = lsGet(lk); if(cached){ _stadMem[name]=cached; return cached; }
  try{
    const u=`https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages|extracts&piprop=original|thumbnail&pithumbsize=1000&exintro=1&explaintext=1&redirects=1&titles=${encodeURIComponent(name)}`;
    const d=await fetch(u).then(r=>r.json());
    const pages=(d.query&&d.query.pages)||{}; const p=Object.values(pages)[0];
    if(!p||p.missing!==undefined) return null;
    const img=(p.original&&p.original.source)||(p.thumbnail&&p.thumbnail.source);
    const out={ img, title:p.title, extract:p.extract, url:"https://en.wikipedia.org/wiki/"+encodeURIComponent((p.title||"").replace(/ /g,"_")) };
    _stadMem[name]=out; lsSet(lk,out);
    return out;
  }catch(e){ return null; }
}
// ESPN Matchup Predictor (win %) via the summary endpoint (uses relay path).
async function fetchPredictor(eventId){
  if(!eventId) return null;

function statVal(arr, names){ if(!arr) return null; for(const n of names){ const s=arr.find(x=>x.name===n||x.label===n); if(s) return s.displayValue; } return null; }
// ESPN's athlete-overview "statistics" block comes back in a few shapes depending on
// the player/sport. Try each known form, fail soft to empty (never throw).
function extractStats(st){
  if(!st) return { hdr:"Season stats", pairs:[] };
  const hdr = st.displayName || st.name || "Season stats";
  let labels = st.displayNames || st.labels || st.names;
  let vals = (st.splits && st.splits[0] && st.splits[0].stats) || st.stats;
  if((!labels || !vals) && st.splits && Array.isArray(st.splits.categories)){
    const c = st.splits.categories.find(x=>x.stats && x.stats.length) || st.splits.categories[0] || {};
    labels = labels || c.labels || c.names || c.displayNames; vals = vals || c.stats;
  }
  if((!labels || !vals) && Array.isArray(st.categories)){
    const c = st.categories.find(x=>x.stats && x.stats.length) || st.categories[0] || {};
    labels = labels || c.labels || c.names; vals = vals || c.stats;
  }
  if(!labels || !vals || !labels.length || !vals.length) return { hdr, pairs:[] };
  const pairs = labels.map((l,i)=>[l, vals[i]]).filter(x=>x[1]!=null && x[1]!=="" && x[1]!=="-").slice(0,12);
  return { hdr, pairs };
}


function useCountdown(dateStr) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { if (!dateStr) return; const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, [dateStr]);
  if (!dateStr) return null;
  const diff = new Date(dateStr).getTime() - now;
  if (diff <= 0) return "It's go time! 🏈";
  const d=Math.floor(diff/864e5), h=Math.floor(diff/36e5)%24, m=Math.floor(diff/6e4)%60, sec=Math.floor(diff/1e3)%60;
  return d+"d "+h+"h "+m+"m "+sec+"s";
}
// tiny haptics: Android vibrates; iOS Safari ignores (no-op) — always guarded
function buzz(pattern) { try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {} }
function airhorn() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext; if (!Ctx) return;
    const ctx = new Ctx();
    if (ctx.state === "suspended" && ctx.resume) { try { ctx.resume(); } catch (e) {} }
    const now = ctx.currentTime;
    const master = ctx.createGain();
    const comp = ctx.createDynamicsCompressor(); // limiter: lets it be LOUD without ugly clipping
    comp.threshold.setValueAtTime(-8, now); comp.knee.setValueAtTime(4, now);
    comp.ratio.setValueAtTime(16, now); comp.attack.setValueAtTime(0.002, now); comp.release.setValueAtTime(0.2, now);
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(1.0, now + 0.02);   // slam to full
    master.gain.setValueAtTime(1.0, now + 1.45);
    master.gain.exponentialRampToValueAtTime(0.0001, now + 1.85); // release the horn
    master.connect(comp); comp.connect(ctx.destination);
    // fat two-tone truck-horn stack (a chord of detuned saws/squares)
    [233, 311, 349, 466, 622].forEach((f, i) => {
      const o = ctx.createOscillator(); o.type = i % 2 ? "square" : "sawtooth";
      o.frequency.setValueAtTime(f, now);
      o.frequency.exponentialRampToValueAtTime(f * 0.97, now + 1.7); // slight droop at the end
      const g = ctx.createGain(); g.gain.setValueAtTime(i === 0 ? 0.55 : 0.4, now);
      o.connect(g); g.connect(master); o.start(now); o.stop(now + 1.9);
    });
    setTimeout(() => { try { ctx.close(); } catch (e) {} }, 2300);
  } catch (e) {}

    const dur = ms || 700, t0 = performance.now();
    let raf = 0;
    const step = (t) => { const p = Math.min(1, (t - t0) / dur); setV(Math.round(end * (1 - Math.pow(1 - p, 3)))); if (p < 1) raf = requestAnimationFrame(step); };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return v;
}
/* ---------- LIVE GAME MODE ---------- */
// Polls only around game windows: checks the (cached) schedule every 5 min when idle,
// then switches to fresh 30s scoreboard+win-probability polling while the game is live.
function useLiveGame(teamId, year) {
  const [live, setLive] = useState(null);
  useEffect(() => {
    let stop = false, timer = null;
    const schedule = (ms) => { if (!stop) timer = setTimeout(tick, ms); };
    const POLL = () => (window.__cfbLivePoll || 30000);
    async function tick() {
      if (document.hidden) { schedule(60000); return; }
      try {
        const sched = await getSchedule(teamId, year); // shared cache; cheap
        const evs = (sched && sched.events) || [];
        const now = Date.now();
        const cand = evs.find(e => {
          const st = e.competitions && e.competitions[0] && e.competitions[0].status && e.competitions[0].status.type && e.competitions[0].status.type.state;
          if (st === "in") return true;
          if (st === "post") return false;
          const t = new Date(e.date).getTime();
          return t - 9e5 <= now && now <= t + 5 * 36e5; // 15 min before kickoff → 5h window
        });
        if (!cand) { if (!stop) setLive(null); schedule(300000); return; }
        // in-window: pull a FRESH scoreboard (ttl 0 bypasses cache) for score/clock/situation
        const sb = await getJSON(URLS.scoreboardNow(), { ttl: 0 });
        const ev = ((sb && sb.events) || []).find(x => String(x.id) === String(cand.id)) || cand;
        const st = ev.competitions && ev.competitions[0] && ev.competitions[0].status && ev.competitions[0].status.type && ev.competitions[0].status.type.state;
        if (st !== "in") { if (!stop) setLive(null); schedule(st === "pre" ? 60000 : 300000); return; }
        let wpHome = null;
        try {
          const sum = await getJSON(`${ESPN}/summary?event=${ev.id}`, { ttl: 0 });
          const arr = sum && sum.winprobability;
          if (Array.isArray(arr) && arr.length) {
            const last = arr[arr.length - 1];
            if (last && last.homeWinPercentage != null) wpHome = Math.round(last.homeWinPercentage * 100);
          }
        } catch (e) {}
        if (!stop) setLive({ event: ev, wpHome });
        schedule(POLL());
      } catch (e) { schedule(60000); }
    }
    tick();
    const vis = () => { if (!document.hidden) { clearTimeout(timer); tick(); } };
    document.addEventListener("visibilitychange", vis);
    return () => { stop = true; clearTimeout(timer); document.removeEventListener("visibilitychange", vis); };
  }, [teamId, year]);
  return live;
}

function LiveGameBar({ live, team, onOpen }) {
  const comp = live.event.competitions[0];
  const me = comp.competitors.find(c => String(c.team && c.team.id) === String(team.id));
  const opp = comp.competitors.find(c => String(c.team && c.team.id) !== String(team.id));
  const st = comp.status || {};
  const homeIsMe = me && me.homeAway === "home";
  const myWp = live.wpHome == null ? null : (homeIsMe ? live.wpHome : 100 - live.wpHome);
  const sit = comp.situation;
  const poss = sit && (sit.possession != null ? String(sit.possession) : null);
  const possMine = poss && me && poss === String(me.team.id);
  const possOpp = poss && opp && poss === String(opp.team.id);
  const clock = [st.period ? "Q" + st.period : null, st.displayClock].filter(Boolean).join(" · ");
  const net = comp.broadcasts && comp.broadcasts[0] && (comp.broadcasts[0].names ? comp.broadcasts[0].names[0] : (comp.broadcasts[0].media && comp.broadcasts[0].media.shortName));
  // score-change: haptic + flash
  const total = (+((me && me.score) || 0)) + (+((opp && opp.score) || 0));
  const prev = useRef(total);
  const [flash, setFlash] = useState(false);
  useEffect(() => {
    if (total !== prev.current) {
      prev.current = total;
      buzz([30, 60, 30]); setFlash(true);
      const t = setTimeout(() => setFlash(false), 950);
      return () => clearTimeout(t);
    }
  }, [total]);
  const ab = (c) => (c && c.team && (c.team.abbreviation || c.team.shortDisplayName)) || "—";
  return (
    <button className={"livebar" + (flash ? " lb-flash" : "")} onClick={onOpen} aria-label="Open live game details">
      <span className="lb-live"><span className="livedot" />LIVE</span>
      <span className="lb-score mono-num">
        <span className={"lb-side" + (possMine ? " poss" : "")}><img src={logoOf(me && me.team)} alt="" />{ab(me)} <b>{(me && me.score) || 0}</b></span>
        <span className="lb-dash">—</span>
        <span className={"lb-side" + (possOpp ? " poss" : "")}><b>{(opp && opp.score) || 0}</b> {ab(opp)}<img src={logoOf(opp && opp.team)} alt="" /></span>
      </span>
      <span className="lb-meta">{clock}{net ? " · " + net : ""}</span>
      {sit && sit.shortDownDistanceText && <span className="lb-sit">{sit.shortDownDistanceText}</span>}
      {myWp != null && (
        <span className="lb-wp"><span className="lb-wp-fill" style={{ width: Math.max(3, Math.min(97, myWp)) + "%" }} /><span className="lb-wp-txt mono-num">{myWp}%</span></span>
      )}
    </button>
  );
}

function KickoffCountdown({ team, year }) {
  const { data } = useData(() => getSchedule(team.id, year), [team.id, year]);
  const events = data?.events || [];
  const now = Date.now();
  const opener = events[0];
  const nextUp = events.find(e => !(e.competitions?.[0]?.status?.type?.completed));
  const target = (opener && new Date(opener.date).getTime() > now) ? opener : nextUp;
  const cd = useCountdown(target?.date);
  if (!target) return null;
  const comp = target.competitions?.[0];
  const me = comp?.competitors?.find(c => String(c.team?.id) === String(team.id));
  const opp = comp?.competitors?.find(c => String(c.team?.id) !== String(team.id));
  const isOpener = target === opener;
  const future = new Date(target.date).getTime() > now;
  return (
    <div className="cfb-countdown">
      <span className="cd-flag">🏈</span>
      <span className="cd-title">{future ? (isOpener ? "Kickoff to College Football" : "Next kickoff") : "Season is live"}</span>
      <span className="cd-clock mono-num">{cd}</span>
      <span className="cd-sub">{(me?.homeAway === "home" ? "vs " : "@ ") + (opp?.team?.abbreviation || opp?.team?.displayName || "TBD")} · {fmtShort(target.date)}{comp?.venue?.fullName ? " · " + comp.venue.fullName : ""}</span>
    </div>
  );
}

function FightSong({ team, openSettings }) {
  const [state, setState] = useState("idle"); // idle | loading | play | needkey | fail
  const [vid, setVid] = useState(null);
  async function play() {
    try { const c = localStorage.getItem("cfb_fs_" + team.id); if (c) { setVid(c); setState("play"); return; } } catch (e) {}
    setState("loading");
    const r = await fightSongId(team);
    if (r && r.needKey) { setState("needkey"); return; }
    if (typeof r === "string") { setVid(r); setState("play"); } else { setState("fail"); }
  }
  if (state === "play" && vid) return (
    <div className="gd-fs">
      <iframe title="Fight song" className="gd-fs-frame"
        src={"https://www.youtube-nocookie.com/embed/" + vid + "?autoplay=1&rel=0&modestbranding=1&playsinline=1"}
        allow="autoplay; encrypted-media" allowFullScreen frameBorder="0"></iframe>
      <button className="gd-fs-x" onClick={() => { setState("idle"); setVid(null); }}>✕ stop</button>
    </div>
  );
  return (
    <>
      <button className="btn gd-fight" disabled={state === "loading"} onClick={play}>{state === "loading" ? "Finding…" : "▶ Play Fight Song"}</button>
      {state === "needkey" && <div className="gd-fs-note">Add your Anthropic key in <button onClick={openSettings} style={{ color: "var(--accent)", fontWeight: 600 }}>settings</button> to play the fight song inline.</div>}
      {state === "fail" && <div className="gd-fs-note">Couldn't find it — <button onClick={play} style={{ color: "var(--accent)", fontWeight: 600 }}>try again</button>.</div>}
    </>
  );
}

// College GameDay-style slate: this week's marquee (ranked) matchups, keyless from the scoreboard.
function FeaturedGames({ teamId, teams }) {
  const { data } = useData(() => getJSON(URLS.scoreboardNow(), { ttl: 3e5 }), []);
  const games = useMemo(() => {
    const evs = data?.events || [];
    return evs.map(e => {
      const c = e.competitions?.[0]; if (!c) return null;
      const cs = c.competitors || [];
      const ranks = cs.map(x => x.curatedRank?.current).filter(r => r && r <= 25);
      if (!ranks.length) return null;
      const score = ranks.reduce((a, r) => a + (26 - r), 0) + (ranks.length === 2 ? 40 : 0);
      return { e, c, cs, score };
    }).filter(Boolean).sort((a, b) => b.score - a.score).slice(0, 5);
  }, [data]);
  if (!games.length) return null;
  return (
    <>
      <div className="section-title">Around CFB · this week's big games</div>
      <div className="card">
        {games.map(({ e, c, cs }) => {
          const a = cs.find(x => x.homeAway === "away") || cs[0];
          const h = cs.find(x => x.homeAway === "home") || cs[1];
          const net = c.broadcasts?.[0]?.names?.[0] || c.broadcasts?.[0]?.media?.shortName;
          const rk = (x) => x?.curatedRank?.current && x.curatedRank.current <= 25 ? <span className="rk">{x.curatedRank.current}</span> : null;
          return (
            <div className="feat-row" key={e.id}>
              <div className="feat-teams">
                <span className="team-mini">{rk(a)}<img src={logoOf(a?.team)} alt="" />{a?.team?.abbreviation || a?.team?.displayName}</span>
                <span className="feat-at">@</span>
                <span className="team-mini">{rk(h)}<img src={logoOf(h?.team)} alt="" />{h?.team?.abbreviation || h?.team?.displayName}</span>
              </div>
              <div className="feat-meta ng-label">{fmtShort(e.date)}{net ? " · " + net : ""}</div>
            </div>
          );
        })}
      </div>
    </>
  );
}

"Georgia":{traditions:`Uga, the white English bulldog, has his own air-conditioned doghouse and varsity letter. Ringing the Chapel Bell after wins, the Dawg Walk through ten thousand fans, and playing Between the Hedges at Sanford Stadium define Athens Saturdays. "Glory Glory" rings out to the tune of Battle Hymn.`,rivalries:`Florida in Jacksonville — the World's Largest Outdoor Cocktail Party — is an annual neutral-site holiday. Auburn is the Deep South's Oldest Rivalry (since 1892), and Georgia Tech gets Clean Old-Fashioned Hate every Thanksgiving weekend.`,legends:`Herschel Walker ran through the SEC for the 1980 title and 1982 Heisman as the greatest college back ever. Vince Dooley and Kirby Smart's 2021-22 back-to-back champions bracket the lore, with Frank Sinkwich and Charley Trippi's 1940s stardom underneath.`,fightsong:`Glory, Glory — sung since the 1890s — alongside Hail to Georgia. The Redcoat Band's Krypton fanfare entrance gives chills on repeat viewings.`},
"LSU":{traditions:`Death Valley at night is the sport's most feared venue — "Saturday night in Death Valley" is a threat, not a slogan. Mike the Tiger's habitat sits beside the stadium, the Golden Band from Tigerland's pregame salute makes grown fans cry, and Callin' Baton Rouge turns 102,000 into a Garth Brooks choir.`,rivalries:`Alabama is the annual heavyweight bout that has decided national titles. Ole Miss brings the Magnolia Bowl, Texas A&M inherited a border war, and Florida alternates home-and-home haymakers.`,legends:`Billy Cannon's 89-yard Halloween punt return won the 1959 Heisman. Joe Burrow's 2019 season — maybe the best ever played — delivered the third title (2003, 2007, 2019); Odell, Ja'Marr Chase, and Patrick Peterson headline the NFL pipeline.`,fightsong:`Fight for LSU, with Hold That Tiger as the growling singalong. Pregame's four-note salute from the Golden Band is the true anthem.`},
"Tennessee":{traditions:`The Vol Navy sailgates the Tennessee River right up to Neyland Stadium's 101,000 checkerboard-clad fans. Running through the T, the orange-and-white checkerboard end zones, and Smokey the bluetick hound's howl set the scene on the third Saturday of every October.`,rivalries:`Alabama on the Third Saturday in October — win it and the team smokes victory cigars. Florida owned Septembers for a generation, Georgia contests the East, and Vanderbilt gets the in-state chores.`,legends:`General Robert Neyland won national titles and wrote football's maxims; the stadium bears his name. Peyton Manning chose Knoxville and became its favorite son, Reggie White terrorized from the edge, and the 1998 team won the first BCS championship.`,fightsong:`Down the Field is the official fight song, but Rocky Top — played roughly 400 times a game — is the one opponents hear in their sleep.`},
"Auburn":{traditions:`After wins, Toomer's Corner disappears under toilet paper as the whole town rolls the oaks. A live eagle circles Jordan-Hare pregame to a "Warrrrr Eagle" that builds until landing at midfield — the best pregame moment in sports. The Tiger Walk started the player-walk tradition everyone else copied.`,rivalries:`The Iron Bowl vs Alabama defines the state; Kick Six (2013) is the most replayed play in college football history. Georgia is the Deep South's Oldest Rivalry, and LSU brings an annual border brawl.`,legends:`Bo Jackson (1985 Heisman) is the greatest athlete the sport has seen; Pat Sullivan (1971) and Cam Newton's 2010 title run added Heismans. Shug Jordan's 1957 champions and the undefeated 2004 team round out the case files.`,fightsong:`War Eagle — both the fight song and the greeting Auburn people exchange worldwide. If someone says it to you, say it back.`},
"Florida":{traditions:`The Gator Chomp's two-armed bite taunts from every corner of The Swamp — "only Gators get out alive." Mr. Two Bits' cheer lives on through celebrity successors, and the whole stadium sways arm-in-arm singing We Are the Boys between the third and fourth quarters.`,rivalries:`Georgia in Jacksonville is the annual Cocktail Party grudge. Florida State brings the in-state Thanksgiving war, Tennessee defined 90s Septembers, and Miami lurks whenever scheduled.`,legends:`Steve Spurrier won the 1966 Heisman then returned as the Head Ball Coach to win the 1996 title with the Fun 'n' Gun. Tim Tebow (2007 Heisman, two titles) gave The Promise; Danny Wuerffel, Emmitt Smith, and Wilber Marshall complete the wing.`,fightsong:`Orange and Blue — with the chomp keeping time. The band's Jaws theme into a stadium-wide chomp is peak Swamp.`},
"Texas":{traditions:`Hook 'em Horns — the hand sign flashed from Austin to everywhere — meets Bevo, a 1,700-pound longhorn steer watching from the end zone. Smokey the Cannon fires after scores, the tower glows burnt orange after wins, and The Eyes of Texas closes every game, hands raised.`,rivalries:`The Red River Rivalry vs Oklahoma at the State Fair of Texas splits the Cotton Bowl half-crimson, half-burnt-orange with corny dogs for all. Texas A&M's renewed Thanksgiving feud restores the state's oldest argument.`,legends:`Darrell K Royal's wishbone won national titles (1963, 1969); Vince Young's 2005 Rose Bowl drive against USC is the greatest title-game performance ever. Earl Campbell (1977) and Ricky Williams (1998) bulldozed to Heismans; Colt McCoy and the 2023-24 playoff teams carry it forward.`,fightsong:`Texas Fight — punctuated by "Texas! Fight!" shouts and the Showband of the Southwest's Longhorn formation. The Eyes of Texas is the solemn bookend.`},
"Oklahoma":{traditions:`The Sooner Schooner — a Conestoga wagon pulled by ponies named Boomer and Sooner — charges the field after every score. The RUF/NEKS fire shotguns (blanks) and paddle the sideline; the crowd's "Boomer!" "Sooner!" call-and-response never stops.`,rivalries:`Red River vs Texas at the Cotton Bowl is a coin-flip of pure hate every October. Bedlam vs Oklahoma State owned the state for a century, and the old Nebraska Thanksgiving games were the sport's main event for decades.`,legends:`Bud Wilkinson's 47-game win streak will never be touched. Barry Switzer's wishbone won titles; Billy Sims (1978), Sam Bradford, Baker Mayfield, and Kyler Murray stacked Heismans — plus Jason White and Steve Owens. Seven national championships and counting.`,fightsong:`Boomer Sooner — played, by conservative estimate, ten thousand times per game. You will leave humming it whether you want to or not.`},
"Texas A&M":{traditions:`The 12th Man stands the entire game — every Aggie a substitute ready since 1922. Midnight Yell packs Kyle Field the night before games for practice-hate at full volume, Reveille (the First Lady of Aggieland) outranks everyone, and when Kyle Field sways, it literally moves.`,rivalries:`Texas — the renewed Thanksgiving blood feud the state spent a decade missing. LSU's border war brings seven-overtime chaos energy, and Arkansas plays the Southwest Classic at JerryWorld.`,legends:`John David Crow won Bear Bryant's only Heisman here (1957) out of the Junction Boys era. Johnny Manziel's 2012 Heisman broke the internet before that was a thing; Von Miller, Dat Nguyen, and the Wrecking Crew defenses set the defensive standard.`,fightsong:`The Aggie War Hymn — "Hullabaloo, Caneck! Caneck!" — ends with the whole stadium locking arms and sawing Varsity's horns off, swaying Kyle Field on its foundations.`},
"Ole Miss":{traditions:`The Grove is tailgating's cathedral — ten acres of oaks, chandeliers in tents, and the Walk of Champions through it all. The Hotty Toddy chant is greeting, password, and battle cry; nobody leaves before the fourth-quarter singalongs at Vaught-Hemingway.`,rivalries:`The Egg Bowl vs Mississippi State on Thanksgiving decides the state's mood for a year. LSU brings the Magnolia Bowl border war, and Alabama visits carry generational stakes.`,legends:`Archie Manning is the eternal favorite son — the speed limit on campus is 18 mph for his number — and Eli added a Manning encore. Chucky Mullins' courage defines the program's soul; Johnny Vaught's 1950s-60s teams won SEC crowns in bunches.`,fightsong:`Forward Rebels — but the real anthem is the full-stadium Hotty Toddy: "Are you ready? Hell yes! Damn right!"`},
"Notre Dame":{traditions:`Players slap the PLAY LIKE A CHAMPION TODAY sign down the tunnel steps. Touchdown Jesus overlooks the stadium from the library mural, the Golden Dome glows over campus, and the leprechaun leads the most storied brand in the sport — trumpets under the dome, player walk, candlelight grotto and all.`,rivalries:`USC for the Jeweled Shillelagh is the greatest intersectional rivalry ever. Navy's annual series honors a WWII debt of gratitude; Michigan and Michigan State (the Megaphone) fill the ancient-grudge shelf.`,legends:`Knute Rockne invented the modern sport's mythology — the Four Horsemen, the Gipper speech, all of it. Seven Heisman winners from Angelo Bertelli to Tim Brown, eleven claimed national titles, Joe Montana's comebacks, and Rudy for the romantics.`,fightsong:`The Victory March — the most famous fight song in America, cheer-cheer-ing for Old Notre Dame since 1908. The band's trumpet rendition under the Golden Dome pregame is a pilgrimage moment.`},
"Clemson":{traditions:`Running Down the Hill — the team buses around the stadium, rubs Howard's Rock, and pours down the east bank to cannon fire — is "the most exciting 25 seconds in college football." Death Valley's $2 bills tradition follows Tiger fans to every road town.`,rivalries:`South Carolina in the Palmetto Bowl is the state's Thanksgiving-week civil war, played every year since 1909. Florida State became the ACC's title-deciding feud; Georgia looms across the border.`,legends:`Frank Howard gave the program its rock and its name. Danny Ford won the 1981 title as a 33-year-old; Dabo Swinney's Deshaun Watson (2016) and Trevor Lawrence (2018) teams beat Alabama for two more. C.J. Spiller and Brian Dawkins headline the athlete wing.`,fightsong:`Tiger Rag — "the song that shakes the Southland" — with the crowd spelling C-L-E-M-S-O-N as the band struts.`},
"Florida State":{traditions:`Osceola charges Doak Campbell on Renegade and plants a flaming spear at midfield — the best entrance in the sport. The War Chant and tomahawk chop roll for entire drives; sod from big road wins gets buried in the Sod Cemetery.`,rivalries:`Miami games decided national titles through Wide Rights I-IV heartbreak. Florida is the Thanksgiving in-state war, and Clemson contests the ACC throne.`,legends:`Bobby Bowden's dynasty finished top-5 for 14 straight years with titles in 1993 and 1999; Jameis Winston added 2013. Charlie Ward and Chris Weinke won Heismans, Deion Sanders played corner like a headliner, and Warrick Dunn ran with grace.`,fightsong:`The FSU Fight Song rides alongside the War Chant — which needs no words, just an arm and 79,000 voices.`},
"Miami":{traditions:`The team enters through smoke — a tradition born in the 80s that still hits. The U hand-sign, the turnover chain era, and a swagger that changed how the sport carries itself: Miami isn't a campus tradition so much as an attitude with a schedule.`,rivalries:`Florida State games in the 80s-00s were de facto national semifinals, decided by Wide Rights and Wide Lefts. Florida brings in-state hate whenever played; Notre Dame's Catholics-vs-Convicts lore still sells documentaries.`,legends:`Five national titles from 1983-2001, with the 2001 team the deepest roster ever assembled. Vinny Testaverde won the Heisman; Michael Irvin, Ray Lewis, Ed Reed, Sean Taylor, and Warren Sapp made The U an NFL factory with its own wing in Canton.`,fightsong:`The band's Hail to the Spirit plays, but the real soundtrack is the smoke-entrance roar and the C-A-N-E-S spellout.`},
"Utah":{traditions:`The MUSS — Utah's student section — turns Rice-Eccles into a red wall at altitude, with the Ute drum circle and flag charge setting kickoff. Third-down jumps and mountain sunsets over the stadium rim make Salt Lake Saturdays underrated theater.`,rivalries:`The Holy War vs BYU is one of the sport's fiercest rivalries, religion and geography stacked on football. Colorado's border feud carried into the Big 12 era.`,legends:`Urban Meyer's 2004 team busted the BCS undefeated with Alex Smith at the controls, and the 2008 squad beat Alabama to finish perfect. Ron McBride built it; Kyle Whittingham's two Pac-12 titles and NFL defender pipeline sustained it.`,fightsong:`Utah Man — "I am a Utah man, sir" — sung with the MUSS at full roar and revised verses everyone still argues about.`},
"Colorado":{traditions:`Ralphie's Run — a 1,200-pound live buffalo thundering across Folsom Field with handlers barely hanging on — is the single best entrance in sports. The flatirons backdrop and black-and-gold sunsets do the rest.`,rivalries:`Nebraska's old Big Eight hate never fully cooled. Utah renewed a border feud, and the Rocky Mountain Showdown vs Colorado State owns Denver Septembers.`,legends:`Bill McCartney's 1990 team won the national title (fifth down and all); Rashaan Salaam won the 1994 Heisman and Kordell Stewart threw The Catch that same season. Deion Sanders' arrival made Boulder the center of the football universe again.`,fightsong:`Fight CU roars alongside the Buffs' Glory Colorado — timed to Ralphie's lap if the band knows what's good for it.`},
"Army":{traditions:`The Corps of Cadets marches on before every home game at Michie Stadium above the Hudson — the best pregame pageantry in America. Mules lead the sideline, cadets do push-ups for every point, and the alma mater is sung to the Corps win or lose.`,rivalries:`Army-Navy is America's Game — the last regular-season Saturday, presidents in attendance, and the whole sport standing at attention. The Commander-in-Chief's Trophy adds Air Force to the round-robin stakes.`,legends:`The 1944-46 teams with Doc Blanchard (Mr. Inside, 1945 Heisman) and Glenn Davis (Mr. Outside, 1946 Heisman) were the greatest backfield ever. Red Blaik coached three national titles; the modern triple-option era brought back bowl streaks and Navy wins.`,fightsong:`On Brave Old Army Team — with the Corps' cannon and cadence carrying it across the Hudson.`},
"Navy":{traditions:`The Brigade of Midshipmen marches on in dress blues before kickoff. Bill the Goat patrols the sideline, and after every game the team sings Blue and Gold facing the Brigade — second verse tradition says the loser sings first, winner sings last.`,rivalries:`Army-Navy in December is bigger than football — 125 years of America's Game. The Commander-in-Chief's Trophy vs Army and Air Force is the season's holy grail; Notre Dame's annual series honors WWII-era loyalty.`,legends:`Roger Staubach won the 1963 Heisman before Dallas immortality; Joe Bellino took it in 1960. The triple-option era under Paul Johnson and Ken Niumatalolo produced decade-long runs of bowl games and Army streaks.`,fightsong:`Anchors Aweigh — written by a bandmaster for the 1906 Army game, now the soundtrack of an entire service. Beat Army is both lyric and lifestyle.`}
};
function loreFor(team) {
  if (!team) return null;
  const loc = (team.location || "").trim();
  if (loc && TEAM_LORE[loc]) return TEAM_LORE[loc];
  const dn = team.displayName || "";
  for (const k in TEAM_LORE) { if (dn === k || dn.indexOf(k + " ") === 0) return TEAM_LORE[k]; }
  return null;
}
function LorePanel({ team, year, openSettings }) {
  const packed = loreFor(team);
  const [built, setBuilt] = useState(() => lsGet("cfb_lore_" + team.id));
  const [topic, setTopic] = useState("traditions");
  const [busy, setBusy] = useState(false);
  const [needKey, setNeedKey] = useState(false);
  const [gdOut, setGdOut] = useState(""); const [gdBusy, setGdBusy] = useState(false);
  useEffect(() => { setTopic("traditions"); setBuilt(lsGet("cfb_lore_" + team.id)); setGdOut(""); setNeedKey(false); }, [team.id]);
  const data = packed || built;
  const TOPICS = [["traditions","🏟️ Traditions"],["rivalries","🔥 Rivalries"],["legends","🏆 Legends"],["fightsong","📣 Fight song"]];
  async function build() {
    setBusy(true); setNeedKey(false);
    const sys = 'You are a college football historian. Reply with ONLY minified JSON, no backticks: {"traditions":string,"rivalries":string,"legends":string,"fightsong":string}. Each value is 2-3 vivid, strictly factual sentences about ' + team.displayName + ' football. Use \\n\\n between paragraphs if needed. Never invent facts; if a topic is thin for this program, say what is actually true. Do not quote song lyrics.';
    const res = await askAI(sys, "Create the lore pack for " + team.displayName + ".", true, 1000);
    if (res.needKey) { setNeedKey(true); setBusy(false); return; }
    try {
      const j = JSON.parse((res.text || "").replace(/```json|```/g, "").trim());
      if (j && j.traditions) { lsSet("cfb_lore_" + team.id, j); setBuilt(j); }
    } catch (e) {}
    setBusy(false);
  }
  async function whereGameday() {
    setGdBusy(true); setNeedKey(false);
    const res = await askAI("You are a college football insider. Be brief and factual; if the season hasn't started or the site isn't announced yet, say so.",
      "Where is ESPN's College GameDay broadcasting from this week (" + year + " season), and what's the matchup?", true, 400);
    if (res.needKey) { setNeedKey(true); setGdBusy(false); return; }
    setGdOut(res.text || ""); setGdBusy(false);
  }
  const nick = team.name || team.shortDisplayName || "Team";
  return (
    <>
      <div className="section-title">{nick} lore</div>
      {data ? (
        <div className="card lore-card">
          <div className="lore-chips">
            {TOPICS.map(([k, l]) => (
              <button key={k} className={"chip" + (topic === k ? " chip-on" : "")} onClick={() => { setTopic(k); buzz(4); }}>{l}</button>
            ))}
          </div>
          <div className="lore-body" key={topic}>
            {String(data[topic] || "More on this one soon.").split("\n\n").map((p, i) => <p key={i}>{p}</p>)}
          </div>
          {!packed && <div className="lore-src ng-label">Built once by AI for this team · saved on your device</div>}
        </div>
      ) : (
        <div className="card lore-card">
          <div className="lore-body"><p>No bundled lore pack for {team.displayName} yet. Build one with AI — it takes a few seconds, then it's saved on your device and never needs the network again.</p></div>
          {busy ? <div className="spin" /> : <button className="btn" style={{ width: "100%" }} onClick={build}>✨ Build {nick} lore (one-time)</button>}
        </div>
      )}
      <div className="lore-foot">
        {gdBusy ? <div className="spin" /> : gdOut ? <div className="ai-out">{gdOut}</div>
          : <button className="chip" onClick={whereGameday}>📍 Where's College GameDay this week?</button>}
      </div>
      {needKey && <div className="err" style={{ borderColor: "#5a4a2b", background: "#241f14", color: "#ffe2a8" }}><span>🔑</span><div>Add your Anthropic key in <button onClick={openSettings} style={{ color: "#ffd98a", textDecoration: "underline", fontWeight: 600 }}>settings</button> for AI features.</div></div>}
    </>
  );
}

function GameDay({ team, detail, year, openSettings }) {
  const { data: sched } = useData(() => getSchedule(team.id, year), [team.id, year]);
  const events = sched?.events || [];
  const nextGame = useMemo(() => events.find(e => !(e.competitions?.[0]?.status?.type?.completed)) || null, [events]);
  const homeVenue = useMemo(() => {
    for (const e of events) {
      const c = e.competitions?.[0];
      const me = c?.competitors?.find(x => String(x.team?.id) === String(team.id));
      if (me?.homeAway === "home" && !c.neutralSite && c.venue?.fullName) return c.venue;
    }
    return nextGame?.competitions?.[0]?.venue || null;
  }, [events, nextGame]);

  const ngComp = nextGame?.competitions?.[0];
  const ngMe = ngComp?.competitors?.find(c => String(c.team?.id) === String(team.id));
  const ngOpp = ngComp?.competitors?.find(c => String(c.team?.id) !== String(team.id));
  const ngDate = nextGame?.date || detail?.nextEvent?.[0]?.date;
  const cd = useCountdown(ngDate);

  const [wx, setWx] = useState(null);
  const [stadium, setStadium] = useState(null);
  const [pred, setPred] = useState(null);
  useEffect(() => { let on = true; const a = ngComp?.venue?.address;
    if (a?.city) fetchWeather(a.city, a.state, ngDate).then(r => { if (on) setWx(r); }); else setWx(null);
    return () => { on = false; }; }, [ngComp, ngDate]);
  useEffect(() => { let on = true; setStadium(null);
    if (homeVenue?.fullName) fetchStadium(homeVenue.fullName).then(r => { if (on) setStadium(r); });
    return () => { on = false; }; }, [homeVenue?.fullName]);
  useEffect(() => { let on = true; setPred(null);
    if (nextGame?.id) fetchPredictor(nextGame.id).then(r => { if (on) setPred(r); });
    return () => { on = false; }; }, [nextGame?.id]);

  const nm = team.shortDisplayName || team.nickname || team.name;
  const homeIsMe = pred && String(pred.homeId) === String(team.id);
  const myPct = pred ? Math.round(homeIsMe ? pred.homePct : pred.awayPct) : 0;
  const oppPct = pred ? Math.max(0, 100 - myPct) : 0;
  const myPctUp = useCountUp(myPct);
  const heroStyle = stadium?.img ? { backgroundImage: "linear-gradient(rgba(8,10,14,.5),rgba(8,10,14,.86)), url(" + stadium.img + ")", backgroundSize: "cover", backgroundPosition: "center" } : undefined;

  return (
    <>
      <div className="gd-hero" style={heroStyle}>
        <div className="hero-lights" aria-hidden="true" />
        <FieldBackdrop />
        <Atmosphere dense />
        <img className="gd-logo" src={logoOf(team)} alt=""/>
        <div className="gd-title display">It's GameDay,<br/>{nm} Nation</div>
        {nextGame ? (
          <div className="gd-count">
            <div className="ng-label" style={{opacity:.92}}>{ngMe?.homeAway==="home"?"vs ":"@ "}{ngOpp?.team?.displayName||ngOpp?.team?.name||"TBD"}</div>
            {cd && <div className="gd-clock mono-num">{cd}</div>}
            {wx && <div className="wx-chip">{wx.emoji} {wx.temp}° · 💨 {wx.wind}mph{wx.precip!=null?" · ☔ "+wx.precip+"%":""}<span className="wx-when">{wx.when==="kickoff"?"forecast at kickoff":"now in "+wx.city}</span></div>}
          </div>
        ) : <div className="ng-label" style={{opacity:.85,marginTop:8}}>No upcoming game scheduled yet.</div>}
        <FightSong team={team} openSettings={openSettings} />
        <div className="gd-btns">
          <button className="btn ghost gd-ghost" onClick={()=>{airhorn();celebrate();buzz([40,60,120]);}}>📣 Air Horn</button>
          {nextGame && <a className="btn ghost gd-ghost" href={ticketUrl(ngComp, ngMe?.team, ngOpp?.team)} target="_blank" rel="noopener">🎟️ Tickets</a>}
          {nextGame && <button className="btn ghost gd-ghost" onClick={()=>{buzz(8); shareMatchupCard(team, ngOpp?.team, ngDate, ngComp?.venue?.fullName);}}>📤 Share</button>}
          {nextGame && icsForEvent(nextGame) && <a className="btn ghost gd-ghost" href={icsForEvent(nextGame)} download="gameday.ics">🗓 Calendar</a>}
        </div>
        {stadium?.title && <a className="gd-stadium" href={stadium.url} target="_blank" rel="noopener">🏟️ {stadium.title}</a>}
      </div>

      {pred && (myPct>0 || oppPct>0) && (
        <div className="card pred">
          <div className="pred-h ng-label">ESPN Matchup Predictor · win probability</div>
          <div className="pred-bar">
            <div className="pred-fill mine" style={{width:myPct+"%"}}>{myPct>=12?myPctUp+"%":""}</div>
            <div className="pred-fill opp" style={{width:oppPct+"%"}}>{oppPct>=12?oppPct+"%":""}</div>
          </div>
          <div className="pred-teams">
            <span className="team-mini"><img src={logoOf(team)} alt=""/>{team.abbreviation||nm}</span>
            <span className="team-mini">{ngOpp?.team?.abbreviation||"OPP"}<img src={logoOf(ngOpp?.team)} alt=""/></span>
          </div>
        </div>
      )}

      {nextGame && <HypeCard event={nextGame} teamId={team.id} openSettings={openSettings} />}

      <FeaturedGames teamId={team.id} />

      <LorePanel team={team} year={year} openSettings={openSettings} />
    </>
  );
}


const classOf = (p) => p.experience?.abbreviation || p.experience?.displayValue || ({0:"FR",1:"SO",2:"JR",3:"SR",4:"SR"}[p.experience?.years]) || "";

  const cmpRows = [["Total Yards",["totalYards"]],["Passing",["netPassingYards"]],["Rushing",["rushingYards"]],["1st Downs",["firstDowns"]],["3rd Down",["thirdDownEff"]],["Turnovers",["turnovers"]],["Penalties",["totalPenaltiesYards"]],["Possession",["possessionTime"]]];

  const bplayers = d?.boxscore?.players || [];
  function leaders(entry){ const out=[]; for(const g of (entry?.statistics||[])){ const a=g.athletes?.[0]; if(!a||!a.athlete) continue; const pairs=(g.labels||[]).map((l,i)=>l+" "+(a.stats?.[i]??"")).slice(0,3).join(" · "); out.push({cat:g.name,name:a.athlete.displayName,line:pairs}); } return out.slice(0,3); }

            <div className="gm-vs display">{me?.homeAway==="home"?"VS":"@"}</div>
          </div>
          <div className="gm-side">
            <img src={logoOf(me?.team||teams[me?.team?.id])} alt=""/>
            <div className="gm-ab">{me?.team?.abbreviation||me?.team?.displayName||""}</div>
            {done && <div className="gm-sc mono-num">{me?.score}</div>}
          </div>
          <button className="close-x gm-x" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body" style={{padding:"4px 14px 18px"}}>
          {loading && <div className="spin"/>}

          {pr && (myPct>0||oppPct>0) && (
            <div style={{margin:"12px 0"}}>
              <div className="ng-label" style={{marginBottom:6}}>Win probability</div>
              <div className="pred-bar"><div className="pred-fill mine" style={{width:myPct+"%"}}>{myPct>=12?myPct+"%":""}</div><div className="pred-fill opp" style={{width:oppPct+"%"}}>{oppPct>=12?oppPct+"%":""}</div></div>
            </div>
          )}

          {(line||ou) && (
            <div className="gm-odds">
              {line && <span className="gm-odd"><b>Line</b> {line}</span>}
              {ou && <span className="gm-odd"><b>O/U</b> {ou}</span>}
            </div>
          )}

          {hasStats && (
            <>
              <div className="section-title" style={{marginTop:14}}>Team stats</div>
              <div className="gm-cmp-h"><span>{away?.team?.abbreviation}</span><span></span><span>{home?.team?.abbreviation}</span></div>
              <div className="card">
                {cmpRows.map(([label,names])=>{ const av=statVal(away?.statistics,names); const hv=statVal(home?.statistics,names); if(av==null&&hv==null) return null; return (
                  <div className="gm-cmp" key={label}><span className="mono-num">{av??"–"}</span><span className="gm-cmp-l">{label}</span><span className="mono-num">{hv??"–"}</span></div>
                ); })}
              </div>
            </>
          )}

          {bplayers.length>0 && bplayers.some(p=>p.statistics?.some(g=>g.athletes?.length)) && (
            <>
              <div className="section-title" style={{marginTop:14}}>Top performers</div>
              <div className="grid cols2">
                {bplayers.map((entry,i)=>(
                  <div className="card" key={i} style={{padding:"10px 12px"}}>
                    <div className="ng-label" style={{marginBottom:6}}>{entry.team?.abbreviation}</div>
                    {leaders(entry).map((l,j)=>(<div key={j} style={{marginBottom:6}}><div style={{fontWeight:600,fontSize:13}}>{l.name} <span className="ng-label" style={{textTransform:"uppercase"}}>· {l.cat}</span></div><div className="ng-label" style={{textTransform:"none",letterSpacing:0}}>{l.line}</div></div>))}
                  </div>
                ))}
              </div>
            </>
          )}

          {(venue||net||att||wxv) && (
            <div className="gm-info">
              {venue && <div>🏟️ {venue}</div>}
              {net && <div>📺 {net}</div>}
              {wxv?.displayValue && <div>🌡️ {wxv.displayValue}{wxv.temperature?" · "+wxv.temperature+"°":""}</div>}
              {att>0 && <div>👥 {att.toLocaleString()} attendance</div>}
            </div>
          )}

          {!done && <HypeCard event={event} teamId={teamId} openSettings={null} />}
          {!done && (
            <div className="gm-cta">
              <a className="gm-tickets" href={ticketUrl(comp, me?.team, opp?.team)} target="_blank" rel="noopener">🎟️ Get tickets</a>
              {icsForEvent(event) && <a className="gm-cal" href={icsForEvent(event)} download="game.ics">🗓 Add to calendar</a>}
            </div>
          )}

          {!loading && !pr && !hasStats && !line && (
            <div className="empty">Deeper stats appear once ESPN posts the matchup details for this game.</div>
          )}
        </div>
      </div>
    </div>
  );
}


function Analyst({ team, detail, year, openSettings }) {
  const [out, setOut] = useState("");
  const [busy, setBusy] = useState(false);
  const [q, setQ] = useState("");
  const hasKey = !!lsRawGet("cfb_anthropic_key");

  async function run(prompt, useSearch) {
    const key = lsRawGet("cfb_anthropic_key");
    if (!key) { openSettings(); return; }
    setBusy(true); setOut("");
    const sys = `You are a sharp, concise college football analyst for a fan of ${team.displayName}. `
      + `It is the ${year} season. Use real, current specifics where you can; never invent scores or stats you're unsure of. `
      + `Keep it tight and readable — short paragraphs, no fluff.`;
    const body = { model:"claude-sonnet-4-6", max_tokens:1300, system:sys, messages:[{role:"user",content:prompt}] };
    if (useSearch) body.tools = [{ type:"web_search_20250305", name:"web_search" }];
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "content-type":"application/json", "x-api-key":key,
          "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (d.error) { setOut("⚠️ " + d.error.message); }
      else setOut((d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim() || "No response.");
    } catch (e) { setOut("⚠️ "+(e.message||"Request failed.")); }
    finally { setBusy(false); }
  }

  const presets = [
    ["Season outlook", `Give me a ${year} season outlook for ${team.displayName}: expectations, key games, and what success looks like.`, true],
    ["Next game preview", `Preview ${team.displayName}'s next ${year} game — matchup, what to watch, and a prediction.`, true],
    ["Recruiting & roster", `What should ${team.displayName} fans know about the current roster and recent recruiting heading into ${year}?`, true],
    ["Playoff path", `Lay out a realistic College Football Playoff path for ${team.displayName} in ${year}.`, true],
  ];

  return (
    <>
      <div className="section-title">Analyst</div>
      {!hasKey && (
        <div className="err" style={{borderColor:"#5a4a2b",background:"#241f14",color:"#ffe2a8",marginBottom:14}}>
          <span>🔑</span><div>Add your Anthropic API key in <button onClick={openSettings} style={{color:"#ffd98a",textDecoration:"underline",fontWeight:600}}>settings</button> to use the analyst. It's stored only on this device.</div>
        </div>
      )}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        {presets.map(([label,p,s])=>(
          <button key={label} className="chip" disabled={busy} onClick={()=>run(p,s)}>{label}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input className="input" placeholder={`Ask anything about ${team.shortDisplayName||team.nickname||"the team"}…`}
          value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&q.trim())run(q,true);}}/>
        <button className="btn" disabled={busy||!q.trim()} onClick={()=>run(q,true)}>Ask</button>
      </div>
      {busy && <div className="spin"/>}
      {out && !busy && <div className="ai-out">{out}</div>}
      {!out && !busy && <div className="empty">Pick a prompt above or ask your own. Answers can pull live info from the web.</div>}
    </>
  );
}

/* ---------- APP NAVIGATION (dock + more sheet + first run) ---------- */
const DOCK_TABS = [["schedule","Schedule"],["gameday","GameDay"],["scores","Scores"],["news","News"]];
const MORE_TABS = [["rankings","Rankings","\ud83d\udcca"],["standings","Standings","\ud83c\udfdb\ufe0f"],["roster","Roster","\ud83e\uddd1\u200d\ud83e\udd1d\u200d\ud83e\uddd1"],["pickem","Pick'em","\u2705"],["compare","Compare","\u2696\ufe0f"],["postseason","Postseason","\ud83c\udfc6"],["ai","Analyst","\ud83e\udd16"]];
const DockIcon = ({ k }) => {
  const s = { width: 20, height: 20, fill: "none", stroke: "currentColor", strokeWidth: 1.9, strokeLinecap: "round", strokeLinejoin: "round" };
  if (k === "schedule") return (<svg {...s} viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>);
  if (k === "gameday") return (<svg {...s} viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9.5" ry="6.2" transform="rotate(-28 12 12)"/><path d="M9.2 13.9l5.6-3.8M10.5 11l1 1.5M12.5 9.7l1 1.5"/></svg>);
  if (k === "scores") return (<svg {...s} viewBox="0 0 24 24"><path d="M4 19V9M10 19V5M16 19v-8M21 19H3"/></svg>);
  if (k === "news") return (<svg {...s} viewBox="0 0 24 24"><path d="M4 5h13v14a2 2 0 0 0 2 2H6a2 2 0 0 1-2-2z"/><path d="M17 8h3v11a2 2 0 0 1-2 2M8 9h5M8 13h5M8 17h5"/></svg>);
  return null;
};
function BottomDock({ tab, go, onMore, moreOpen, moreActive }) {

    <nav className="dock" aria-label="Primary">
      {DOCK_TABS.map(([k, l]) => (

        <span>More</span>

}
function MoreSheet({ tab, go, onClose, onSwitch, onSettings }) {
  return (
    <div className="scrim sheet-scrim" onClick={onClose}>
      <div className="more-sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="more-grid">
          {MORE_TABS.map(([k, l, ic]) => (
            <button key={k} className={"tab more-item" + (tab === k ? " on" : "")} onClick={() => go(k)}>

            </button>
          ))}
        </div>

          <button className="more-act" onClick={onSwitch}>⇆ Switch team</button>

        </div>

function FirstRun({ teams, confMap, onPick }) {
  const [q, setQ] = useState("");
  const groups = useMemo(() => {
    const list = Object.values(teams);
    const match = (t) => !q || (t.displayName || "").toLowerCase().includes(q.toLowerCase()) || (t.abbreviation || "").toLowerCase().includes(q.toLowerCase());
    if (confMap && confMap.length) {
      return confMap.map(c => ({ name: c.name, teams: c.teamIds.map(id => teams[id]).filter(Boolean).filter(match) })).filter(g => g.teams.length);
    }
    const f = list.filter(match).sort((a, b) => (a.displayName || "").localeCompare(b.displayName || ""));
    return f.length ? [{ name: "All teams", teams: f }] : [];
  }, [teams, confMap, q]);
  return (
    <div className="firstrun">
      <div className="hero-lights" aria-hidden="true" />
      <FieldBackdrop />
      <div className="fr-inner">
        <div className="fr-kicker ng-label">Welcome to the sideline</div>
        <h1 className="fr-title">Pick your team</h1>
        <p className="fr-sub">Colors, schedule, GameDay — the whole app becomes theirs. Change it anytime.</p>
        <input className="search fr-search" placeholder="Search team or abbreviation…" value={q} onChange={e => setQ(e.target.value)} />
        <div className="fr-list">
          {groups.map(g => (
            <div key={g.name}>
              <div className="conf-h">{g.name}</div>
              {g.teams.map(t => (
                <button key={t.id} className="team-opt fr-opt" onClick={() => onPick(String(t.id))}>
                  <img src={logoOf(t)} alt="" loading="lazy" />{t.displayName}
                </button>
              ))}
            </div>
          ))}
          {!groups.length && <div className="empty">No team matches “{q}”.</div>}
        </div>
      </div>
    </div>
  );
}

function Switcher({ teams, confMap, current, onPick, onClose }) {
  const [qy, setQy] = useState("");
  const ref = useRef();
  useEffect(()=>{ ref.current?.focus(); },[]);
  const all = Object.values(teams).sort((a,b)=>a.displayName.localeCompare(b.displayName));
  const q = qy.trim().toLowerCase();
  const filt = (t) => !q || t.displayName.toLowerCase().includes(q) || (t.abbreviation||"").toLowerCase().includes(q);

  let body;
  if (q) {
    const res = all.filter(filt).slice(0,40);
    body = res.length ? res.map(t=><Opt key={t.id} t={t} sel={t.id===current} onPick={onPick}/>)
                      : <div className="empty">No team matches “{qy}”.</div>;
  } else if (confMap) {
    body = confMap.map(c => (
      <div key={c.name}>
        <div className="conf-h">{c.name}</div>
        {c.teamIds.map(id=>teams[id]).filter(Boolean)
          .sort((a,b)=>a.displayName.localeCompare(b.displayName))
          .map(t=><Opt key={t.id} t={t} sel={t.id===current} onPick={onPick}/>)}
      </div>
    ));
  } else {
    body = <>
      <div className="conf-h">All FBS teams</div>
      {all.map(t=><Opt key={t.id} t={t} sel={t.id===current} onPick={onPick}/>)}
    </>;
  }
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-head">
          <h3>Choose team</h3>
          <input ref={ref} className="search" placeholder="Search teams…" value={qy} onChange={e=>setQy(e.target.value)}/>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body">{body}</div>
      </div>
    </div>
  );
}
function Opt({ t, sel, onPick }) {
  return (
    <button className={"team-opt"+(sel?" sel":"")} onClick={()=>onPick(t.id)}>
      <img src={logoOf(t)} alt=""/>
      <span style={{fontWeight:600,fontSize:14}}>{t.displayName}</span>
    </button>
  );
}

function Settings({ year, setYear, onClose }) {
  const [key, setKey] = useState(lsRawGet("cfb_anthropic_key")||"");
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxWidth:460}}>
        <div className="sheet-head"><h3>Settings</h3><button className="close-x" style={{marginLeft:"auto"}} onClick={onClose}>✕</button></div>
        <div className="sheet-body" style={{padding:16}}>
          <div className="label">Season</div>
          <div style={{display:"flex",gap:8}}>
            {[2026,2025].map(y=>(
              <button key={y} className={"chip"} style={y===year?{borderColor:"var(--accent)",color:"var(--text)"}:null}
                onClick={()=>setYear(y)}>{y}</button>
            ))}
          </div>
          <div className="label">Data proxy URL (optional — fixes "failed to fetch")</div>
          <input className="input" placeholder="https://your-worker.workers.dev/?url=" defaultValue={(()=>{try{return localStorage.getItem("cfb_proxy")||"";}catch(e){return "";}})()}
            onChange={e=>{ try{ const v=e.target.value.trim(); v?localStorage.setItem("cfb_proxy",v):localStorage.removeItem("cfb_proxy"); }catch(_){} }}/>
          <div className="ng-label" style={{textTransform:"none",letterSpacing:0,margin:"6px 0 12px",lineHeight:1.5}}>
            ESPN blocks direct browser calls. By default the app races several public relays, but they get busy or rate-limited. For rock-solid loading, deploy a free Cloudflare Worker (a few lines) and paste its URL here — it must end so the encoded target gets appended, e.g. <code>https://your-worker.workers.dev/?url=</code>. Reload after changing.
          </div>
          <div className="label">Anthropic API key (for the Analyst tab)</div>
          <input className="input" type="password" placeholder="sk-ant-…" value={key} onChange={e=>setKey(e.target.value)}/>
          <div className="ng-label" style={{textTransform:"none",letterSpacing:0,margin:"8px 0 16px",lineHeight:1.5}}>
            Stored only in this browser (localStorage). Used to call the Anthropic API directly from the page.
          </div>
          <div className="label">⚡ Hype cards (admin)</div>
          <button className="btn ghost" style={{width:"100%",marginBottom:6}} onClick={(e)=>{
            try { const ks=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf("cfb_hype_u_")===0) ks.push(k); } ks.forEach(k=>localStorage.removeItem(k)); } catch(err) {}
            e.target.textContent = "✓ Limits reset";
          }}>Reset generation limits</button>
          <div className="ng-label" style={{textTransform:"none",letterSpacing:0,margin:"0 0 16px",lineHeight:1.5}}>
            Each game allows {2} AI hype-card generations. Resetting clears the counters; saved cards stay.
          </div>
          <button className="btn" style={{width:"100%"}} onClick={()=>{
            lsRawSet("cfb_anthropic_key",key.trim()); onClose();
          }}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- shared bits ---------- */
function useData(fn, deps) {
  const [data,setData]=useState(null);const [err,setErr]=useState(null);const [loading,setLoading]=useState(true);
  const [n,setN]=useState(0);
  useEffect(()=>{ let on=true; setLoading(true); setErr(null);
    fn().then(d=>{if(on){setData(d);setLoading(false);}}).catch(e=>{if(on){setErr(e.message||"Failed");setLoading(false);}});
    return ()=>{on=false;};
  // eslint-disable-next-line
  },[...deps,n]);
  return { data, err, loading, reload:()=>setN(x=>x+1) };
}
const Loading = ({rows=6}) => <div style={{marginTop:14}}>{Array.from({length:rows}).map((_,i)=><div className="skel" key={i}/>)}</div>;
const Empty = ({children}) => <div className="empty">{children}</div>;
const ErrBox = ({msg,retry}) => <div className="err" style={{marginTop:14}}><span>⚠️</span><div>{msg}. <button onClick={retry}>Retry</button></div></div>;

function fmtDate(d){ if(!d)return""; try{return new Date(d).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});}catch{return"";} }
function fmtShort(d){ if(!d)return""; try{return new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"});}catch{return"";} }
function shorten(s){ return s && s.length>46 ? s.slice(0,44)+"…" : (s||""); }

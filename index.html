// pointed team-news filter — shared by News tab and the Today canvas
function pointedArticles(all, tid, teams) {
  const t = teams && teams[tid];
  const loc = ((t && t.location) || "").toLowerCase(), nk = ((t && t.name) || "").toLowerCase();
  const isRoundup = (a) => {
    const cats = (a.categories || []).filter(c => c && c.type === "team");
    const ids = cats.map(c => String((c.teamId != null ? c.teamId : (c.team && c.team.id)) || ""));
    if (ids.length === 1 && ids.includes(tid)) return false;
    const hl = (a.headline || "").toLowerCase();
    if (loc && hl.includes(loc)) return false;
    if (nk && nk.length > 3 && hl.includes(nk)) return false;
    if (ids.length >= 4) return true;
    if (/week \d|roundup|around the|top 25|power rank|bowl projection|takeaways|overreactions|winners and losers/i.test(hl)) return true;
    return false;
  };
  return all.filter(a => !isRoundup(a));
}

// win-probability game-flow chart from ESPN's winprobability timeline
function WinProbChart({ wp, meHome, meAb, done }) {
  const pts = useMemo(() => {
    const arr = (wp || []).map(p => { const h = Number(p.homeWinPercentage); return isFinite(h) ? (meHome ? h : 1 - h) : null; }).filter(v => v != null);
    if (arr.length > 80) { const step = arr.length / 80; const out = []; for (let i = 0; i < 80; i++) out.push(arr[Math.floor(i * step)]); out.push(arr[arr.length - 1]); return out; }
    return arr;
  }, [wp, meHome]);
  if (pts.length < 6) return null;
  const W = 320, H = 92, P = 5;
  const x = i => P + (i / (pts.length - 1)) * (W - 2 * P);
  const y = v => P + (1 - v) * (H - 2 * P);
  const dPath = pts.map((v, i) => (i ? "L" : "M") + x(i).toFixed(1) + " " + y(v).toFixed(1)).join(" ");
  const area = dPath + " L" + x(pts.length - 1).toFixed(1) + " " + (H - P) + " L" + P + " " + (H - P) + " Z";
  const last = pts[pts.length - 1];
  return (
    <div className="wp-wrap">
      <div className="ng-label" style={{ marginBottom: 6 }}>Game flow \u00b7 win probability</div>
      <svg className="wp-chart" viewBox={"0 0 " + W + " " + H} preserveAspectRatio="none" aria-hidden="true">
        <line x1={P} x2={W - P} y1={H / 2} y2={H / 2} className="wp-mid" />
        <path d={area} className="wp-area" />
        <path d={dPath} className="wp-line" />
        <circle cx={x(pts.length - 1)} cy={y(last)} r="3" className="wp-dot" />
      </svg>
      <div className="wp-lbls">
        <span className="display-num" style={{ fontSize: 16 }}>{meAb} {Math.round(last * 100)}%</span>
        <span className="ng-meta">kickoff \u2192 {done ? "final" : "now"}</span>
      </div>
    </div>
  );
}

          <div className="section-title">Top story</div>
          <a className="card td-story" href={safeHref(story.links?.web?.href) || undefined} target="_blank" rel="noopener">
            {story.images?.[0]?.url && safeHref(story.images[0].url) && <img className="td-story-img" src={story.images[0].url} alt="" loading="lazy" />}
            <div className="td-story-t">{story.headline}</div>
            {story.description && <div className="ng-meta" style={{ lineHeight: 1.45 }}>{story.description}</div>}
          </a>
        </>
      )}

      {big.length > 0 && (
        <>
          <div className="section-title">Big games this week</div>
          <div className="grid cols2">{big.map(ev => <GameCard key={ev.id} ev={ev} teamId={teamId} />)}</div>
        </>
      )}
    </>
  );
}

const DOCK_TABS = [["today","Today"],["schedule","Schedule"],["gameday","GameDay"],["scores","Scores"]];
const MORE_TABS = [["news","News","tv"],["roster","Roster","users"],["rankings","Rankings","medal"],["standings","Standings","podium"],["compare","Compare","comparr"],["postseason","Postseason","trophy"],["ai","Analyst","sparkles"]];

  const s = { width: 20, height: 20, fill: "none", stroke: "currentColor", strokeWidth: 1.9, strokeLinecap: "round", strokeLinejoin: "round" };
  if (k === "today") return (<svg {...s} viewBox="0 0 24 24"><path d="M4 11.2 12 4.5l8 6.7"/><path d="M6.4 10.4V19h11.2v-8.6"/><path d="M10 19v-4.6h4V19"/></svg>);
  if (k === "schedule") return (<svg {...s} viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>);
  if (k === "gameday") return (<svg {...s} viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9.5" ry="6.2" transform="rotate(-28 12 12)"/><path d="M9.2 13.9l5.6-3.8M10.5 11l1 1.5M12.5 9.7l1 1.5"/></svg>);
  if (k === "scores") return (<svg {...s} viewBox="0 0 24 24"><path d="M4 19V9M10 19V5M16 19v-8M21 19H3"/></svg>);
  if (k === "news") return (<svg {...s} viewBox="0 0 24 24"><path d="M4 5h13v14a2 2 0 0 0 2 2H6a2 2 0 0 1-2-2z"/><path d="M17 8h3v11a2 2 0 0 1-2 2M8 9h5M8 13h5M8 17h5"/></svg>);
  return null;
};

function FirstRun({ teams, confMap, onPick }) {
  const [q, setQ] = useState("");
  const groups = useMemo(() => {
    const list = Object.values(teams);
    const match = (t) => !q || (t.displayName || "").toLowerCase().includes(q.toLowerCase()) || (t.abbreviation || "").toLowerCase().includes(q.toLowerCase());
    if (confMap && confMap.length) {
      return confMap.map(c => ({ name: c.name, teams: c.teamIds.map(id => teams[id]).filter(Boolean).filter(match) })).filter(g => g.teams.length);
    }
    const f = list.filter(match).sort((a, b) => (a.displayName || "").localeCompare(b.displayName || ""));
    return f.length ? [{ name: "All teams", teams: f }] : [];
  }, [teams, confMap, q]);
  return (
    <div className="firstrun">
      <div className="hero-lights" aria-hidden="true" />
      <FieldBackdrop />
      <div className="fr-inner">
        <div className="fr-brand">GAMEDAY HQ</div>
        <h1 className="fr-title">Pick your team</h1>
        <p className="fr-sub">Colors, schedule, GameDay — the whole app becomes theirs. Change it anytime.</p>
        <input className="search fr-search" placeholder="Search team or abbreviation…" value={q} onChange={e => setQ(e.target.value)} />
        <div className="fr-list">
          {groups.map(g => (
            <div key={g.name}>
              <div className="conf-h">{g.name}</div>
              {g.teams.map(t => (
                <button key={t.id} className="team-opt fr-opt" onClick={() => onPick(String(t.id))}>
                  <img src={logoOf(t)} alt="" loading="lazy" />{t.displayName}
                </button>
              ))}
            </div>
          ))}
          {!groups.length && <div className="empty">No team matches “{q}”.</div>}
        </div>
      </div>
    </div>
  );
}

function Switcher({ teams, confMap, current, onPick, onClose }) {
  const dragRef = useSheetDrag(onClose);
  const [qy, setQy] = useState("");
  const ref = useRef();
  const all = Object.values(teams).sort((a,b)=>a.displayName.localeCompare(b.displayName));
  const q = qy.trim().toLowerCase();
  const filt = (t) => !q || t.displayName.toLowerCase().includes(q) || (t.abbreviation||"").toLowerCase().includes(q);

  let body;
  if (q) {
    const res = all.filter(filt).slice(0,40);
    body = res.length ? res.map(t=><Opt key={t.id} t={t} sel={String(t.id)===String(current)} onPick={onPick}/>)
                      : <div className="empty">No team matches “{qy}”.</div>;
  } else if (confMap) {
    body = confMap.map(c => (
      <div key={c.name}>
        <div className="conf-h">{c.name}</div>
        {c.teamIds.map(id=>teams[id]).filter(Boolean)
          .sort((a,b)=>a.displayName.localeCompare(b.displayName))
          .map(t=><Opt key={t.id} t={t} sel={String(t.id)===String(current)} onPick={onPick}/>)}
      </div>
    ));
  } else {
    body = <>
      <div className="conf-h">All FBS teams</div>
      {all.map(t=><Opt key={t.id} t={t} sel={String(t.id)===String(current)} onPick={onPick}/>)}
    </>;
  }
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" ref={dragRef} onClick={e=>e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="sheet-head">
          <h3>Choose team</h3>
          <input ref={ref} className="search" placeholder="Search teams…" value={qy} onChange={e=>setQy(e.target.value)}/>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body">{body}</div>
      </div>
    </div>
  );
}
function Opt({ t, sel, onPick }) {
  return (
    <button className={"team-opt"+(sel?" sel":"")} onClick={()=>onPick(t.id)}>
      <img src={logoOf(t)} alt=""/>
      <span style={{fontWeight:600,fontSize:14}}>{t.displayName}</span>
    </button>
  );
}

          </div>
          {creditsLeft != null && (

          {onSatPreview && (<>
            <div className="label">Saturday Mode</div>

/* ---------- shared bits ---------- */
function useData(fn, deps) {
  const [data,setData]=useState(null);const [err,setErr]=useState(null);const [loading,setLoading]=useState(true);
  const [n,setN]=useState(0);
  useEffect(()=>{ let on=true; setLoading(true); setErr(null);
    fn().then(d=>{if(on){setData(d);setLoading(false);}}).catch(e=>{if(on){setErr(e.message||"Failed");setLoading(false);}});
    return ()=>{on=false;};
  // eslint-disable-next-line
  },[...deps,n]);
  return { data, err, loading, reload:()=>setN(x=>x+1) };
}
const Loading = ({rows=6}) => <div style={{marginTop:14}}>{Array.from({length:rows}).map((_,i)=><div className="skel" key={i}/>)}</div>;
const Empty = ({children}) => (
  <div className="empty">
    <span className="empty-ic"><Ic n="football" s={26}/></span>
    <div>{children}</div>
  </div>
);
const ErrBox = ({msg,retry}) => <div className="err" style={{marginTop:14}}><span>⚠️</span><div>{msg}. <button onClick={retry}>Retry</button></div></div>;

function fmtDate(d){ if(!d)return""; try{return new Date(d).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});}catch{return"";} }
function fmtShort(d){ if(!d)return""; try{return new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"});}catch{return"";} }
function shorten(s){ return s && s.length>46 ? s.slice(0,44)+"…" : (s||""); }

class Boundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  render() {
    if (this.state.err) {
      return (
        <div className="crash">
          <div className="fr-brand">GAMEDAY HQ</div>
          <p><b>Something broke on this screen.</b></p>
          <p className="crash-msg">{String((this.state.err && this.state.err.message) || this.state.err).slice(0, 140)}</p>
          <button className="btn" onClick={() => location.reload()}>Reload the app</button>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<Boundary><App/></Boundary>);

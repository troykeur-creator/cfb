/* ---------- PICK'EM ---------- */
function loadPicks(){ try{ return JSON.parse(localStorage.getItem("cfb_picks")||"{}"); }catch{ return {}; } }
function savePicks(p){ try{ localStorage.setItem("cfb_picks", JSON.stringify(p)); }catch{} }

function Pickem({ teamId, year, teams }) {
  const [week, setWeek] = useState(1);
  const [showAll, setShowAll] = useState(false);
  const [picks, setPicks] = useState(loadPicks);
  const { data, err, loading, reload } = useData(() => getJSON(URLS.scoreboard(year, week)), [year, week]);
  const events = data?.events || [];

  // curated slate: your team + games involving ranked teams, sorted by relevance
  const slate = useMemo(() => {
    const rankOf = e => Math.min(...e.competitions[0].competitors.map(c => c.curatedRank?.current || 99));
    const mine = e => e.competitions?.[0]?.competitors?.some(c => String(c.team?.id)===String(teamId));
    let list = events.filter(e => e.competitions?.[0]);
    if (!showAll) list = list.filter(e => mine(e) || rankOf(e) <= 25);
    return list.sort((a,b)=> (mine(b)?1:0)-(mine(a)?1:0) || rankOf(a)-rankOf(b)).slice(0, showAll?300:30);
  }, [events, teamId, showAll]);

  // auto-grade finals that have a pick but no recorded result yet
  useEffect(() => {
    let changed = false; const next = { ...picks };
    events.forEach(ev => {
      const comp = ev.competitions?.[0]; if (!comp?.status?.type?.completed) return;
      const k = `${year}-${week}-${ev.id}`; const p = next[k];
      if (p && p.correct == null) {
        const win = comp.competitors.find(c => c.winner);
        if (win) { next[k] = { team: p.team, correct: String(win.team?.id)===String(p.team) }; changed = true; }
      }
    });
    if (changed) { setPicks(next); savePicks(next); }
  // eslint-disable-next-line
  }, [events, week, year]);

  function pick(ev, tid) {
    const comp = ev.competitions?.[0];
    if (comp?.status?.type?.completed) return; // locked
    const k = `${year}-${week}-${ev.id}`;
    const next = { ...picks, [k]: { team: tid, correct: null } };
    setPicks(next); savePicks(next); buzz(6);
  }

  const graded = Object.values(picks).filter(p => p.correct != null);
  const right = graded.filter(p => p.correct).length;

  return (
    <>
      <div className="section-title">Pick'em
        <select className="input" style={{width:118,padding:"6px 8px",fontSize:13}}
          value={week} onChange={e=>setWeek(+e.target.value)}>
          {Array.from({length:15},(_,i)=>i+1).map(w=><option key={w} value={w}>Week {w}</option>)}
        </select>
      </div>
      <div className="card" style={{display:"flex",alignItems:"center",padding:"12px 14px",marginBottom:12}}>
        <div>
          <div className="ng-label">Season record</div>
          <div className="display mono-num" style={{fontSize:24,fontWeight:700}}>
            {right}<span style={{color:"var(--muted)",fontSize:16}}>–{graded.length-right}</span>
          </div>
        </div>
        <div style={{marginLeft:"auto",textAlign:"right"}}>
          <div className="ng-label">Accuracy</div>
          <div className="display mono-num" style={{fontSize:24,fontWeight:700,color:"var(--accent)"}}>
            {graded.length ? Math.round(100*right/graded.length) : 0}%
          </div>
        </div>
      </div>

      {loading ? <Loading rows={6}/> : err ? <ErrBox msg={err} retry={reload}/> :
        !slate.length ? <Empty>No games for week {week} of {year} yet.{" "}
          <button onClick={()=>setShowAll(true)} style={{color:"var(--accent)",fontWeight:600}}>Show all</button></Empty> :
        <>
          <div className="grid cols2">
            {slate.map(ev => <PickGame key={ev.id} ev={ev} teamId={teamId}
              pickKey={`${year}-${week}-${ev.id}`} picks={picks} onPick={pick} />)}
          </div>
          <button className="btn ghost" style={{marginTop:14,width:"100%"}}
            onClick={()=>setShowAll(s=>!s)}>{showAll?"Show ranked & my-team only":"Show every FBS game"}</button>
        </>}
    </>
  );
}
function PickGame({ ev, teamId, pickKey, picks, onPick }) {
  const comp = ev.competitions[0];
  const st = comp.status?.type; const done = st?.completed;
  const p = picks[pickKey];
  const cs = comp.competitors;
  const mineGame = cs.some(c=>String(c.team?.id)===String(teamId));
  return (
    <div className="card" style={mineGame?{outline:"1px solid var(--accent)"}:null}>
      <div style={{display:"flex",justifyContent:"space-between",padding:"8px 12px 2px"}}>
        <span className="ng-label">{fmtShort(ev.date)}</span>
        {done && p && <span className={"badge "+(p.correct?"win":"loss")}>{p.correct?"✓ Correct":"✗ Miss"}</span>}
        {done && !p && <span className="badge final">Final</span>}
        {!done && <span className="ng-label">{st?.shortDetail||"Tap to pick"}</span>}
      </div>
      {cs.map(c => {
        const picked = p?.team===String(c.team?.id) || p?.team===c.team?.id;
        const win = done && c.winner;
        return (
          <button key={c.id} onClick={()=>onPick(ev, String(c.team?.id))}
            className="row" disabled={done}
            style={{width:"100%",borderBottom:"none",padding:"9px 12px",textAlign:"left",
              background:picked?"var(--primary-soft)":"transparent",
              outline:picked?"1px solid var(--accent)":"none",borderRadius:9,margin:"2px 6px",cursor:done?"default":"pointer"}}>
            <span className="rk">{c.curatedRank?.current&&c.curatedRank.current<=25?c.curatedRank.current:""}</span>
            <div className="team-mini" style={{flex:1}}>
              <img src={logoOf(c.team)} alt=""/>
              <span className={"nm "+(done?(win?"win":"lose"):"")}>{c.team?.displayName||c.team?.name}</span>
            </div>
            {done && <span className={"score mono-num "+(win?"win":"lose")}>{c.score}</span>}
            {!done && picked && <span className="badge soon">Pick</span>}
          </button>
        );
      })}
    </div>
  );
}

/* ---------- COMPARE (radar + stat bars) ---------- */
const CMP_AXES = [
  { key:"winPercent", label:"Win %", names:["winPercent","winpercent"], better:"high", fmt:v=>(v*100).toFixed(0)+"%" },
  { key:"avgPF", label:"Pts For/G", names:["avgPointsFor","pointsForPerGame"], better:"high", fmt:v=>v.toFixed(1) },
  { key:"avgPA", label:"Scoring D", names:["avgPointsAgainst","pointsAgainstPerGame"], better:"low", fmt:v=>v.toFixed(1) },
  { key:"diff", label:"Pt Diff", names:["pointDifferential","differential"], better:"high", fmt:v=>(v>0?"+":"")+v },
  { key:"wins", label:"Wins", names:["wins"], better:"high", fmt:v=>String(v) },
];
function teamStat(detail, names){
  const stats = detail?.record?.items?.[0]?.stats || [];
  for (const n of names){ const s = stats.find(x=>x.name===n); if (s && s.value!=null) return s.value; }
  return null;
}
function Compare({ team, teams, detail }) {
  const opts = useMemo(()=>Object.values(teams).sort((a,b)=>a.displayName.localeCompare(b.displayName)),[teams]);
  const nextOppId = detail?.nextEvent?.[0]?.competitions?.[0]?.competitors
    ?.find(c=>String(c.team?.id)!==String(team.id))?.team?.id;
  const [bId, setBId] = useState(()=> (nextOppId && teams[nextOppId]) ? String(nextOppId) : (opts.find(t=>t.id!==team.id)?.id));
  const [dA, setDA] = useState(null); const [dB, setDB] = useState(null);
  const [loading, setLoading] = useState(true);
  const teamB = teams[bId];

  useEffect(()=>{ let on=true; setLoading(true);
    Promise.all([ getJSON(URLS.team(team.id)).catch(()=>null), getJSON(URLS.team(bId)).catch(()=>null) ])
      .then(([a,b])=>{ if(on){ setDA(a?.team||detail); setDB(b?.team); setLoading(false); } });
    return ()=>{on=false;};
  },[team.id,bId]);

  const axes = useMemo(()=>{
    if(!dA||!dB) return [];
    return CMP_AXES.map(ax=>{
      let a = teamStat(dA, ax.names), b = teamStat(dB, ax.names);
      if(a==null||b==null) return null;
      // normalize 0.12..1 across the pair; invert when lower is better
      let na=a, nb=b;
      if(ax.better==="low"){ na=-a; nb=-b; }
      const lo=Math.min(na,nb), hi=Math.max(na,nb), span=(hi-lo)||1;
      return { ...ax, a, b, na:0.18+0.82*(na-lo)/span, nb:0.18+0.82*(nb-lo)/span };
    }).filter(Boolean);
  },[dA,dB]);

  return (
    <>
      <div className="section-title">Head to head</div>
      <div className="cmp-head card">
        <div className="cmp-team">
          <img src={logoOf(team)} alt=""/>
          <div className="cmp-nm">{team.shortDisplayName||team.nickname||team.name}</div>
          <div className="ng-meta mono-num">{dA?.record?.items?.[0]?.summary||""}</div>
        </div>
        <div className="cmp-vs">VS</div>
        <div className="cmp-team">
          <img src={teamB?logoOf(teamB):""} alt=""/>
          <select className="cmp-select" value={bId} onChange={e=>setBId(e.target.value)}>
            {opts.filter(t=>t.id!==team.id).map(t=><option key={t.id} value={t.id}>{t.displayName}</option>)}
          </select>
          <div className="ng-meta mono-num">{dB?.record?.items?.[0]?.summary||""}</div>
        </div>
      </div>

      {loading ? <Loading rows={5}/> :
        !axes.length ? <Empty>Stats aren't available for both teams yet — they fill in once games are played. Switch the season to a completed year in ⚙ to see a full comparison.</Empty> :
        <>
          {axes.length>=3 && <Radar axes={axes} />}
          <div className="card" style={{marginTop:12}}>
            {axes.map(ax=>(
              <div className="cmp-row" key={ax.key}>
                <span className="cmp-val mono-num" style={{textAlign:"right",color:cmpWin(ax,"a")?"var(--accent)":"var(--muted)"}}>{ax.fmt(ax.a)}</span>
                <div className="cmp-bars">
                  <div className="cmp-label">{ax.label}</div>
                  <div className="cmp-track"><div className="cmp-fill left" style={{width:(ax.na*50)+"%"}}/><div className="cmp-fill right" style={{width:(ax.nb*50)+"%"}}/></div>
                </div>
                <span className="cmp-val mono-num" style={{color:cmpWin(ax,"b")?"var(--accent)":"var(--muted)"}}>{ax.fmt(ax.b)}</span>
              </div>
            ))}
          </div>
        </>}
    </>
  );
}
function cmpWin(ax, side){ const a=ax.better==="low"?-ax.a:ax.a, b=ax.better==="low"?-ax.b:ax.b; return side==="a"?a>=b:b>a; }

function Radar({ axes }) {
  const size=240, cx=size/2, cy=size/2, r=92, N=axes.length;
  const pt=(val,i)=>{ const ang=-Math.PI/2 + i*2*Math.PI/N; return [cx+Math.cos(ang)*r*val, cy+Math.sin(ang)*r*val]; };
  const poly=key=>axes.map((ax,i)=>pt(ax[key],i).join(",")).join(" ");
  const rings=[0.25,0.5,0.75,1];
  return (
    <div className="card" style={{padding:"14px 0 6px",display:"flex",flexDirection:"column",alignItems:"center"}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {rings.map((rr,ri)=>(
          <polygon key={ri} points={axes.map((_,i)=>pt(rr,i).join(",")).join(" ")}
            fill="none" stroke="var(--line)" strokeWidth="1"/>
        ))}
        {axes.map((_,i)=>{ const [x,y]=pt(1,i); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--line)" strokeWidth="1"/>; })}
        <polygon points={poly("nb")} fill="rgba(140,150,165,.18)" stroke="var(--muted)" strokeWidth="2"/>
        <polygon points={poly("na")} fill="var(--primary-soft)" stroke="var(--accent)" strokeWidth="2.5"/>
        {axes.map((ax,i)=>{ const [x,y]=pt(1.16,i); return (
          <text key={i} x={x} y={y} fontSize="9.5" fontFamily="Oswald" fill="var(--muted)"
            textAnchor="middle" dominantBaseline="middle" style={{textTransform:"uppercase",letterSpacing:".5px"}}>{ax.label}</text>
        );})}
      </svg>
      <div style={{display:"flex",gap:18,fontSize:12,fontWeight:600,paddingBottom:6}}>
        <span style={{color:"var(--accent)"}}>● Your team</span>
        <span style={{color:"var(--muted)"}}>● Opponent</span>
      </div>
    </div>
  );
}

/* ---------- AI ANALYST ---------- */
// --- WMO weather code -> label/emoji (Open-Meteo) ---
function wmo(code){
  const m={0:["Clear","☀️"],1:["Mostly clear","🌤️"],2:["Partly cloudy","⛅"],3:["Overcast","☁️"],45:["Fog","🌫️"],48:["Fog","🌫️"],51:["Drizzle","🌦️"],53:["Drizzle","🌦️"],55:["Drizzle","🌧️"],61:["Rain","🌧️"],63:["Rain","🌧️"],65:["Heavy rain","🌧️"],71:["Snow","🌨️"],73:["Snow","🌨️"],75:["Heavy snow","❄️"],77:["Snow","🌨️"],80:["Showers","🌦️"],81:["Showers","🌧️"],82:["Downpour","⛈️"],85:["Snow showers","🌨️"],86:["Snow showers","❄️"],95:["T-storm","⛈️"],96:["T-storm","⛈️"],99:["T-storm","⛈️"]};
  const r=m[code]||["—","🏈"]; return { desc:r[0], emoji:r[1] };
}
// Open-Meteo is CORS-open & keyless: fetch directly (no relay). Cached in memory (30 min).
const _wxMem = {};
async function fetchWeather(city, region, dateStr){
  if(!city) return null;
  const ck = city+"|"+(region||"")+"|"+(dateStr||"");
  const h=_wxMem[ck]; if(h && Date.now()-h.t < 18e5) return h.v;
  try{
    const q=encodeURIComponent(city+(region?(" "+region):"")+" USA");
    const g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=1&country=US`).then(r=>r.json());
    const loc=(g.results||[])[0]; if(!loc) return null;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current=temperature_2m,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code,precipitation_probability,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=16`;
    const w=await fetch(url).then(r=>r.json());
    let temp,code,wind,precip,when="now";
    const target=dateStr?new Date(dateStr).getTime():null;
    if(target&&w.hourly&&w.hourly.time){
      let bi=-1,bd=Infinity;
      w.hourly.time.forEach((t,i)=>{const d=Math.abs(new Date(t).getTime()-target);if(d<bd){bd=d;bi=i;}});
      if(bi>=0&&bd<36e5*3){temp=w.hourly.temperature_2m[bi];code=w.hourly.weather_code[bi];wind=w.hourly.wind_speed_10m[bi];precip=(w.hourly.precipitation_probability||[])[bi];when="kickoff";}
    }
    if(temp==null&&w.current){temp=w.current.temperature_2m;code=w.current.weather_code;wind=w.current.wind_speed_10m;when="now";}
    if(temp==null) return null;
    const out=Object.assign({temp:Math.round(temp),wind:Math.round(wind),precip:precip==null?null:Math.round(precip),when,city:loc.name},wmo(code));
    _wxMem[ck]={t:Date.now(),v:out};
    return out;
  }catch(e){ return null; }
}
// Wikipedia action API supports origin=* (CORS-safe), no key. Cached persistently (stadium info is static).
const _stadMem = {};
async function fetchStadium(name){
  if(!name) return null;
  if(_stadMem[name]) return _stadMem[name];
  const lk = "cfb_stad_" + name;
  const cached = lsGet(lk); if(cached){ _stadMem[name]=cached; return cached; }
  try{
    const u=`https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages|extracts&piprop=original|thumbnail&pithumbsize=1000&exintro=1&explaintext=1&redirects=1&titles=${encodeURIComponent(name)}`;
    const d=await fetch(u).then(r=>r.json());
    const pages=(d.query&&d.query.pages)||{}; const p=Object.values(pages)[0];
    if(!p||p.missing!==undefined) return null;
    const img=(p.original&&p.original.source)||(p.thumbnail&&p.thumbnail.source);
    const out={ img, title:p.title, extract:p.extract, url:"https://en.wikipedia.org/wiki/"+encodeURIComponent((p.title||"").replace(/ /g,"_")) };
    _stadMem[name]=out; lsSet(lk,out);
    return out;
  }catch(e){ return null; }
}
// ESPN Matchup Predictor (win %) via the summary endpoint (uses relay path).
async function fetchPredictor(eventId){
  if(!eventId) return null;
  try{
    const d=await getJSON(`${ESPN}/summary?event=${eventId}`);
    const pr=d.predictor; if(!pr) return null;
    const h=pr.homeTeam, a=pr.awayTeam;
    const hp=parseFloat(h&&h.gameProjection), ap=parseFloat(a&&a.gameProjection);
    if(isNaN(hp)&&isNaN(ap)) return null;
    return { homeId:h&&h.id, awayId:a&&a.id, homePct:isNaN(hp)?(100-ap):hp, awayPct:isNaN(ap)?(100-hp):ap };
  }catch(e){ return null; }
}
async function fetchSummary(eventId){ if(!eventId) return null; try{ return await getJSON(`${ESPN}/summary?event=${eventId}`); }catch(e){ return null; } }
async function fetchAthlete(id){ if(!id) return null; try{ return await getJSON(`https://site.web.api.espn.com/apis/common/v3/sports/football/college-football/athletes/${id}/overview`); }catch(e){ return null; } }
function statVal(arr, names){ if(!arr) return null; for(const n of names){ const s=arr.find(x=>x.name===n||x.label===n); if(s) return s.displayValue; } return null; }
// ESPN's athlete-overview "statistics" block comes back in a few shapes depending on
// the player/sport. Try each known form, fail soft to empty (never throw).
function extractStats(st){
  if(!st) return { hdr:"Season stats", pairs:[] };
  const hdr = st.displayName || st.name || "Season stats";
  let labels = st.displayNames || st.labels || st.names;
  let vals = (st.splits && st.splits[0] && st.splits[0].stats) || st.stats;
  if((!labels || !vals) && st.splits && Array.isArray(st.splits.categories)){
    const c = st.splits.categories.find(x=>x.stats && x.stats.length) || st.splits.categories[0] || {};
    labels = labels || c.labels || c.names || c.displayNames; vals = vals || c.stats;
  }
  if((!labels || !vals) && Array.isArray(st.categories)){
    const c = st.categories.find(x=>x.stats && x.stats.length) || st.categories[0] || {};
    labels = labels || c.labels || c.names; vals = vals || c.stats;
  }
  if(!labels || !vals || !labels.length || !vals.length) return { hdr, pairs:[] };
  const pairs = labels.map((l,i)=>[l, vals[i]]).filter(x=>x[1]!=null && x[1]!=="" && x[1]!=="-").slice(0,12);
  return { hdr, pairs };
}


function useCountdown(dateStr) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { if (!dateStr) return; const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, [dateStr]);
  if (!dateStr) return null;
  const diff = new Date(dateStr).getTime() - now;
  if (diff <= 0) return "It's go time! 🏈";
  const d=Math.floor(diff/864e5), h=Math.floor(diff/36e5)%24, m=Math.floor(diff/6e4)%60, sec=Math.floor(diff/1e3)%60;
  return d+"d "+h+"h "+m+"m "+sec+"s";
}
// tiny haptics: Android vibrates; iOS Safari ignores (no-op) — always guarded
function buzz(pattern) { try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {} }
function airhorn() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext; if (!Ctx) return;
    const ctx = new Ctx();
    if (ctx.state === "suspended" && ctx.resume) { try { ctx.resume(); } catch (e) {} }
    const now = ctx.currentTime;
    const master = ctx.createGain();
    const comp = ctx.createDynamicsCompressor(); // limiter: lets it be LOUD without ugly clipping
    comp.threshold.setValueAtTime(-8, now); comp.knee.setValueAtTime(4, now);
    comp.ratio.setValueAtTime(16, now); comp.attack.setValueAtTime(0.002, now); comp.release.setValueAtTime(0.2, now);
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(1.0, now + 0.02);   // slam to full
    master.gain.setValueAtTime(1.0, now + 1.45);
    master.gain.exponentialRampToValueAtTime(0.0001, now + 1.85); // release the horn
    master.connect(comp); comp.connect(ctx.destination);
    // fat two-tone truck-horn stack (a chord of detuned saws/squares)
    [233, 311, 349, 466, 622].forEach((f, i) => {
      const o = ctx.createOscillator(); o.type = i % 2 ? "square" : "sawtooth";
      o.frequency.setValueAtTime(f, now);
      o.frequency.exponentialRampToValueAtTime(f * 0.97, now + 1.7); // slight droop at the end
      const g = ctx.createGain(); g.gain.setValueAtTime(i === 0 ? 0.55 : 0.4, now);
      o.connect(g); g.connect(master); o.start(now); o.stop(now + 1.9);
    });
    setTimeout(() => { try { ctx.close(); } catch (e) {} }, 2300);
  } catch (e) {}
}
// --- fight song (inline, no new tab): resolve a YouTube video id via AI web search,
// cache it per team so it's a one-time lookup, then play it in a compact inline player.
async function fightSongId(team) {
  const lk = "cfb_fs_" + team.id;
  try { const c = localStorage.getItem(lk); if (c) return c; } catch (e) {}
  const res = await askAI(
    "You are a data resolver. Reply with ONLY an 11-character YouTube video id — no URL, no words, no punctuation.",
    "The 11-character YouTube video id for the best, most official recording of the " + (team.displayName || "") + " college football fight song (the school's actual fight song). If several exist, choose the highest-quality official-sounding one.",
    true, 250
  );
  if (res.needKey) return { needKey: true };
  const m = (res.text || "").match(/[A-Za-z0-9_-]{11}/);
  if (!m) return null;
  try { localStorage.setItem(lk, m[0]); } catch (e) {}
  return m[0];
}
// tickets: use ESPN's ticket link if the event carries one, else a marketplace search
function ticketUrl(comp, homeTeam, awayTeam) {
  const t = comp && comp.tickets;
  if (Array.isArray(t)) { for (const x of t) { const href = (x.links && x.links[0] && x.links[0].href) || x.href; if (href) return href; } }
  const nm = (x) => (x && (x.displayName || x.name)) || "";
  const q = encodeURIComponent((nm(awayTeam) + " " + nm(homeTeam) + " football tickets").trim());
  return "https://seatgeek.com/search?q=" + q;
}

function _hexA(hex, a) {
  hex = (hex || "").trim().replace("#", "");
  if (hex.length === 3) hex = hex.split("").map(c => c + c).join("");
  const n = parseInt(hex || "ffcb05", 16);
  return "rgba(" + ((n >> 16) & 255) + "," + ((n >> 8) & 255) + "," + (n & 255) + "," + a + ")";
}
function _reduceMotion() { try { return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) { return false; } }
function _themeColors() {
  const cs = getComputedStyle(document.documentElement);
  return { accent: (cs.getPropertyValue("--accent") || "#ffcb05").trim(), primary: (cs.getPropertyValue("--primary") || "#00274c").trim(), onp: (cs.getPropertyValue("--on-primary") || "#fff").trim() };
}

// SIGNATURE: living stadium atmosphere — team-colored embers drifting upward behind the hero
function Atmosphere({ dense }) {
  const ref = useRef(null);
  useEffect(() => {
    const cv = ref.current; if (!cv) return;
    if (_reduceMotion()) return;
    const ctx = cv.getContext("2d"); const dpr = Math.min(2, window.devicePixelRatio || 1);
    const { accent, primary, onp } = _themeColors();
    const cols = [accent, accent, accent, primary, onp];
    let w = 0, h = 0, P = [], raf = 0, mounted = true;
    const mk = () => ({ x: Math.random() * w, y: h + Math.random() * h * 0.4, r: 0.8 + Math.random() * (dense ? 2.8 : 1.8), vy: -(0.12 + Math.random() * (dense ? 0.6 : 0.35)), vx: (Math.random() - 0.5) * 0.22, a: 0.12 + Math.random() * 0.5, tw: Math.random() * 6.28, tws: 0.02 + Math.random() * 0.05, c: cols[(Math.random() * cols.length) | 0] });
    const size = () => {
      w = cv.clientWidth; h = cv.clientHeight; if (!w || !h) return;
      cv.width = w * dpr; cv.height = h * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const N = Math.max(10, Math.min(dense ? 54 : 30, Math.round(w * h / (dense ? 12000 : 20000))));
      P = Array.from({ length: N }, mk);
    };
    size();
    const frame = () => {
      if (!mounted) return;
      ctx.clearRect(0, 0, w, h);
      for (const p of P) {
        p.x += p.vx; p.y += p.vy; p.tw += p.tws;
        if (p.y < -12) Object.assign(p, mk(), { y: h + 12 });
        const a = p.a * (0.55 + 0.45 * Math.sin(p.tw));
        ctx.beginPath(); ctx.fillStyle = _hexA(p.c, a); ctx.arc(p.x, p.y, p.r, 0, 6.283); ctx.fill();
      }
      raf = requestAnimationFrame(frame);
    };
    frame();
    let ro; try { ro = new ResizeObserver(size); ro.observe(cv); } catch (e) {}
    return () => { mounted = false; cancelAnimationFrame(raf); if (ro) ro.disconnect(); };
  }, [dense]);
  return <canvas ref={ref} className="atmos" aria-hidden="true" />;
}

// theatrical payoff for the air horn: team-colored confetti + a quick screen shake
function celebrate() {
  try {
    const el = document.getElementById("root") || document.body;
    el.classList.add("shake"); setTimeout(() => el.classList.remove("shake"), 480);
    if (_reduceMotion()) return;
    const { accent, primary, onp } = _themeColors();
    const cols = [accent, primary, onp, accent];
    const cv = document.createElement("canvas"); cv.className = "confetti-cv"; document.body.appendChild(cv);
    const ctx = cv.getContext("2d"); const dpr = Math.min(2, window.devicePixelRatio || 1);
    const W = window.innerWidth, H = window.innerHeight; cv.width = W * dpr; cv.height = H * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const parts = Array.from({ length: 130 }, () => ({ x: W / 2 + (Math.random() - 0.5) * 160, y: H * 0.3, vx: (Math.random() - 0.5) * 11, vy: -7 - Math.random() * 10, g: 0.26 + Math.random() * 0.16, r: 3 + Math.random() * 4.5, rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.5, c: cols[(Math.random() * cols.length) | 0], life: 0, max: 70 + Math.random() * 45 }));
    let raf = 0, frames = 0;
    const run = () => {
      ctx.clearRect(0, 0, W, H); let alive = false;
      for (const p of parts) {
        if (p.life > p.max) continue; alive = true;
        p.life++; p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.globalAlpha = Math.max(0, 1 - p.life / p.max);
        ctx.fillStyle = p.c; ctx.fillRect(-p.r, -p.r * 0.55, p.r * 2, p.r * 1.1); ctx.restore();
      }
      frames++;
      if (alive && frames < 200) raf = requestAnimationFrame(run); else cv.remove();
    };
    run();
  } catch (e) {}
}

// count a number up when it first appears — small kinetic touch for scores/percentages
function useCountUp(target, ms) {
  const [v, setV] = useState(0);
  useEffect(() => {
    const end = Number(target); if (!isFinite(end)) { setV(target); return; }
    if (_reduceMotion()) { setV(end); return; }
    const dur = ms || 700, t0 = performance.now();
    let raf = 0;
    const step = (t) => { const p = Math.min(1, (t - t0) / dur); setV(Math.round(end * (1 - Math.pow(1 - p, 3)))); if (p < 1) raf = requestAnimationFrame(step); };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return v;
}
/* ---------- LIVE GAME MODE ---------- */
// Polls only around game windows: checks the (cached) schedule every 5 min when idle,
// then switches to fresh 30s scoreboard+win-probability polling while the game is live.
function useLiveGame(teamId, year) {
  const [live, setLive] = useState(null);
  useEffect(() => {
    let stop = false, timer = null;
    const schedule = (ms) => { if (!stop) timer = setTimeout(tick, ms); };
    const POLL = () => (window.__cfbLivePoll || 30000);
    async function tick() {
      if (document.hidden) { schedule(60000); return; }
      try {
        const sched = await getSchedule(teamId, year); // shared cache; cheap
        const evs = (sched && sched.events) || [];
        const now = Date.now();
        const cand = evs.find(e => {
          const st = e.competitions && e.competitions[0] && e.competitions[0].status && e.competitions[0].status.type && e.competitions[0].status.type.state;
          if (st === "in") return true;
          if (st === "post") return false;
          const t = new Date(e.date).getTime();
          return t - 9e5 <= now && now <= t + 5 * 36e5; // 15 min before kickoff → 5h window
        });
        if (!cand) { if (!stop) setLive(null); schedule(300000); return; }
        // in-window: pull a FRESH scoreboard (ttl 0 bypasses cache) for score/clock/situation
        const sb = await getJSON(URLS.scoreboardNow(), { ttl: 0 });
        const ev = ((sb && sb.events) || []).find(x => String(x.id) === String(cand.id)) || cand;
        const st = ev.competitions && ev.competitions[0] && ev.competitions[0].status && ev.competitions[0].status.type && ev.competitions[0].status.type.state;
        if (st !== "in") { if (!stop) setLive(null); schedule(st === "pre" ? 60000 : 300000); return; }
        let wpHome = null;
        try {
          const sum = await getJSON(`${ESPN}/summary?event=${ev.id}`, { ttl: 0 });
          const arr = sum && sum.winprobability;
          if (Array.isArray(arr) && arr.length) {
            const last = arr[arr.length - 1];
            if (last && last.homeWinPercentage != null) wpHome = Math.round(last.homeWinPercentage * 100);
          }
        } catch (e) {}
        if (!stop) setLive({ event: ev, wpHome });
        schedule(POLL());
      } catch (e) { schedule(60000); }
    }
    tick();
    const vis = () => { if (!document.hidden) { clearTimeout(timer); tick(); } };
    document.addEventListener("visibilitychange", vis);
    return () => { stop = true; clearTimeout(timer); document.removeEventListener("visibilitychange", vis); };
  }, [teamId, year]);
  return live;
}

  const hPct = pr ? parseFloat(pr.homeTeam?.gameProjection) : NaN;
  const aPct = pr ? parseFloat(pr.awayTeam?.gameProjection) : NaN;
  const mineHome = String(homeId)===String(teamId);
  const myPct = pr ? Math.round(mineHome ? hPct : aPct) : 0;
  const oppPct = pr ? Math.max(0,100-myPct) : 0;

  const pc = (d?.pickcenter||[]).find(p=>p.provider && p.details) || (d?.pickcenter||[])[0];
  const line = pc?.details; const ou = pc?.overUnder;

  const bteams = d?.boxscore?.teams || [];
  const away = bteams.find(t=>t.homeAway==="away"); const home = bteams.find(t=>t.homeAway==="home");
  const hasStats = !!(away?.statistics?.length);
  const cmpRows = [["Total Yards",["totalYards"]],["Passing",["netPassingYards"]],["Rushing",["rushingYards"]],["1st Downs",["firstDowns"]],["3rd Down",["thirdDownEff"]],["Turnovers",["turnovers"]],["Penalties",["totalPenaltiesYards"]],["Possession",["possessionTime"]]];

  const bplayers = d?.boxscore?.players || [];
  function leaders(entry){ const out=[]; for(const g of (entry?.statistics||[])){ const a=g.athletes?.[0]; if(!a||!a.athlete) continue; const pairs=(g.labels||[]).map((l,i)=>l+" "+(a.stats?.[i]??"")).slice(0,3).join(" · "); out.push({cat:g.name,name:a.athlete.displayName,line:pairs}); } return out.slice(0,3); }

  const gi = d?.gameInfo;
  const venue = gi?.venue?.fullName || comp?.venue?.fullName;
  const wxv = gi?.weather; const att = gi?.attendance;
  const net = header?.broadcasts?.[0]?.media?.shortName || comp?.broadcasts?.[0]?.names?.[0];

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxWidth:540}}>
        <div className="gm-head">
          <div className="gm-side">
            <img src={logoOf(opp?.team||teams[opp?.team?.id])} alt=""/>
            <div className="gm-ab">{opp?.team?.abbreviation||opp?.team?.displayName||"OPP"}</div>
            {done && <div className="gm-sc mono-num">{opp?.score}</div>}
          </div>
          <div className="gm-mid">
            <div className="ng-label">{done?"Final":(comp?.status?.type?.shortDetail||fmtShort(event.date))}</div>
            <div className="gm-vs display">{me?.homeAway==="home"?"VS":"@"}</div>
          </div>
          <div className="gm-side">
            <img src={logoOf(me?.team||teams[me?.team?.id])} alt=""/>
            <div className="gm-ab">{me?.team?.abbreviation||me?.team?.displayName||""}</div>
            {done && <div className="gm-sc mono-num">{me?.score}</div>}
          </div>
          <button className="close-x gm-x" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body" style={{padding:"4px 14px 18px"}}>
          {loading && <div className="spin"/>}

          {pr && (myPct>0||oppPct>0) && (
            <div style={{margin:"12px 0"}}>
              <div className="ng-label" style={{marginBottom:6}}>Win probability</div>
              <div className="pred-bar"><div className="pred-fill mine" style={{width:myPct+"%"}}>{myPct>=12?myPct+"%":""}</div><div className="pred-fill opp" style={{width:oppPct+"%"}}>{oppPct>=12?oppPct+"%":""}</div></div>
            </div>
          )}

          {(line||ou) && (
            <div className="gm-odds">
              {line && <span className="gm-odd"><b>Line</b> {line}</span>}
              {ou && <span className="gm-odd"><b>O/U</b> {ou}</span>}
            </div>
          )}

          {hasStats && (
            <>
              <div className="section-title" style={{marginTop:14}}>Team stats</div>
              <div className="gm-cmp-h"><span>{away?.team?.abbreviation}</span><span></span><span>{home?.team?.abbreviation}</span></div>
              <div className="card">
                {cmpRows.map(([label,names])=>{ const av=statVal(away?.statistics,names); const hv=statVal(home?.statistics,names); if(av==null&&hv==null) return null; return (
                  <div className="gm-cmp" key={label}><span className="mono-num">{av??"–"}</span><span className="gm-cmp-l">{label}</span><span className="mono-num">{hv??"–"}</span></div>
                ); })}
              </div>
            </>
          )}

          {bplayers.length>0 && bplayers.some(p=>p.statistics?.some(g=>g.athletes?.length)) && (
            <>
              <div className="section-title" style={{marginTop:14}}>Top performers</div>
              <div className="grid cols2">
                {bplayers.map((entry,i)=>(
                  <div className="card" key={i} style={{padding:"10px 12px"}}>
                    <div className="ng-label" style={{marginBottom:6}}>{entry.team?.abbreviation}</div>
                    {leaders(entry).map((l,j)=>(<div key={j} style={{marginBottom:6}}><div style={{fontWeight:600,fontSize:13}}>{l.name} <span className="ng-label" style={{textTransform:"uppercase"}}>· {l.cat}</span></div><div className="ng-label" style={{textTransform:"none",letterSpacing:0}}>{l.line}</div></div>))}
                  </div>
                ))}
              </div>
            </>
          )}

          {(venue||net||att||wxv) && (
            <div className="gm-info">
              {venue && <div>🏟️ {venue}</div>}
              {net && <div>📺 {net}</div>}
              {wxv?.displayValue && <div>🌡️ {wxv.displayValue}{wxv.temperature?" · "+wxv.temperature+"°":""}</div>}
              {att>0 && <div>👥 {att.toLocaleString()} attendance</div>}
            </div>
          )}

          {!done && <a className="gm-tickets" href={ticketUrl(comp, me?.team, opp?.team)} target="_blank" rel="noopener">🎟️ Get tickets</a>}

          {!loading && !pr && !hasStats && !line && (
            <div className="empty">Deeper stats appear once ESPN posts the matchup details for this game.</div>
          )}
        </div>
      </div>
    </div>
  );
}


function Analyst({ team, detail, year, openSettings }) {
  const [out, setOut] = useState("");
  const [busy, setBusy] = useState(false);
  const [q, setQ] = useState("");
  const hasKey = !!lsRawGet("cfb_anthropic_key");

  async function run(prompt, useSearch) {
    const key = lsRawGet("cfb_anthropic_key");
    if (!key) { openSettings(); return; }
    setBusy(true); setOut("");
    const sys = `You are a sharp, concise college football analyst for a fan of ${team.displayName}. `
      + `It is the ${year} season. Use real, current specifics where you can; never invent scores or stats you're unsure of. `
      + `Keep it tight and readable — short paragraphs, no fluff.`;
    const body = { model:"claude-sonnet-4-6", max_tokens:1300, system:sys, messages:[{role:"user",content:prompt}] };
    if (useSearch) body.tools = [{ type:"web_search_20250305", name:"web_search" }];
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "content-type":"application/json", "x-api-key":key,
          "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (d.error) { setOut("⚠️ " + d.error.message); }
      else setOut((d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim() || "No response.");
    } catch (e) { setOut("⚠️ "+(e.message||"Request failed.")); }
    finally { setBusy(false); }
  }

  const presets = [
    ["Season outlook", `Give me a ${year} season outlook for ${team.displayName}: expectations, key games, and what success looks like.`, true],
    ["Next game preview", `Preview ${team.displayName}'s next ${year} game — matchup, what to watch, and a prediction.`, true],
    ["Recruiting & roster", `What should ${team.displayName} fans know about the current roster and recent recruiting heading into ${year}?`, true],
    ["Playoff path", `Lay out a realistic College Football Playoff path for ${team.displayName} in ${year}.`, true],
  ];

  return (
    <>
      <div className="section-title">Analyst</div>
      {!hasKey && (
        <div className="err" style={{borderColor:"#5a4a2b",background:"#241f14",color:"#ffe2a8",marginBottom:14}}>
          <span>🔑</span><div>Add your Anthropic API key in <button onClick={openSettings} style={{color:"#ffd98a",textDecoration:"underline",fontWeight:600}}>settings</button> to use the analyst. It's stored only on this device.</div>
        </div>
      )}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        {presets.map(([label,p,s])=>(
          <button key={label} className="chip" disabled={busy} onClick={()=>run(p,s)}>{label}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input className="input" placeholder={`Ask anything about ${team.shortDisplayName||team.nickname||"the team"}…`}
          value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&q.trim())run(q,true);}}/>
        <button className="btn" disabled={busy||!q.trim()} onClick={()=>run(q,true)}>Ask</button>
      </div>
      {busy && <div className="spin"/>}
      {out && !busy && <div className="ai-out">{out}</div>}
      {!out && !busy && <div className="empty">Pick a prompt above or ask your own. Answers can pull live info from the web.</div>}
    </>
  );
}

/* ---------- APP NAVIGATION (dock + more sheet + first run) ---------- */
const DOCK_TABS = [["schedule","Schedule"],["gameday","GameDay"],["scores","Scores"],["news","News"]];
const MORE_TABS = [["rankings","Rankings","\ud83d\udcca"],["standings","Standings","\ud83c\udfdb\ufe0f"],["roster","Roster","\ud83e\uddd1\u200d\ud83e\udd1d\u200d\ud83e\uddd1"],["pickem","Pick'em","\u2705"],["compare","Compare","\u2696\ufe0f"],["postseason","Postseason","\ud83c\udfc6"],["ai","Analyst","\ud83e\udd16"]];
const DockIcon = ({ k }) => {
  const s = { width: 20, height: 20, fill: "none", stroke: "currentColor", strokeWidth: 1.9, strokeLinecap: "round", strokeLinejoin: "round" };
  if (k === "schedule") return (<svg {...s} viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>);
  if (k === "gameday") return (<svg {...s} viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9.5" ry="6.2" transform="rotate(-28 12 12)"/><path d="M9.2 13.9l5.6-3.8M10.5 11l1 1.5M12.5 9.7l1 1.5"/></svg>);
  if (k === "scores") return (<svg {...s} viewBox="0 0 24 24"><path d="M4 19V9M10 19V5M16 19v-8M21 19H3"/></svg>);
  if (k === "news") return (<svg {...s} viewBox="0 0 24 24"><path d="M4 5h13v14a2 2 0 0 0 2 2H6a2 2 0 0 1-2-2z"/><path d="M17 8h3v11a2 2 0 0 1-2 2M8 9h5M8 13h5M8 17h5"/></svg>);
  return null;
};
function BottomDock({ tab, go, onMore, moreOpen, moreActive }) {
  return (
    <nav className="dock" aria-label="Primary">
      {DOCK_TABS.map(([k, l]) => (
        <button key={k} className={"tab bb-item" + (tab === k ? " on" : "")} onClick={() => go(k)} aria-current={tab === k ? "page" : undefined}>
          <DockIcon k={k} />
          <span>{l}</span>
        </button>
      ))}
      <button className={"tab bb-item bb-more" + (moreOpen || moreActive ? " on" : "")} onClick={onMore} aria-expanded={moreOpen}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        <span>More</span>
      </button>
    </nav>
  );
}
function MoreSheet({ tab, go, onClose, onSwitch, onSettings }) {
  return (
    <div className="scrim sheet-scrim" onClick={onClose}>
      <div className="more-sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="more-grid">
          {MORE_TABS.map(([k, l, ic]) => (
            <button key={k} className={"tab more-item" + (tab === k ? " on" : "")} onClick={() => go(k)}>
              <span className="mi-ic">{ic}</span><span>{l}</span>
            </button>
          ))}
        </div>
        <div className="more-actions">
          <button className="more-act" onClick={onSwitch}>\u21c6 Switch team</button>
          <button className="more-act" onClick={onSettings}>\u2699 Settings</button>
        </div>
      </div>
    </div>
  );
}
function FirstRun({ teams, confMap, onPick }) {
  const [q, setQ] = useState("");
  const groups = useMemo(() => {
    const list = Object.values(teams);
    const match = (t) => !q || (t.displayName || "").toLowerCase().includes(q.toLowerCase()) || (t.abbreviation || "").toLowerCase().includes(q.toLowerCase());
    if (confMap && confMap.length) {
      return confMap.map(c => ({ name: c.name, teams: c.teamIds.map(id => teams[id]).filter(Boolean).filter(match) })).filter(g => g.teams.length);
    }
    const f = list.filter(match).sort((a, b) => (a.displayName || "").localeCompare(b.displayName || ""));
    return f.length ? [{ name: "All teams", teams: f }] : [];
  }, [teams, confMap, q]);
  return (
    <div className="firstrun">
      <div className="hero-lights" aria-hidden="true" />
      <FieldBackdrop />
      <div className="fr-inner">
        <div className="fr-kicker ng-label">Welcome to the sideline</div>
        <h1 className="fr-title">Pick your team</h1>
        <p className="fr-sub">Colors, schedule, GameDay \u2014 the whole app becomes theirs. Change it anytime.</p>
        <input className="search fr-search" placeholder="Search team or abbreviation\u2026" value={q} onChange={e => setQ(e.target.value)} />
        <div className="fr-list">
          {groups.map(g => (
            <div key={g.name}>
              <div className="conf-h">{g.name}</div>
              {g.teams.map(t => (
                <button key={t.id} className="team-opt fr-opt" onClick={() => onPick(String(t.id))}>
                  <img src={logoOf(t)} alt="" loading="lazy" />{t.displayName}
                </button>
              ))}
            </div>
          ))}
          {!groups.length && <div className="empty">No team matches \u201c{q}\u201d.</div>}
        </div>
      </div>
    </div>
  );
}

function Switcher({ teams, confMap, current, onPick, onClose }) {
  const [qy, setQy] = useState("");
  const ref = useRef();
  useEffect(()=>{ ref.current?.focus(); },[]);
  const all = Object.values(teams).sort((a,b)=>a.displayName.localeCompare(b.displayName));
  const q = qy.trim().toLowerCase();
  const filt = (t) => !q || t.displayName.toLowerCase().includes(q) || (t.abbreviation||"").toLowerCase().includes(q);

  let body;
  if (q) {
    const res = all.filter(filt).slice(0,40);
    body = res.length ? res.map(t=><Opt key={t.id} t={t} sel={t.id===current} onPick={onPick}/>)
                      : <div className="empty">No team matches “{qy}”.</div>;
  } else if (confMap) {
    body = confMap.map(c => (
      <div key={c.name}>
        <div className="conf-h">{c.name}</div>
        {c.teamIds.map(id=>teams[id]).filter(Boolean)
          .sort((a,b)=>a.displayName.localeCompare(b.displayName))
          .map(t=><Opt key={t.id} t={t} sel={t.id===current} onPick={onPick}/>)}
      </div>
    ));
  } else {
    body = <>
      <div className="conf-h">All FBS teams</div>
      {all.map(t=><Opt key={t.id} t={t} sel={t.id===current} onPick={onPick}/>)}
    </>;
  }
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-head">
          <h3>Choose team</h3>
          <input ref={ref} className="search" placeholder="Search teams…" value={qy} onChange={e=>setQy(e.target.value)}/>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body">{body}</div>
      </div>
    </div>
  );
}
function Opt({ t, sel, onPick }) {
  return (
    <button className={"team-opt"+(sel?" sel":"")} onClick={()=>onPick(t.id)}>
      <img src={logoOf(t)} alt=""/>
      <span style={{fontWeight:600,fontSize:14}}>{t.displayName}</span>
    </button>
  );
}

function Settings({ year, setYear, onClose }) {
  const [key, setKey] = useState(lsRawGet("cfb_anthropic_key")||"");
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxWidth:460}}>
        <div className="sheet-head"><h3>Settings</h3><button className="close-x" style={{marginLeft:"auto"}} onClick={onClose}>✕</button></div>
        <div className="sheet-body" style={{padding:16}}>
          <div className="label">Season</div>
          <div style={{display:"flex",gap:8}}>
            {[2026,2025].map(y=>(
              <button key={y} className={"chip"} style={y===year?{borderColor:"var(--accent)",color:"var(--text)"}:null}
                onClick={()=>setYear(y)}>{y}</button>
            ))}
          </div>
          <div className="label">Data proxy URL (optional — fixes "failed to fetch")</div>
          <input className="input" placeholder="https://your-worker.workers.dev/?url=" defaultValue={(()=>{try{return localStorage.getItem("cfb_proxy")||"";}catch(e){return "";}})()}
            onChange={e=>{ try{ const v=e.target.value.trim(); v?localStorage.setItem("cfb_proxy",v):localStorage.removeItem("cfb_proxy"); }catch(_){} }}/>
          <div className="ng-label" style={{textTransform:"none",letterSpacing:0,margin:"6px 0 12px",lineHeight:1.5}}>
            ESPN blocks direct browser calls. By default the app races several public relays, but they get busy or rate-limited. For rock-solid loading, deploy a free Cloudflare Worker (a few lines) and paste its URL here — it must end so the encoded target gets appended, e.g. <code>https://your-worker.workers.dev/?url=</code>. Reload after changing.
          </div>
          <div className="label">Anthropic API key (for the Analyst tab)</div>
          <input className="input" type="password" placeholder="sk-ant-…" value={key} onChange={e=>setKey(e.target.value)}/>
          <div className="ng-label" style={{textTransform:"none",letterSpacing:0,margin:"8px 0 16px",lineHeight:1.5}}>
            Stored only in this browser (localStorage). Used to call the Anthropic API directly from the page.
          </div>
          <button className="btn" style={{width:"100%"}} onClick={()=>{
            lsRawSet("cfb_anthropic_key",key.trim()); onClose();
          }}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- shared bits ---------- */
function useData(fn, deps) {
  const [data,setData]=useState(null);const [err,setErr]=useState(null);const [loading,setLoading]=useState(true);
  const [n,setN]=useState(0);
  useEffect(()=>{ let on=true; setLoading(true); setErr(null);
    fn().then(d=>{if(on){setData(d);setLoading(false);}}).catch(e=>{if(on){setErr(e.message||"Failed");setLoading(false);}});
    return ()=>{on=false;};
  // eslint-disable-next-line
  },[...deps,n]);
  return { data, err, loading, reload:()=>setN(x=>x+1) };
}
const Loading = ({rows=6}) => <div style={{marginTop:14}}>{Array.from({length:rows}).map((_,i)=><div className="skel" key={i}/>)}</div>;
const Empty = ({children}) => <div className="empty">{children}</div>;
const ErrBox = ({msg,retry}) => <div className="err" style={{marginTop:14}}><span>⚠️</span><div>{msg}. <button onClick={retry}>Retry</button></div></div>;

function fmtDate(d){ if(!d)return""; try{return new Date(d).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});}catch{return"";} }
function fmtShort(d){ if(!d)return""; try{return new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric"});}catch{return"";} }
function shorten(s){ return s && s.length>46 ? s.slice(0,44)+"…" : (s||""); }
